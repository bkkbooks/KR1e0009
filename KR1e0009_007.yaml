seq: 7
front:
  text: 以自輔恥賂之故書齊取秋邾子來朝朝直遥反楚子鄭人侵陳遂侵宋遂繼事也晉趙盾帥師救陳善救陳也盾徒本反宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭棐林鄭地棐芳尾反又音匪列數諸侯而㑹晉趙盾大趙盾之事也大其衛中國攘夷狄數所主反攘而羊反其曰師何也據言㑹晉師不言㑹晉趙盾以其大之也以諸侯大趙盾之事故言帥師者衆大之辭于棐林地而後伐鄭疑辭也此其地何則著其美也泰曰夫救災恤患其道冝速而方云㑹于棐林然後伐鄭狀似伐鄭有疑須㑹乃定曰非也欲美趙盾之功故詳録其㑹地冬晉趙穿帥師侵崇穿音川晉人宋人伐鄭伐鄭所以救宋也時楚鄭侵宋二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元大棘宋地華户化反獲者不與之辭也華元得衆甚賢故不與鄭獲之言盡其衆以救其將也先言敗績而後言獲知華元得衆心軍敗而後見獲晉與秦戰于韓未言敗績而君巳獲知晉侯不得衆心明矣盡子忍反以三軍敵華元華元雖獲不病矣何休曰書獲皆生也如欲不病華元當有變文鄭君釋之曰將帥見獲師敗可知不當復書師敗績此兩書之者明宋師懼華元見獲皆堨力以救之無奈不勝敵耳華元有賢行得衆如是雖師敗身獲適明其美不傷賢行今兩書敗獲非變文如何秦師伐晉夏晉人宋人衞人陳人侵鄭秋九月乙丑晉趙盾弑其君夷皐穿弑也穿趙盾從父昆弟盾不弑而曰盾弑何也以罪盾也其以罪盾何也曰靈公朝諸大夫而暴彈之暴殘暴朝直遥反彈徒丹反又徒旦反觀其辟丸也趙盾入諌不聽出亡至於郊禮三諌不聽則去待放於竟三年君賜之環則還賜之玦則往必三年者古疑獄三年而後斷易曰繼用徽纆示于叢棘三歳不得凶是也自嫌有罪當誅故三年不敢去辟音避竟音境玦古穴反杜元凱云如環而不連斷丁亂反徽許歸反纆亡北反徽纆皆䋲也三股曰徽兩股曰纆趙穿弑公而後反趙盾招使還史狐書賊曰趙盾弑公史國史掌書記事狐其名盾曰天乎天乎予無罪告天言已無弑君之罪孰爲盾而忍弑其君者乎廻巳易他誰作盾而當忍弒君者乎孰爲盾絶句孰誰也史狐曰子爲正卿入諌不聽出亡不逺君弑反不討賊則志同志同穿也志同則書重非子而誰盾是正卿又賢故言重故書之曰晉趙盾弑其君夷臯者過在下也鄭嗣曰成十八年晉弑其君州蒲傳曰稱國以弑其君君惡甚矣然則稱臣以弑罪在臣下也趙盾弑其君不言罪而曰過者言非盾親弑有不討賊之過惡甚如字又烏路反曰於盾也見忠臣之至於許丗子止見孝子之至邵曰盾以亡不岀竟反不討賊受弒君之罪忠不至故也止以父病不知甞藥受弑父之罪孝不至故也見忠賢徧反或如字下同冬十月乙亥天王崩匡王也三年春王正月郊牛之口傷之口緩辭也傷自牛作也牛自傷口非備災之道不至也故以緩辭言之改卜牛牛死乃不郊事之變也牛無故自傷其口易牛改卜復死乃廢郊禮此事之變異復扶又反乃者亡乎人之辭也譏宣公不恭致天變猶三望葬匡王楚子伐陸渾戎渾户門反又户困反夏楚人侵鄭秋赤狄侵齊宋師圍曹冬十月丙戍鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郊莒人不肯及者内爲志焉爾平者成也不肯者可以肯也凱曰君子不念舊惡况爲大國所和乎郯音談國名也公伐莒取向向莒邑向書亮反伐猶可取向甚矣以義兵討不平未若不用兵以義使平者也故曰猶可也莒人辭不受治也乘義取邑所以不服伐莒義兵也討不釋怨取向非也乗義而爲利也爲如字又于僞反秦伯稻卒夏六月乙酉鄭公子歸生弒其君夷赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊夏公至自齊秋九月齊髙固來逆子叔姬諸俟之嫁子於大夫主大夫以與之㛰禮主人設几筵于廟以待迎者諸侯大夫尊卑不敵故使大夫爲之主迎魚敬反來者接内也不正其接内故不與夫婦之稱也來者謂髙固髙固齊之大夫而今與君接㛰姻之禮故不言逆女稱尺證反叔孫得臣卒冬齊髙固及子叔姬來及者及吾子叔姬也爲使來者不使得歸之意也髙固受使來聘而與婦俱歸故書及以明非禮莊二十七年冬杞伯姫來僖二十八年秋犯伯姬來皆不言所及是使得歸之意受使所吏反楚人伐鄭六年春晉趙盾衛孫免侵陳此帥師也其不言帥師何也據元年趙盾帥師救陳言帥師也不正其敗前事故不與帥師也元年救而今更侵之夏四月秋八月螽螽音終冬十月七年春衞侯使孫良夫來盟來盟者前定也不言及者以國與之不言其人亦以國與之不日前定之盟不日夏公㑹齊俟伐萊萊音來國名秋公至自伐萊大旱冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤黒壤某地壤人丈反八年春公至自㑹夏六月公子遂如齊至黃乃復蓋有疾而還黃齊地乃者亡乎人之辭也鄭嗣曰大夫受命而出雖死以尸將事今遂以疾而還失禮違命故曰亡乎人言魯使不得其人也復者事畢也不專公命也遂以疾反而加事畢之文者是不使遂專命還辛巳有事于大廟大音泰下注同仲遂卒于垂祭于大廟之日而知仲遂卒垂齊地爲若反命而後卒也先書復後言卒使若遂巳反命于君而後卒于垂此公子也其曰仲何也䟽之也僖十六年傳曰大夫不言公子公孫䟽之也何爲䟽之也是不卒者也遂與宣公共弑子赤不䟽則無用見其不卒也若書公子則與正卒者同故去公子以見之見其賢徧反注同故去起吕反下文及注同則其卒之何也據公子翬不書卒子翬許韋反以譏乎宣也其譏乎宣何也聞大夫之䘮則去樂卒事去籥萬卒祭事言今不然壬午猶繹猶者可以巳之辭也繹者祭之旦日之享賔也萬入去籥萬舞名籥管也繹音亦爾雅云又祭也享許丈反籥餘若反管也以其爲之變譏之也内舞去籥惡其聲聞此爲卿變於常禮是知其不可而爲之爲之于僞反注爲卿變同惡其烏路反戊子夫人熊氏薨宣公妾母左氏作嬴氏晉師白狄伐秦楚人滅舒鄝舒鄝音了本又作蓼國名也秋七月甲子日有食之旣冬十月已丑葬我小君頃熊丈夫人姜氏大歸于齊故宣公立巳妾母爲夫人君以夫人禮卒葬之故主書者不得不以爲夫人義與成風同頃熊音傾左氏作敬嬴雨不克葬葬旣有日不爲雨止禮也雨不克葬䘮不以制也徐邈曰案經文是已丑之日葬䘮旣岀而遇雨若未及已丑而却期無爲逆書此日葬禮䘮事有進無退又士䘮禮有潦車載簔笠則人君之張設固兼備矣禮先遷柩於廟其明昧爽而引旣及葬日之晨則祖行遣奠之禮設矣故雖雨猶終事不敢停柩乆次不爲于僞反潦音老蓑素禾反笠音立張如字又陟亮反柩其又反尸在棺曰柩昧音妹引以刃反又如字遣奠弃戰反庚寅日中而克葬而緩辭也足乎日之辭也城平陽楚師伐陳九年春王正月公如齊有母之䘮而行朝㑹非禮朝直遥反公至自齊夏仲孫蔑如京師齊侯伐萊秋取根牟八月滕子卒九月晉侯宋公衞侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳辛酉晉侯黒臀卒于扈其地於外也其日未踰竟也外謂國都之外諸侯卒於路寢則不地傳例曰諸侯正卒則日不正則不日舊說踰竟亦不日然則諸侯不正而與未踰竟無以别之矣案襄七年鄭伯卒于操此年晉侯卒于扈文正與襄二十六年許男卒於楚同恐後人謂操扈是國故於疑似之際每爲發傳日未踰竟也臀徒門反竟音境以别彼列反操七報反冬十月癸酉衛侯鄭卒宋人圍滕楚子伐鄭晉郤缺帥師救鄭郤去逆反缺傾雪反陳殺其大夫泄冶泄息列反冶音也稱國以殺其大夫殺無罪也泄冶之無罪如何陳靈公通于夏徴舒之家公孫寧儀行父亦通于其家二人陳大夫夏戸雅反或衣其衣或衷其𥜗衷者𥜗在衷也衣其衣上於旣反下如字襦而朱反在衷本又作裏音里以相戲於朝朝直遥反泄冶聞之入諌曰使國人聞之則猶可使仁人聞之則不可君愧於泄冶不能用其言而殺之十年春公如齊公至自齊齊人歸我濟西田公娶齊齊由以爲兄弟反之齊由以㛰族故還魯田爾雅釋親曰婦之黨爲㛰兄弟娶七住反不言來公如齊受之也夏四月丙辰日有食之已巳齊侯元卒傳例曰言日不言朔食晦日則此丙辰晦之日也已巳在晦日之下五月之上推㝷義例當是閏月矣又六年傳曰閠月者附月之餘日言閏承前月而受其餘日故書閏月之日繫前月之下蓋史䇿常法文有定例閏有常體無嫌不明故不復毎月發傳哀五年公羊傳曰閏月不書此何以書推此言之則春秋固有在閏月而不冠以閏者矣至於閏不告月猶朝于廟閏月葬齊景公不正其閏無以言其事故書見變禮不復扶又反下注復同不冠工亂反猶朝直遥反見變賢徧反齊崔氏出奔衛氏者舉族而出之之辭也何休曰氏者譏丗卿也即稱氏爲舉族而岀尹氏卒寧可復以爲舉族死乎鄭君釋之曰云舉族死是何妖問甚乎舉族而岀之之辭者固譏丗卿也崔杼以丗卿專權齊人惡其族今出奔旣不欲其身反又不欲國立其宗後故孔子順而書之曰崔氏出奔䘙若其舉族盡去之爾崔杼直吕反惡其烏路反公如齊五月公至自齊癸巳陳夏徴舒弒其君平國六月宋師伐滕月者蓋爲下齊惠公葬速起爲于僞反公孫歸父如齊葬齊惠公晉人宋人衞人曹人伐鄭秋天王使王季子來聘其曰王季王子也其曰子尊之也子者人之貴稱稱尺證反聘問也公孫歸父帥師伐邾取繹繹音亦大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘饑饑本或作飢居疑反楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于夷陵夷陵齊地左氏作辰陵公孫歸父㑹齊人伐莒秋晉侯㑹狄于櫕函櫕函狄地函音咸不言及外狄也所以異之於諸夏夏户雅反冬十月楚人殺陳夏徵舒變楚子言人者弑君之賊若曰人人所得殺也其月謹之此入而殺也其不言入何也據入國乃得殺外徵舒於陳也其外徴舒於陳何也據徴舒陳大夫不應外明楚之討有罪也雍曰經若書楚子入陳殺夏徵舒者則入者内不受是無以表徴舒之悖逆楚子之得正悖𥙷對反丁亥楚子入陳入者内弗受也日入惡入者也何用弗受也不使夷狄爲中國也楚子入陳納淫亂之人執國威柄制其君臣傎倒上下錯亂邪正是以夷狄爲中國惡烏路反傎丁田反本又作顚邪似嗟反納公孫寧儀行父于陳納者内弗受也輔人之不能民而討猶可雍曰輔相鄰國有不能治民者而討其罪人則可而曰猶可者明鄰國之君無輔相之道輔相息亮反下輔相同入人之國制人之上下使不得其君臣之道不可二人與君昏淫當絶而楚強納之是制人之上下強其丈反一音其良反十有二年春葬陳靈公傳例曰失德不葬君弑賊不討不葬以罪下也日卒時葬正也靈公淫夏姬殺泄冶臣子不能討賊踰三年然後葬而日卒時葬何邪泰曰楚巳討之矣臣子雖欲討之無所討也故君子即而恕之以申臣子之恩稱國以殺大夫則靈公之罪不嫌不明書葬以表討賊不言靈公無罪也踰三年而後葬則國亂居可知矣非日月小有前却則書時不嫌弒音試夏户雅反楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲邲鄭地邲皮必反晉師敗績績功也功事也日其敗事也秋七月冬十有二月戊寅楚子滅蕭晉人宋人衛人曹人同盟于清丘清丘衛地宋師伐陳衛人救陳十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先榖榖户木反一本作縠十有四年春衛殺其大夫孔逹夏五月壬申曹伯壽卒晉侯伐鄭秋九月楚子圍宋葬曹文公冬公孫歸父㑹齊侯于榖十有五年春公孫歸父㑹楚子于宋夏五月宋人及楚人平平者成也善其量力而反義也各自知力不能相制反共和之義人者衆辭也平稱衆上下欲之也外平不道以吾人之存焉道之也吾人謂大夫歸父六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸滅國有三術術猶道也潞氏音路嬰一盈反中國謹日卑國月夷狄不日卑國謂附庸之屬襄六年傳曰中國日卑國月夷狄時此謂三術其曰潞子嬰兒賢也秦人伐晉王札子殺召伯毛伯王札子者當上之辭也殺召伯毛伯不言其何也解經不言殺其大夫札側八反召上照反兩下相殺也兩下相殺不志乎春秋此其志何也矯王命以殺之非忿怒相殺也故曰以王命殺也以王命殺謂言王札子殺召伯毛伯是知以王命而殺之矯居表反以王命殺則何志焉爲天下主者天也繼天者君也君之所存者命也爲人臣而侵其君之命而用之是不臣也爲人君而失其命是不君也君不君臣不臣此天下所以傾也秋螽仲孫蔑㑹齊髙固于無婁無婁𣏌邑婁力侯反初稅畒初者始也古者什一一夫一婦佃田百畒以共五口父母妻子也又受田十畒以爲公田公田在内私田在外此一夫一婦爲耕百一十畒稅始銳反賦也什一音十十稅一也佃音田又徒徧反共音恭藉而不稅藉此公田而収其入言不稅民初稅畒非正也古者三百歩爲里名曰井田井田者九百畒公田居一出除公田八十畒餘八百二十畒故井田之法八家共一井八百畒餘二十畒家各二畒半爲廬舎廬力魚反私田稼不善則非吏非責也吏田畯也言吏急民使不得營私田畯音俊田大夫也公田稼不善則非民民勤私也初稅畒者非公之去公田而履畒十取一也以公之與民爲巳悉矣悉謂盡其力去如字又起吕反古者公田爲居八家共居井竈葱韭盡取焉損其廬舎家作一園以種五菜外種楸桑以備飬生送死韭音九楸音秋冬蝝生蝝非災也其曰蝝非稅畒之災也凢春秋記災未有言生者蝝之言縁也縁宣公稅畒故生此災以責之非責也蝝以全反劉歆云此蚍蜉子董仲舒云蝗子字林尹絹反饑十有六年春王正月晉人滅赤狄甲氏及留吁甲氏留吁亦狄别種晉旣滅潞氏今又并盡其餘邑也滅夷狄時賢嬰兒故㓕其餘邑猶月吁許于反種章勇反并必政反夏成周宣榭災成周東周今之洛陽宣榭宣王之榭爾雅曰室有東西廂曰廟無東西廂有室曰寢無室曰榭傳例曰國曰災邑曰火榭音謝本或作謝災左氏作火周災不志也其曰宣榭何也以樂器之所藏目之也移風易俗莫善於樂是故善其器秋郯伯姬來歸爲夫家所遣冬大有年五榖大熟爲大有年十有七年春王正月庚子許男錫我卒錫星歷反丁未蔡侯由卒夏葬許昭公葬蔡文公六月癸卯日有食之已未公㑹晉侯衛侯曹伯邾子同盟于斷道己未亦閏月之日斷道晉地斷徒短反一音短同者有同也同外楚也秋公至自㑹冬十有一月壬午公弟叔肹卒其曰公弟叔肹賢之也其賢之何也宣弑而非之也宣公殺子赤叔肹非責之肹許乙反非之則胡爲不去也曰兄弟也何去而之言無所至與之財則曰我足矣宣公與之財物則言自足以距之織屨而食織屨賣以易食屨九具反終身不食宣公之食君子以是爲通恩也以取貴乎春秋泰曰宣公弑逆故其禄不可受兄弟無絶道故雖非而不去論情可以明親親言義足以厲不軌書曰公弟不亦冝乎十有八年春晉侯衞丗子臧伐齊臧子郎反公伐𣏌夏四月秋七月邾人戕繒子于繒戕猶殘也挩殺也挩謂捶打殘賊而殺地于繒惡其臣子不能距難戕在良反殘也賊也猶殺也繒本或作鄫在陵反挩殺他活反又徒活反捶打也字林云木杖或作撲普木反捶章蘂反打音頂惡其烏路反難乃旦反甲戍楚子吕卒啇臣子莊王子吕左氏作旅夷狄不卒卒少進也卒而不日日少進也日而不言正不正簡之也中國君日卒正也不日不正也今進夷狄直舉其日而不論正之與不正公孫歸父如晉冬十月壬戍公薨于路寢路寢正寢也歸父還自晉還者事未畢也莊八年秋師還是也自晉事畢也與人之子守其父之殯人之子謂歸父子也言成公與歸父子共守宣公殯捐殯而奔其父之使者是亦奔父也捐棄也奔猶逐也言成公棄父之殯逐父之使使謂歸父也父命未反而巳逐之是與親奔父無異捐以全反至檉遂奔齊遂繼事也杜預曰檉魯竟外故不言出檉尹貞反左氏作笙竟音境春秋榖梁卷第七
