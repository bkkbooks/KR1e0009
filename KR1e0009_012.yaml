front:
  text: 春秋榖梁傳哀公第十二哀公名蔣敬王二十六年即位
  hash: sha256:31e321050e6cf990356450154d6817e18b92d8b014555a8d902277ed8e17859b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_012-1a}
body:
  text: 范寧集解元年春王正月公即位楚子陳侯隨侯許男圍蔡隨久不見者衰微也稱侯者本爵俱侯土地見侵削故微爾定六年鄭滅許今復見者自復也不見賢遍反下復見同復扶又反鼷鼠食郊牛角改卜牛夏四月辛巳郊此該郊之變而道之也該備也春秋書郊終於此故於此備說郊之變變謂郊非其時或牲𬒳災害於變之中又有言焉於災變之中又有可善而言者鼷鼠食郊牛角改卜牛志不敬也郊牛日展斛角而知傷展道盡矣展道雖盡所以備災之道不盡譏哀公不敬故致天變斛音糾又音求郊自正月至于三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之末承春之始蓋不可矣凱曰不時之中有差劇也夏始承春方秋之末猶為可也有差𥘉賣反九月用郊用者不冝用者也在成十七年郊三卜禮也以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛所謂三卜也鄭嗣曰謂卜一辛而三也求吉之道三故曰禮也四卜非禮也僖三十一年襄十一年皆四卜五卜強也成十年五卜卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩宣三年郊牛之口傷以牛自傷故加之言緩辭則否方九反全曰牲傷曰牛未牲曰牛其牛一也其所以為牛者異巳卜日成牲而傷之曰牛未卜日未成牲之牛二者不同有變而不郊故卜免牛也巳牛矣其尚卜免之何也災傷不復以郊怪復卜免之禮與其亡也寧有於禮有卜之與無卜寧當有卜嘗置之上帝矣故卜而後免之不敢專也嘗置之滌宫名之為上帝牲矣故不敢擅施也滌徒歷反擅市戰反施式氏反又如字卜之不吉則如之何不免安置之繫而待六月上甲始庀牲然後左右之庀具也待具後牲然後左古前牛在我用之不復須卜已有新牲故也周禮曰司門掌授管鍵以啓閉國門祭祀之牛牲繫焉然則未左右時監門者飬之庀匹爾反鍵其展反又其偃反監古銜反子之所言者牲之變也而曰我一該郊之變而道之何也我以六月上甲始庀牲十月上甲始繫牲十一月十二月牲雖有變不道也牲有變則改卜牛以不妨郊事故不言其變待正月然後言牲之變此乃所以該郊至郊時然後言其變重其妨郊也十二月不道自前可知也至正月然後道則二月三月亦可知也此所以該郊言其變道盡郊享道也貴其時大其禮其養牲雖小不備可也享者飲食之道牲有變則改卜牛郊日巳逼庀繫之禮雖小不備合時得禮用之可也享許丈反子不志三月卜郊何也三月謂十二月正月二月也郊自正月至于三月郊之時也有變乃志常事不書我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣意欲郊而卜不吉故曰不從郊必用􅎅辛者取其新潔莫先也秋齊侯衛侯伐晉冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田漷東未盡也及沂西田沂西未盡也漷沂皆水名邵曰以其言東西則知其未盡也漷東火虢反又音郭沂魚依反癸巳叔孫州仇仲孫何忌及邾子盟于句繹句繹邾地句古侯反繹音亦三人伐而二人盟何也各盟其得也季孫不得田故不與盟不與音豫夏四月丙子衛侯元卒滕子來朝朝直遙反晉趙鞅帥師納衛丗子蒯聵于戚鄭君曰蒯聵欲殺母靈公廢之是也若君薨有反國之道當稱子某如齊子紏也今稱丗子如君存是春秋不與蒯聵得反立明矣江熙曰鄭丗子忽反正有明文子糾但於公子為貴非丗子也納者內弗受也帥師而後納者有伐也何用弗受也以輒不受父之命受之王父也信父而辭王父則是不尊王父也其弗受以尊王父也寧不逹此義江熙曰齊景公廢世子丗子還國書篡若靈公廢蒯聵立輒則蒯聵不得復稱曩日丗子也稱蒯聵為丗子則靈公不命輒審矣此矛楯之喻也然則從王父之言傳似失矣經云納衛丗子忽復歸于鄭稱丗子明正也明正則拒之者非邪信父音申篡𥘉患反復扶又反曩乃黨反矛五侯反本又作楯常允反又音允拒音巨邪也似嗟反秋八月甲戍晉趙鞅帥師及鄭罕逹帥師戰于鐡鐡衛地鐡他結反鄭師敗績冬十月葬衛靈公七月葬蒯聵之亂故也十有一月蔡遷于州來蔡殺其大夫公子駟三年春齊國夏衛石曼姑帥師圍戚此衛事也其先國夏何也子不圍父也不繫戚於衛者子不有父也江熙曰國夏首兵則應言衛戚今不言者辟子有父也子有父者戚繫衛則為大夫屬于衛子圍父者謂人倫之道絶故以齊首之曼姑音萬辟音避夏四月甲午地震五月辛卯桓宫僖宫災言及則祖有尊卑解經不言及僖由我言之則一也逺祖恩無差降如一故不言及季孫斯叔孫州仇帥師城啓陽稱帥師有難難乃旦反宋樂髠帥師伐曹髠苦門反秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳宣元年晉放其大夫胥甲父于衛傳曰稱國以放放無罪也然則稱人以放放有罪也冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戍盜弒蔡侯申稱盜以弒君不以上下道道也以上下道道者若衛祝吁稱其君完之類是直稱盜不在人倫之序內其君而外弒者不以弒道道也襄七年鄭伯將㑹中國其臣欲從楚不勝其臣弒而死不使夷狄之民加乎中國之君故曰鄭伯髠原如㑹未見諸侯丙戍卒于操是不以弒道道也春秋有三盜微殺大夫謂之盜十三年冬盜殺陳夏區夫是陳夏户雅反區烏侯反非所取而取之謂之盜定八年陽貨取寶玉大弓是辟中國之正道以襲利謂之盜即殺蔡侯申者是非微者也辟中音避蔡公孫辰出奔吳葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚城西郛郛郭也郛音孚六月辛丑亳社災殷都于亳武王克紂而班列其社于諸侯以為亡國之戒劉向曰災亳社戒人君縱恣不能警戒之象亳社者亳之社也亳亡國也亳即殷也殷都于亳故因謂之亳社亡國之社以為廟屏戒也立亳之社於廟之外以為屏蔽取其不得通天人君瞻之而致戒心其屋亡國之社不得逹上也必為之作屋不使上通天也緣有屋故言災秋八月甲寅滕子結卒冬十有二月葬蔡昭公不書弒君之賊而昭公書葬既謂之盜若殺微賤小人不足録之葬滕頃公頃音傾五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒杵昌吕反冬叔還如齊閏月葬齊景公不正其閏也閏月附月之餘日喪事不數數所主反六年春城邾瑕晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及髙張來奔叔還㑹吳于柤柤莊加反秋七月庚寅楚子軫卒軫之忍反齊陽生入于齊齊陳乞弒其君荼不日荼不正也荼音舒又音徒一音文加反陽生入而弒其君以陳乞主之何也不以陽生君荼也其不以陽生君荼何也陽生正荼不正不正則曰君何也荼雖不正巳受命矣巳受命于景公而立故可言君入者內弗受也荼不正何用弗受以其受命可以言弗受也先君巳命立之於義可以拒之陽生其以國氏何也取國于荼也何休曰即不使陽生以荼為君不當去公子見當國也又榖梁以為國氏者取國于荼齊小白又不取國于子糾無乃近自相反乎鄭君釋之曰陽生篡國故不言公子不使君茶謂書陳乞弒君爾荼與小白其事相似荼弒乃後立小白立乃後殺雖然俱篡國而受國焉爾傳曰齊小白入于齊惡之也陽生其以國氏何取國于茶也義適互相足又何自反乎子糾冝立而少白篡之非受國于子糾則將誰乎當去起吕反見當賢遍反糾居黝反惡之烏路反冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭瑗于眷反晉魏曼多帥師侵衛曼音萬夏公㑹吳于繒繒在陵反秋公伐邾八月已酉入邾以邾子益來以者不以者也夫諸侯有罪伯者雖執猶以歸于京師魯非霸主而擅相執録故日入以表惡之擅市戰反惡烏路反傳及注同益之名惡也惡其不能死社稷春秋有臨天下之言焉徐乾曰臨者撫有之也王者無外以天下為家盡其有也有臨一國之言焉諸侯之臨國亦得有之如王於天下有臨一家之言焉大夫臨家猶諸侯臨國其言來者有外魯之辭焉非已內有從外來者曰來今魯侯身自以歸而曰來是外之也宋人圍曹冬鄭駟弘帥師救曹八年春王正月宋公入曹以曹伯陽歸吳伐我夏齊人取歡及闡宣元年傳曰內不言取言取授之也以是為賂齊此言取蓋亦賂也魯前年伐邾以邾子益來益齊之甥也畏齊故賂之及闡尺善反惡內也歸邾子益于邾侵齊故也惡烏路反益之名失國也於王法當絶故秋七月冬十有二月癸亥𣏌伯過卒過音戈齊人歸歡及闡凱曰歸邾子故亦還其賂九年春王二月葬𣏌僖公宋皇瑗帥師取鄭師于雍丘雍丘地也雍於用反取易辭也以師而易取鄭病矣以師之重而宋以易得之辭言之則鄭師將劣矣易以䜴反將子匠反夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔公㑹吳伐齊三月戊戍齊侯陽生卒夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊傳例曰惡事不致公㑹夷狄伐齊之喪而致之何也莊六年公至自伐衛傳曰不致則無以見公惡事之成也將冝從此之例以見賢遍反葬齊悼公衛公孟彄自齊歸于衛彄苦侯反薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳十有一年春齊國書帥師伐我夏陳轅頗出奔鄭頗破何反五月公㑹吳伐齊甲戍齊國書帥師及吳戰于艾陵齊師敗績獲齊國書與華元同義女陵齊地艾五蓋反秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛丗叔齊出奔宋十有二年春用田賦古者九夫為井十六井為丘丘賦之法因其田財通共出馬一匹牛三頭今别其田及家財各出此賦言用者非所冝用别如字又彼列反古者公田什一用田賦非正也古者五口之家受田百畒為官田十畝是為私得其什而官稅其一故曰什一周謂之徹殷謂之助夏謂之貢其實一也皆通法也今乃棄中平之法而田財並賦言其賦民甚矣為官于僞反稅舒鋭反夏謂戶雅反夏五月甲辰孟子卒孟子者何也昭公夫人也其不言夫人何也諱取同姓也葬當書姓諱故亦不書葬取如字又七住反公㑹吳于槖臯橐臯某地槖章夜反一音託秋公㑹衛侯宋皇瑗于鄖鄖某地鄖音云宋向巢帥師伐鄭冬十有二月螽螽音終十有三年春鄭罕逹帥師取宋師于嵒嵒五咸反取易辭也以師而易取宋病矣夏許男成卒公㑹晉侯及吳子于黃池及者書尊及卑也黃池某地黃池之㑹吳子進乎哉遂子矣進遂稱子吳夷狄之國也祝髮文身祝斷也文身刻畫其身以為文也必自殘毀者以辟蛟龍之害祝之六反斷音短辟音避蛟音交欲因魯之禮因晉之權而請冠端而襲襲衣冠端玄端其藉于成周藉謂貢獻以尊天王吳進矣吳東方之大國也纍纍致小國以㑹諸侯以合乎中國纍纍猶數數也纍纍如字數數所角反吳能為之則不臣乎言其臣也吳進矣王尊稱也子卑稱也辭尊稱而居卑稱以㑹乎諸侯以尊天王吳王夫差曰好冠來孔子曰大矣哉夫差未能言冠而欲冠也不如冠有差等唯欲好冠尊稱尺證反下同夫差音扶下𥘉佳反楚公子申帥師伐陳於越入吳秋公至自㑹吳進稱子又㑹晉侯故致也晉魏曼多帥師侵衛葬許公九月螽冬十有一月有星孛于東方不書所孛之星而曰東方者旦方見孛衆星皆沒故孛音佩盜殺陳夏區夫傳例曰微殺大夫謂之盜區夫烏侯反十有二月螽十有四年春西狩獲麟杜預曰孔子曰文王既沒文不在兹乎此制作之本旨又曰鳯鳥不至河不出圖吾巳矣夫斯不王之明文矣夫關睢之化王者之風麟之趾關雎之應也然則斯麟之來歸於王德者矣春秋之文廣大悉備義始於隱公道終於獲麟狩手又反不出如字又赤遂反矣夫音扶不王干况反下王德同雎七余反之應于敬反引取之也言引取之者解經言獲也傳例曰諸獲者皆不與也今言獲麟自為孔子來魯引而取之亦不與魯之辭也為于僞反狩地不地不狩也非狩而曰狩大獲麟故大其適也適猶如也之也非狩而言狩大得麟故以大所如者名之也且實狩當言冬不當言春其不言來不外麟於中國也其不言有不使麟不恆於中國也雍曰中國者蓋禮義之鄉聖賢之宅軌儀表於遐荒道風扇於不朽麒麟步郊不為暫有鸞鳯栖林非為權來雖時道喪猶若不喪雖麟一降猶若有恆鸜鵒非魯之常禽蜚蜮非祥瑞之嘉蟲故經書其有以非常有此所以取貴于中國春秋之意義也道喪息浪反鸜音權又音劬鵒音欲蜮音或春秋榖梁卷第十二經傳一阡捌伯陸拾玖字注一阡玖伯捌拾叄字音義肆伯叄拾二字國學進士余仁仲校正國學進士劉子庚同校國學進士陳幾同校國學進士張甫同校奉議郎簽書武安軍節度判官㕔公事陳應行參校
