front:
  text: 春秋穀梁傳昭公第十昭公名稠景王四年即位
  hash: sha256:a9eb74557de7c63f9b0728a40fa18cc7d6e17caffb6a134c2f3d5f47827f2347
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_010-1a}
body:
  text: 范寧集解元年春王正月公即位繼正即位正也叔孫豹㑹晉趙武楚公子圍齊國弱宋向戍衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于郭招上昭反郭左氏作虢三月取鄆鄆魯邑言取者叛戾不服鄆音運夏秦伯之弟針出奔晉諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也針其廉反惡烏路反六月丁巳邾子華卒晉荀吳帥師敗狄于大原太原地大音泰傳曰中國曰大原夷狄曰大鹵號從中國名從主人襄五年注詳矣上郎古反秋莒去疾自齊入于莒莒展出奔吳叔弓帥師疆鄆田疆之為言猶竟也為之境界去起吕反竟音境葬邾悼公冬十有一月已酉楚子卷卒卷音權左氏作麇楚公子比出奔晉二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黑冬公如晉至河乃復乃者亡乎人之辭刺公弱劣受制彊臣恥如晉故著有疾也公凡四如晉季氏欣公于晉侯使不見公公懼不利于已故公託至河有疾而反以殺恥也十二年傳曰季氏不使遂乎晉與此傳互文以見義然則十三年二十一年如晉與此義同二十三年經曰至河乃復是微有疾而反嫌與上四如晉同故明之見去聲季孫宿如晉公如晉而不得入季孫宿如晉而得入惡季孫宿也明晉之不見公季孫宿之所為惡烏路反三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公秋小邾子來朝朝直遙反八月大雩冬大雨雹雨于付反雹皮學反北燕伯𣢾出奔齊其曰北燕從史文也四年春王正月大雨雪雪或為雹雨雪于付反左氏作雨雹夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋丗子佐淮夷㑹于申楚靈王始㑹諸侯也沈音審楚人執徐子稱人以執執有罪秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳衆國之君傾衆悉力以伐彊敵內外之害重故謹而月之定四年伐楚亦月此其例也執齊慶封殺之此入而殺其不言入何也慶封封乎吳鍾離言時殺慶封自于鍾離實不入吳其不言伐鍾離何也不與吳封也慶封其以齊氏何也據巳絶于齊為齊討也靈王使人以慶封令於軍中曰有若齊慶封弒其君者乎謂與崔杼共弒莊公光為于僞反慶封曰子一息我亦且一言曰有若楚公子圍弒其兄之子而代之為君者乎軍人粲然皆笑粲然盛笑貌粲七旦反慶封弒其君而不以弒君之罪罪之者慶封不為靈王服也不與楚討也傳例曰稱人以殺大夫為殺有罪今殺慶封經不稱人故曰不以弒君之罪罪之為于僞反春秋之義用貴冶賤用賢治不肖不以亂治亂也孔子曰懷惡而討雖死不服其斯之謂與與音餘遂滅厲遂繼事也九月取繒冬十有二月乙卯叔孫豹卒五年春王正月舍中軍貴復正也魯次國舊二軍襄十一年立三軍今毀之故曰復正舍音捨楚殺其大夫屈申屈居勿反公如晉夏莒牟夷以牟婁及防兹來奔以者不以者也來奔者不言出以其方向內也及防兹以大及小也莒無大夫其曰牟夷何也以其地來也以地來則何以書也重地也竊地之罪重故不得不録其人秋七月公至自晉戊辰叔弓帥師敗莒師于賁泉賁泉魯地賁泉扶粉反左氏作蚡泉狄人謂賁泉失台號從中國名從主人台湯來反秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳六年春王正月𣏌伯益姑卒葬秦景公夏季孫宿如晉葬𣏌文公宋華合比出奔衛比必里反又毗志反秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕招在元年今曰陳侯之弟招何也曰盡其親所以惡招也盡其親謂既稱公子又稱弟招先君之公子今君之母弟惡烏路反兩下相殺不志乎春秋此其志何也丗子云者唯君之二也云可以重之存焉志之也諸侯之尊弟兄不得以屬通其弟云者親之也親而殺之惡也惡招夏四月辛丑陳侯溺卒溺乃歷反叔弓如晉楚人執陳行人干徴師殺之干姓徵師名稱人以執大夫執有罪也稱行人怨接於上也陳公子留出奔鄭秋搜于紅紅魯地搜所求反紅戶公反正也常事不書而此書者以後比年大搜失禮因此以見正見賢遍反因搜狩以習用武事禮之大者也艾蘭以為防蘭香草也防為田之大限狩手又反艾魚廢反置􅏧以為轅門􅏧旌旗之名周禮通帛為􅏧轅門卬車以其轅表門旒之然反卬車五郎反一音仰本又作昂以葛覆質以為𣙗質椹也𣙗門中臬葛或為褐𣙗魚列反門橛也椹張林反臬魚列反橛也褐户葛反毛布也流旁握御轚者不得入流旁握謂車兩轊頭各去門邊容握握四寸也轚挂則不得入門轚古帝反挂也劉兆云絓也本或作擊轊音衛一音徐歲反車軸頭也挂戶卦反又音封礙也車軌塵塵不出轍焉候蹄發足相應遲疾相投蹄徒兮反馬足也相應應對之應掩禽旅掩取衆禽掩於撿反本亦作掩御者不失其馳然後射者能中不失馳騁之節中丁仲反下皆同過防弗逐不從奔之道也戰不逐奔之義面傷不獻嫌誅降降户江反不成禽不獻惡虐幼少堊烏路反年未傳及注皆同少詩召反禽雖多天子取三十焉其餘與士衆以習射於射宫取三十以共乾豆賔客之庖射宫擇宫共音恭庖步交反射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也射以不爭為仁揖讓為義爭爭鬪之爭陳人殺其大夫公子過過音戈大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐惡楚子也惡其滅人之國放有罪之人反殺無辜之臣故實是楚子而言師葬陳哀公不與楚滅閔之也滅國不葬閔楚夷狄以無道滅之故書葬以存陳九年春叔弓㑹楚子于陳許遷于夷以自遷為丈而地者計復見也夷許地徐邈曰許十八年又遷于白羽許比遷徙所都無常居處淺薄如一邑之移故略而不月不得從國遷常例復扶又反見賢遍反夏四月陳火火左氏作災國曰災邑曰火火不志此何以志閔陳而存之也陳巳滅矣猶書火者不與楚滅也不可以方全國故不云災何休曰月者閔之秋仲孫貜如齊貜俱縛反冬築郎囿囿音又舊于目反苑也十年春王正月夏齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒戊子晉侯彪卒彪彼虬反九月叔孫婼如晉月者為下葬晉平公起為于僞反葬晉平公十有二月甲子宋公成卒不書冬寧所未詳成音城十有一年春王二月叔弓如宋葬宋平公晉獻公以殺丗子申生故不書葬宋平公殺丗子座而書葬何乎何休曰痤有罪故也痤之罪寧所未聞鄭莊公殺弟而書葬以段不弟也何氏將以理例推之然則段不弟也故不書弟痤若不子亦不應書丗子書丗子則痤之罪非不子明矣痤在禾反不弟大帝反又如字下不弟同夏四月丁巳楚子䖍誘蔡侯般殺之于申何為名之也據諸侯不生召䖍其然反或作乾侯般音班夷狄之君誘中國之君而殺之故謹而名之也稱時稱月稱日稱地謹之也蔡侯般弒父之賊此人倫之所不容王誅之所必加禮九在官者殺無赦豈得惡楚子殺般乎若謂夷狄之君不得行禮于中國者理既不通事又不然宣十一年楚人殺陳夏徵舒不言入傳曰明楚之討有罪也似若上下違反不兩立之說嘗試論之曰夫罰不及嗣先王之令典懷惡而討丈夫之醜行楚䖍滅人之國殺人之子伐不以罪亦巳明矣莊王之討徵舒則異於是矣凡罰當其理雖夷必申苟違斯道雖華必抑故莊王得為伯討齊侯不得滅紀趙盾救陳則稱師以大之靈王誘蔡則書名以惡之所以情禮俱暢善惡兩顯豈直惡夷狄之君計中國之亂哉夫楚靈王之殺蔡般亦猶晉惠之戮里克雖伐弒逆之國誅有罪之人不獲討賊之美而有纍謹之名者良有以也得惡烏路反下以惡之豈直惡同陳夏户雅反醜行下孟反罰當丁浪反又如字趙盾徒本反有纍力僞反楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨昭公母胡女歸姓大搜于比蒲夏而言搜蓋用秋搜之禮八年秋搜干紅傳曰正也此月大搜人衆器械有踰常禮時有小君之喪不譏喪搜者重守國之衛安不忘危比音毗械户戒反仲孫貜㑹邾子盟于祲祥祲祥地也祲子鴆反秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人𣏌人于厥憖厥憖地也他大河反憖魚靳反又五轄反九月已亥葬我小君齊歸齊諡冬十有一月丁酉楚師滅蔡執蔡丗子友以歸用之僖十九年邾人執繒子用之傳曰用之者叩其鼻以衈血惡之故謹而日之叩音口衈音二惡烏路反下文及注同此子也諸侯在喪稱子其曰丗子何也不與楚殺也一事注乎志所以惡楚子也一事輒注而志之也何休曰即不與楚殺當貶楚爾何故反貶蔡稱丗子邪鄭君釋之曰滅蔡者楚子也而稱師固巳貶矣楚子思啓封疆而貪蔡誘殺蔡侯般冬而滅蔡殺友惡其淫放其志殺一國二君以取其國故變子言丗子使若不得其君終十有二年春齊髙偃帥師納北燕伯于陽三年所奔齊者髙傒玄孫齊大夫也陽燕别邑不言干燕未得國都也納者內不受也燕伯之不名何也據義不可受則應名以絶之不以髙偃挈燕伯也邵曰公子遂以去公子為挈燕伯以書名為挈者臣且書名故須去公子乃為挈君不可名而以臣名君者不待去燕伯則為挈也是以目燕伯而不書名所以不與髙偃挈之挈苦結反以去起吕反三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復季孫氏不使遂乎晉也五月葬鄭簡公楚殺其大夫成虎秋七月冬十月公子憖出奔齊憗魚靳反楚子伐徐晉伐鮮虞其曰晉狄之也其狄之何也不正其與夷狄交伐中國故狄稱之也鮮虞姬姓白狄也地居中山故曰中國夷狄謂楚也何休曰春秋多與夷狄並伐者何以不狄也鄭君釋之曰晉不見因㑹以綏諸夏而伐同姓貶之可也狄之大重晉為厥憖之㑹實謀救蔡以八國之師而不能救楚終滅蔡今又伐徐晉不紏合諸侯以遂前志舍而伐鮮虞是楚而不如也故狄稱之焉厥愸之㑹榖梁無傳鄭君之說似依左氏寧所未詳是榖梁意非見賢偏反諸夏戶稚反舍音捨十有三年春叔弓帥師圍費費音祕夏四月楚公子比自晉歸于楚弒其君䖍于乾溪乾溪楚地溪苦兮反自晉晉有奉焉爾歸而弒不言歸言歸非弒也傳例曰歸為善自某歸次之然則弒君不得言歸比不弒之一驗也歸一事也弒一事也而遂言之以比之歸弒比不弒也歸弒其事各異自冝别書之而今連言之是比之歸遇君弒爾比不弒之二驗也弒君者日不日比不弒也據文元年丁未楚丗子商臣弒其君髠日此不日比不弒之三驗也髠苦門反楚公子棄疾殺公子比當上之辭也當上之辭者謂不稱人以殺乃以君殺之也稱人以殺謂若衛人殺祝吁于濮是也今比實不弒故以君殺大夫之辭言之吁香于反濮音卜討賊以當上之辭殺非弒也實有弒君之罪則人人皆欲殺冝稱人以殺之今言楚公子棄疾殺公子比明棄疾所殺非弒君之人比之不弒四驗也比之不弒有四上四事取國者稱國以弒若比欲取國而弒君者當直云楚比弒其君䖍不應言公子也若衛祝吁弒其君完齊無知弒其君諸兒之類是也楚公子棄疾殺公子比比不嫌也今棄疾殺之又言殺公子比不言弒其君是比無欲為君之嫌春秋不以嫌代嫌不以亂治亂之義棄疾主其事故嫌也比實無弒君之罪而主殺之者是棄疾欲為君之嫌秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯𣏌伯小邾子于平丘平丘地也八月甲戍同盟于平丘公不與盟公以再如晉不得入故不肯與盟與音豫同者有同也同外楚也公不與盟者可以與而不與譏在公也其日善是盟也公不與盟當從外盟不日今日之善其㑹盟因楚有難而反陳蔡之君有難乃旦反晉人執季孫意如以歸以公不與盟故公至自㑹蔡侯廬歸于蔡陳侯吳歸于陳八年楚滅陳十一年楚滅蔡諸侯㑹而復之故言歸善其成之㑹而歸之故謹而日之二國獲復此盟之功也故於其歸追𫐠前盟謹日之意以美諸侯存亡繼絶非謹陳蔡歸國之日也於盟則發謹日之美於歸則論致美之義此未嘗有國也使如失國辭然者不與楚滅也冬十月葬蔡靈公變之不葬有三變之謂改常禮春秋之常小國夷狄不葬失德不葬無君道弒君不葬謂不討賊如無臣子滅國不葬無臣子也然且葬之不與楚滅且成諸侯之事也蔡靈公弒逆無道以至身死國滅不冝書葬書葬者不令夷狄加乎中國且成諸侯興滅繼絶之善故葬之令力呈反公如晉至河乃復吳滅州來十有四年春意如至自晉大夫執則致致則名意如惡然而致見君臣之禮也大夫有罪則冝廢之既不能廢不得不盡為君臣之恩故曰見君臣之禮見君賢遍反三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒去起吕反冬莒殺其公子意恢恢苦回反言公子而不言大夫莒無大夫也莒無大夫而曰公子意恢意恢賢也曹莒皆無大夫其所以無大夫者其義異也曹叔振鐸文王之子武王封之于曹在甸服之內後削小爾莒巳姓東夷本微國振鐸之慎反下大各反甸徒遍反巳姓音巳一本又音祀十有五年春王正月吳子夷末卒末亡葛反二月癸酉有事于武宫籥入叔弓卒去樂卒事君在祭樂之中聞大夫之喪則去樂卒事禮也祭樂者君在廟中祭作樂籥由若反去起吕反君在祭樂之中大夫有變以聞可乎變謂死喪大夫國體也君之卿佐是謂股肱故曰國體古之人重死君命無所不通死者不可復生重莫大焉是以君雖在祭樂之中大夫死以聞可也復扶又反夏蔡朝吳出奔鄭朝吳蔡大夫六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞冬公如晉十有六年春齊侯伐徐楚子誘戎蠻子殺之楚子不名戎蠻子非中國故夏公至自晉秋八月已亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝朝直遙反夏六月甲戍朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾戎滅夷狄時潞子嬰兒賢則日此月者蓋亦有殊于常戎冬有星孛于大辰一有一亡曰有于大辰者濫于大辰也劉向曰大辰者大火也不曰孛于大火而曰大辰者謂濫于蒼龍之體不獨加大火星孛蒲內反孛于本又作茀音佩楚人及吳戰于長岸長岸楚地雨夷狄曰敗夷狄不能結日成陳故曰敗於越敗吳于檇李是也曰敗必邁反下文及注同成陳直刃反檇李音醉中國與夷狄亦曰敗晉荀吳敗狄于大鹵是也楚人及吳戰于長岸進楚子故曰戰十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災其志以同日也其日亦以同日也或曰人有謂鄭子産曰某日有災子産曰天者神子惡知之是人也同日為四國災也惡音烏六月邾人入鄅鄅音禹又音矩秋葬曹平公冬許遷于白羽白羽許也十有九年春宋公伐邾夏五月戊辰許丗子止弒其君買日弒正卒也蔡丗子般實弒父故以比夷狄而不書日止弒而日知其不弒止不弒則買正卒也正卒則止不弒也不弒而曰弒責止也責止不嘗藥止曰我與夫弒者不立乎其位以與其弟虺止自責曰我與弒君之人同罪於是致君位於弟與夫音豫又如字下音扶虺許鬼反哭泣啜飦粥嗌不容粒嗌喉也啜昌悅反又常悅反飦之然反又居言反粥也粥之六反嗌音益咽喉也容粒音立未踰年而死故君子即止自責而責之也就其有自責心故以備禮責之己卯地震秋齊髙發帥師伐莒冬葬許悼公日卒時葬不使止為弒父也曰子既生不免乎水火母之罪也羈貫成童不就師傅父之罪也羈貫謂交午翦髮以為飾成童八歲以上羈又作羇貫古亂反就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也不敢罪上故言過許丗子止不知嘗藥纍及許君也許君不授子以師傳使不識嘗藥之義故纍及之纍劣僞反二十年春王正月夏曹公孫㑹自夢出奔宋自夢者專乎夢也能専制夢自夢無工反又亡忠反又亡弄反本或作蔑左氏作鄸曹無大夫其曰公孫何也言其以貴取之而不以叛也㑹以公孫之貴而得夢既而不以之叛明曹君無道致令其奔非㑹之罪故書公孫以善之令力呈及秋盜殺衛侯之兄輒盜賤也其曰兄母兄也目衛侯衛侯纍也凱曰諸侯之尊弟兄不得以屬通經不書衛公子而斥言衛侯之兄者惡其不能保護其兄乃為盜所殺故稱至賤殺至責惡其烏路反然則何為不為君也嫡兄冥為君嫡丁歷反曰有天疾者不得入乎宗廟輒者何也曰兩足不能相過齊謂之綦楚謂之踙衛謂之輒綦音其又其兾反劉兆云綦連併也踙女輒反劉兆云聚合不解也輒本亦作縶劉兆云如見絆縶也冬十月宋華亥向寧華定出奔陳徐邈曰月者蓋三卿同出為禍害重也君以以為體民以君為命凡為憂者大害民處甚春秋皆變常文而示所謹非徒足以見時事之實亦知安危監戒云耳處昌慮反以見賢遍反十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛自陳陳有奉焉爾入者內弗受也其曰宋南里宋之南鄙也以者不以者也叛直叛也言不作亂秋七月壬午朔日有食之八月乙亥叔輒卒叔弓之子冬蔡侯東出奔楚東者東國也何為謂之東也王父誘而殺焉楚子䖍誘蔡侯般殺之于申蔡侯東左氏及公羊作蔡侯朱父執而用焉執蔡出子友以歸用之是也奔而又奔之曰東惡之而貶之也奔既罪矣又奔讎國惡莫大焉惡之烏路反公如晉至河乃復二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚自宋南里者專也專制南里大搜于昌間間如字一音簡秋而曰搜此春也其曰搜何也以搜事也夏四月乙丑天王崩六月叔鞅如京師葬景王叔鞅叔弓子天子志崩不志葬志葬危不得以禮葬也月者亦為葬景王起亦為于僞反王室亂亂之為言事未有所成也尹氏立子朝劉氏單氏立王猛俱夫定也劉子單子以王猛居于皇皇地單音善以者不以者也王猛嫌也直言王猛不言王子是有當國之嫌秋劉子單子以王猛入于王城以者不以者也入者內弗受也猛非正也冬十月王子猛卒此不卒者也未成君也其曰卒失嫌也猛本有當國之嫌其卒則失嫌故録之十有二月癸酉日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼晉人圍郊郊周邑也夏六月蔡侯東國卒于楚不日在外也以罪出奔又奔讎國故不葬秋七月莒子庚輿來奔戊辰吳敗頓胡沈蔡陳許之師于雞甫雞甫楚地雞甫左氏作雞胡子髠沈子盈滅國雖存君死曰滅髠苦門反盈本亦作逞中國不言敗此其言敗何也據宣十二年晉荀林父及楚子戰于邲晉師敗績不言楚敗晉師中國不敗胡子髠沈子盈其滅乎其言敗釋其滅也若師不敗則君無由滅也賢胡沈之君死社稷獲陳夏齧獲者非與之辭也賢夏齧雖獲不病以其得衆也義與華元同夏户雅反齧五結反上下之稱也君死曰滅臣得曰獲君臣之稱之稱尺證反注之稱同天王居于狄泉敬㠪辟子朝狄泉周地辝音避始王也其曰天王因其居而王之也天子踰年即位稱王敬王踰年而出故曰始王雖不在國行即位之禮王者以天下為家故居于狄泉稱王尹氏立王子朝隱四年衛人立晉傳曰稱人以立得衆也此言尹氏立明唯尹氏欲立之立者不冝立者也朝之不名何也據晉之名惡今朝亦惡怪不直名而言王子惡烏路反下同别嫌乎尹氏之朝也若但言尹氏立朝則嫌朝是尹氏之子故言王子以别之别彼列反八月乙未地震冬公如晉至河公有疾乃復疾不志此其志何也釋不得入乎晉也二十有四年春王二月丙戍仲孫貜卒婼至自晉大夫執則致致則挈由上致之也上謂宗廟也致臣于廟則直名而巳所謂君前臣名挈苦結反夏五月乙未朔日有食之秋八月大雩丁酉𣏌伯郁釐卒釐力之反冬吳滅巢葬𣏌平公二十有五年春叔孫婼如宋夏叔倪㑹晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薜人小邾人于黃父有鸜鵒來巢一有一亡曰有來者來中國也鸜鵒不渡濟非中國之禽故曰來鸜其俱反本又作鸛音權左氏作鸜公羊作鸛鵒音欲濟子禯反鸜鵒穴者而曰巢劉向曰去穴而巢此隂居陽位臣逐君之象也或曰增之也如增言巢爾其實不巢也雍曰凡春秋記災異未有妄加之文或說非也秋七月上辛大雩季辛又雩季者有中之辭也不言中辛中辛無事又有繼之辭也緣有上辛大雩故言又也九月乙亥公孫于齊孫之為言猶孫也諱奔也次于陽州次止也陽州齊竟上之地未敢直前故止竟也公孫音遜本亦作遜下同齊竟音境下同齊侯唁公于野井野井齊地齊侯來唁公公逆之至野井唁音彥弔失國曰唁唁公不得入於魯也冬十月戊辰叔孫婼卒十有一月已亥宋公佐卒于曲棘曲棘宋也邡公也邡當為訪訪謀也言宋公所以卒于曲棘者欲謀納公邡音方又音訪十有二月齊侯取鄆取鄆以居公取易辭也內不言取以其為公取之故易言之也易以䜴反為于僞反二十有六年春王正月葬宋元公三月公至自齊居于鄆公次于陽州其曰至自齊何也據公但至陽州未至齊以齊侯之見公可以言至自齊也齊侯唁公于野井以親見齊侯為重故可言至自齊居于鄆者公在外也若但言公至自齊而不言居干鄆則公得歸國欲明公實在外故言居于鄆至自齊道義不外公也至自齊者臣子喜君父得反致宗廟之辭爾今君雖在外猶以在國之禮録之是崇君之道夏公圍成成孟氏邑非國不言圍所以言圍者以大公也崇大其事秋公㑹齊侯莒子邾子𣏌伯盟于鄟陵鄟陵某地鄟陵音專又市轉反公至自㑹居于鄆公在外也至自㑹道義不外公也九月庚申楚子居卒冬十月天王入于成周周有入無出也始即位非其所今得還復據宗廟是內故可言入若即位在廟則王者無外不言出尹氏召伯毛伯以王子朝奔楚逺矣非也雍曰奔篡君之賊其責逺矣召上照反篡𥘉患反奔直奔也二十有七年春公如齊自鄆行公至自齊居于鄆公在外也夏四月吳弒其君僚僚力雕反楚殺其大夫郤宛宛於阮反又於元反秋晉士鞅宋樂祁犁衛北宫喜曹人邾人滕人㑹于扈祁犁力兮反又力私反扈音户冬十月曹伯午卒邾快來奔徐邈曰自此巳前邾卑我庶其並來奔今邾快又至三叛之人俱以魯為主邾魯鄰國而聚其逋逃為過之甚故悉書之以示譏也小國無大夫故但舉名而略其氏邾快苦夬反卑必二反本或作鼻逋逃布吳反公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯不得入于晉乾侯晉地公在外也夏四月丙戍鄭伯寧卒寧下滕子寧皆如字六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆以乾侯致不得見晉侯故齊侯使髙張來唁公唁公不得入於魯也公如晉次于乾侯夏四月庚子叔倪卒季孫意如曰叔倪無病而死此皆無公也是天命也非我罪也言叔倪欲納公無病而死此皆天命使魯無君爾魯公之出非我罪叔倪五計反又五兮反左氏作詣秋七月冬十月鄆潰潰之為言上下不相得也上下不相得則惡矣亦譏公也公既出奔不能改德修行居鄆小邑復使潰亂德之不建如此之甚潰戶內反惡烏路反又如字行下孟反復扶又反昭公出奔民如釋重負傳明昭公有過非但季氏之罪三十年春王正月公在乾侯中國不存公存公故也中國猶國中也夏六月庚辰晉侯去疾卒去起吕反秋八月葬晉頃公頃音傾冬十有二月吳滅徐滅夷狄時月者為下奔起為于僞反徐子章羽奔楚奔而名者有罪惡也惡烏洛反三十有一年春王正月公在乾侯季孫意如㑹晉荀櫟于適歷適歷晉地擽音歷舊作躒適丁歷反夏四月丁巳薛伯榖卒晉侯使荀櫟唁公于乾侯唁公不得入於魯也曰既為君言之矣不可者意如也言巳巳告魯求納君唯意如不肯為于僞反秋葬薛獻公冬黑肱以濫來奔其不言邾黑肱何也據襄二十一年邾庶其以漆閭丘來奔言邾肱古弘反濫力甘反又力暫反别乎邾也邾以濫邑封黑肱故别之若國别彼列反其不言濫子何也據既别之為國則應書其爵非天子所封也來奔內不言叛也十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞闞暫反夏吳伐越秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛大叔申鄭國參曹人莒人邾人薛人𣏌人小邾人城成周天子微諸侯不享覲享獻也覲見也言天子微弱四方諸侯不復貢獻又無朝見之禮大音泰享許丈反覲其靳反見賢遍反復扶又反朝直遙反天子之在者惟祭與號祭謂郊上帝號謂稱王故諸侯之大夫相帥以城之此變之正也十有二月己未公薨于乾侯春秋榖梁卷第十經傳肆阡一伯玖拾玫字注叁阡叄伯肆拾一字音義一阡零陸拾字仁仲比校訖
