front:
  text: 春秋榖梁傳桓公第二桓公名允桓王九年即位
  hash: sha256:e940de3e3979ec7963398e1073ee83d2d7d732ca845742cb569c4c05fa1a920d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_002-1a}
body:
  text: 范寗集解元年春王桓無王其曰王何也謹始也諸侯無專立之道必受國於王若桓初立便以見治故詳其即位之始以明王者之義其曰無王何也桓弟弑兄臣弑君天子不能定諸侯不能救百姓不能去以爲無王之道遂可以至焉爾元年有王所以治桓也正月公即位杜預曰嗣子位定於初䘮而改元必須踰年者繼父之業成父之志不忍有變於中年也諸侯毎首歳必有禮於廟諸遭䘮繼位者因此而改元即位百官以序故國史亦書即位之事於䇿去上聲繼故不言即位正也故謂弑也繼故不言即位之爲正何也曰先君不以其道終則子弟不忍即位也哀痛之至故不忍行即位之禮繼故而言即位則是與聞乎弑也繼故而言即位是爲與聞乎弑何也曰先君不以其道終巳正即位之道而即位是無恩於先君也推其無恩則知與弑也此明統例耳與弑尚然况親弑者與聞音豫下文及注與弑皆同三月公㑹鄭伯于垂垂衛地也傳例曰往月危往也桓大惡之人故㑹皆月以危之㑹者外爲主焉爾鄭伯所以欲爲此㑹者爲易田故爲易于僞反鄭伯以璧假許田假不言以言以非假也實假則不應言以璧非假而曰假諱易地也禮天子在上諸侯不得以地相與也諸侯受地於天子不得自專無田則無許可知矣不言許不與許也但言以璧假許而不繼田則許屬鄭也今言許田明以許之田與鄭不與許邑也諸侯有功則賜田以禄之若可以借人此蓋不欲以實言借子夜反許田者魯朝宿之邑也邴者鄭伯之所受命而祭泰山之邑也用見魯之不朝於周而鄭之不祭泰山也朝天子所宿之邑謂之朝宿泰山非鄭竟内從天王廵守受命而祭也擅相換易則知朝祭並廢魯朝直遥反下皆同邴彼病反又音丙見賢徧反竟音境從在用反守音狩擅市戰反換一本亦作逭胡喚反夏四月丁未公及鄭伯盟于越越衛地也及者内爲志焉爾越盟地之名也秋大水禮月令曰季秋行夏令則其國大水大水例時髙下有水災曰大水冬十月無事焉何以書不遺時也春秋編年四時具而後爲年編録編必連反字林聲類韻集皆布千反史記音義甫連反二年春王正月戊申宋督弑其君與夷宋督宋之卑者卑者以國氏督丁毒反與如字又音餘桓無王其曰王何也正與夷之卒也諸侯之卒天子所隱痛姦逆之人王法所冝誅故書王以正之及其大夫孔父孔父先死其曰及何也書尊及卑春秋之義也邵曰㑹盟言及别内外也尊卑言及上下序也别彼列反孔父之先死何也督欲弑君而恐不立於是乎先殺孔父孔父閑也閑謂扞禦殺並如字扞下旦反何以知其先殺孔父也曰子旣死父不忍稱其名臣旣死君不忍稱其名以是知君之累之也累謂從也孔氏父字謚也孔父有死難之勲故其君以字爲謚難乃旦反或曰其不稱名蓋爲祖諱也孔子故宋也孔子舊是宋人孔父之玄孫爲于僞反滕子來朝隱十一年稱侯今稱子盖時王所黜三月公㑹齊侯陳侯鄭伯于稷以成宋亂稷宋地也以者内爲志焉爾公爲志乎成是亂也欲㑹者外也欲受賂者公也此成矣取不成事之辭而加之焉於内之悪而君子無遺焉爾取不成事之辭謂以成宋亂也桓姦逆之人故極言其惡無所遺漏也江熈曰春秋親尊皆諱蓋患惡之不可掩豈當取不成事之辭以加君父之惡乎案宣四年公及齊侯平莒及郯傳曰平者成也然則成亦平也公與齊陳鄭欲平宋亂而取其賂鼎不能平亂故書成宋亂取郜大鼎納于大廟微旨見矣㝷理推經傳似失之徐邈曰宋雖巳亂治之則治治亂成不繫此一㑹若諸侯討之則有撥亂之功不討則受成亂之責辭豈虚加也哉春秋雖爲親尊者諱然亦不没其實故納鼎于廟躋僖逆祀及王室之亂昭公之孫皆指事而書哀七年傳所謂有一國之道者有天下之道者也君失社稷猶書而不隱况今四國羣㑹非一人之過以義致譏輕於自巳兆亂以此方彼無所多怪郯音談大廟音泰下文及注同見賢徧反躋子兮反夏四月取郜大鼎于宋戊申納于大廟傳例曰納者内不受也日之明惡甚也太廟周公廟郜古報反桓内弑其君外成人之亂受賂而退以事其祖非禮也其道以周公爲弗受也郜鼎者郜之所爲也曰宋取之宋也此鼎本郜國所作宋後得之以是爲討之鼎也討宋亂而更受其賂鼎爲討之鼎如字麋氏云討或作糾孔子曰名從主人物從中國故曰郜大鼎也主人謂作鼎之主人也故繫之郜物從中國謂是大鼎秋七月紀侯來朝隱二年稱子今稱侯盖時王所進紀侯左氏作𣏌侯朝時此其月何也據隱十一年春滕侯薛侯來朝稱時桓内弑其君外成人之亂於是爲齊侯陳侯鄭伯計數日以賂桓旣罪深責大乃復爲三國計數至日以責宋賂爲齊于僞反下同數色主反注同復扶又反巳即是事而朝之惡之故謹而月之也已紀也桓與諸侯校數功勞以取宋賂不知非之爲非貪愚之甚紀不擇其不肖而就朝之惡烏路反蔡侯鄭伯㑹于鄧鄧某地某地不知其國故云某後放此九月入𣏌我入之也不稱主名内之卑者公及戎盟于唐冬公至自唐告廟曰至傳例曰致君者殆其往而喜其反此致君之意義也離不言㑹故以地致桓無㑹而其致何也逺之也桓㑹甚衆而曰無㑹盖無致㑹也弑逆之罪非可以致宗廟而今致者危其逺㑹戎狄喜其得反三年春正月公㑹齊侯于嬴嬴齊地嬴音盈夏齊侯衛侯胥命于蒲蒲衛地胥之爲言猶相也相命而信諭謹言而退以是爲近古也申約言以相逹不㰱血而誓盟古謂五帝時近附近之近約如字又於妙反㰱本又作喢所洽反是必一人先其以相言之何也不以齊侯命衛侯也江熙曰夫相與親比非一人之徳是以同聲相應同氣相求齊衛胥盟雖有先倡倡和理均若以齊命衛則功歸干齊以衛命齊則齊僅随從言其相命則泯然無際矣比毗志反應應對之應僅巨靳反泯亡忍反六月公㑹𣏌侯于郕郕魯地郕音成秋七月壬辰朔日有食之旣言日言朔食正朔也朔日食也旣者盡也有繼之辭也盡而復生謂之旣復扶又反公子翬如齊逆女翬稱公子者桓不以爲罪人也逆女親者也使大夫非正也九月齊侯送姜氏于讙巳去齊國故不言女未至干魯故不稱夫人讙魯地月者重録之于讙音歡禮送女父不下堂母不出祭門諸母兄弟不出闕門祭門廟門也闕兩觀也在祭門之外觀古亂反父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎從爾父母之言般囊也所以盛朝夕所須以備舅姑之用般歩干反一本作鞶音同盛音成送女踰竟非禮也踰竟音境公㑹齊侯于讙無譏乎齊侯送女踰竟逺至于讙嫌㑹非禮之人當有譏曰爲禮也齊侯來也公之逆而㑹之可也爲親逆之禮夫人姜氏至自齊其不言翬之以來何也據宣元年遂以夫人婦姜至自齊公親受之于齊侯也重在公子貢曰冕而親迎不巳重乎冕祭服迎魚敬反一本作逆孔子曰合二姓之好以繼萬丗之後何謂巳重乎好呼報反冬齊侯使其弟年來聘有年有年例時五榖皆熟爲有年也四年春正月公狩于郎春而言狩盖用冬狩之禮蒐狩例時而此月者重公失禮也莊四年冬公及齊人狩于郜傳曰齊人者齊侯也其曰人何也卑公之敵所以卑公也然則言齊人者所以人公則譏巳明矣狩得其時故不月四時之田皆爲宗廟之事也春曰田取獸於田爲于僞反夏曰苗因爲苗除害故曰苗秋曰蒐蒐擇之舍小取大蒐所由反麋氏本又作捜音同舎音捨冬曰狩狩圍狩也冬物畢成獲則取之無所擇四時之田用三焉唯其所先得一爲乾豆上殺中心死速乾之以爲豆實可以祭祀中丁仲反下同二爲賔客次殺射髀髂死差遟射食亦反髀歩啓反又必邇反髂苦嫁反差𥘉賣反三爲充君之庖下殺中腸汚泡死最遟先宗廟次賔客後庖厨尊神敬客之義庖歩交反汚汗穢之汚泡普交反又百交反夏天王使宰渠伯糾來聘宰官也渠氏也天子下大夫老故稱字下無秋冬二時寗所未詳五年春正月甲戍已丑陳侯鮑卒鮑卒何爲以二日卒之春秋之義信以傳信疑以傳疑明實録也傳直專反陳侯以甲戍之日出已丑之日得不知死之日故舉二日以包也國君獨出必辟病潜行必辟音避本又作避夏齊侯鄭伯如紀外相如不書過我則書例時過我古禾反下文及注同天王使任叔之子來聘任叔天子之大夫任叔音壬左氏作仍叔任叔之子者録父以使子也故微其君臣而著其父子不正父在子代仕之辭也録父使子謂不氏名其人稱父言子也君闇劣於上臣苟進於下盖參譏之葬陳桓公城祝丘譏公不脩徳政恃城以安民秋蔡人衛人陳人從王伐鄭王親自伐鄭從才用反又如字下同舉從者之辭也使若王命諸侯伐鄭書從王命者三國也其舉從者之辭何也爲天王諱伐鄭也諱自伐鄭爲干僞反鄭同姓之國也在乎兾州於是不服爲天子病矣鄭姬姓之國兾州則近京師親近猶不能服則䟽逺者可知兾州案鄭本京兆鄭縣是雍州之域後徙河南新鄭爲豫州之境兾在兩河之間非鄭都也異州言去京師近也麋氏云韓侯滅鄭韓本都兾州故以目鄭近附近之近大雩雲者旱祭請兩之名傳例曰雩得雨曰雩不得雨曰旱月雩正也時雩不正也禮月令曰仲冬行夏令則其國乃旱雩音于祭名螽蜙蝑之属禮月令曰仲冬行春令則蟲蝗爲敗螽音終蜙相容反蝑音壻蝗華􅎺反螽蟲災也甚則月不甚則時冬州公如曹外相如不書此其書何也過我也過我六年寔來是也將有其未故先録其本六年春正月寔來來朝例時月者謹其無禮寔常式反朝直遥反下七年同寔來者是來也何謂是來謂州公也其謂之是來何也以其畫我故簡言之也諸侯不以過相朝也畫是相過去朝逺畫音獲注同以過古禾反注同夏四月公㑹紀侯于郕紀侯左氏作𣏌侯秋八月壬午大閱蒐閱例時閱音恱大閱者何閱兵車也閱爲簡練脩教明諭國道也脩先王之教以明逹於民治國之道乎而脩戎事非正也邵曰禮因四時田獵以習用戎事存不忘亡安不忘危之道平謂不因田獵無事而脩之其日以爲崇武故謹而日之蓋以觀婦人也觀古亂反視也蔡人殺陳佗陳佗者陳君也其曰陳佗何也匹夫行故匹夫稱之也其匹夫行奈何陳侯憙獵淫獵于蔡與蔡人争禽蔡人不知其是陳君也而殺之淫獵謂自放恣遺失徒衆陳佗徒河反行下孟反憙虚記反何以知其是陳君也兩下相殺不道兩大夫相殺不書春秋其不地於蔡也九月丁卯子同生子同桓公嫡子莊公嫡丁歷反或作適疑故志之莊公母文姜淫于齊襄疑非公之子時曰同乎人也時人僉曰齊侯之子同於他人僉七廉反冬紀侯來朝七年春二月已亥焚咸丘日之謹其惡惡烏各反其不言邾咸丘何也據襄元年圍宋彭城言宋疾其以火攻也不繫於國者欲使焚邑之罪與焚國同夏榖伯綏來朝鄧侯吾離來朝其名何也據隱十一年滕薛來朝不名失國也禮諸侯不生名失地則名失國則其以朝言之何也據文十二年郕伯來奔不言朝甞以諸侯與之接矣雖失國弗損吾異日也待之以𥘉也下無秋冬二時寗所未詳八年春正月已卯烝春祭曰祠薦尚韭卵夏祭曰禴薦尚麥魚秋祭曰甞薦尚黍肫冬祭曰烝薦尚稻鴈無牲而祭曰薦薦而加牲曰祭禮各異也失禮祭祀例日得礼者時定八年冬從祀先公是也僖八年秋七月禘于大廟月者謹用致夫人耳禘無違禮烝之承反曰禴餘若反又作礿黍肫本又作豚徒門反大廟音泰下同烝冬事也春興之志不時也天王使家父來聘家夫天子大夫家氏父字夏五月丁丑烝烝冬事也春夏興之黷祀也志不敬也黷徒木反秋伐邾冬十月雨雪禮月令曰孟冬行秋令則霜雪不時兩于付反祭公來遂逆王后于紀祭公寰内諸侯爲天子三公者親逆例時不親逆例月故春秋左氏說曰王者至尊無敵無親逆之禮祭公逆王后未到京師而稱后知天子不行而禮成也鄭君釋之曰大姒之家在郃之陽在渭之涘文王親迎于渭即天子親迎之明丈矣天子雖尊其于后猶夫婦夫婦判合禮同一體所謂無敵豈施此哉禮記哀公問曰冕而親迎不巳重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以爲天地宗廟社稷之主君何謂巳重焉此言親迎繼先聖之後爲天地宗廟社稷之主非天子則誰乎祭公側界反寰音縣又音環親迎魚敬反注皆同大姒音似大姒文王妃也郃音洽本又作洽涘音仕愀在九反又親小反之好呼報反其不言使焉何也據四年天王使宰渠伯糾稱使不正其以宗廟之大事即謀於我故弗與使也時天子命祭公就魯共卜擇紀女可中后者便逆之不復反命復扶又反遂繼事之辭也其曰遂逆王后故略之也以其遂逆無禮故不書逆女而曰王后略謂不以禮稱之或曰天子無外王命之則成矣四海之濵莫非王臣王命紀女爲后則巳成王后不如諸侯入國乃稱夫人或說是九年春紀季姜歸于京師季姜桓王后書字者申父母之尊姜紀姓爲之中者歸之也中謂關與婚事之中丁仲反又如字注同與音豫夏四月秋七月冬曹伯使其丗子射姑來朝朝不言使言使非正也使丗子伉諸侯之禮而來朝曹伯失正矣諸侯相見曰朝以待人父之道待人之子以内爲失正矣内失正曹伯失正丗子可以巳矣則是放命稱忽去起吕反柔㑹宋公陳侯蔡叔盟于折蔡叔蔡大夫名未命故不氏折某地折之設反又時設反柔者何吾大夫之未命者也公㑹宋公于夫鍾夫鍾郕地夫音扶麋氏本鍾作童音鍾冬十有二月公㑹宋公于闞闞魯地闞口暫反十有二年春正月夏六月壬寅公㑹紀侯莒子盟于曲池曲池魯地秋七月丁亥公㑹宋公燕人盟于榖丘榖丘宋地燕音煙國名八月壬辰陳侯躍卒陳厲公也躍餘若反公㑹宋公于虚虚宋地虚如字又去魚反冬十有一月公㑹宋公于龜龜宋地丙戍公㑹鄭伯盟于武父武父鄭地父音甫丙戍衞侯晉卒再稱日決日義也明二事皆當日也晉不正非日卒者也不正前見矣隱四年衛人立晉是也與齊小白義同見賢徧反十有二月及鄭師伐宋丁未戰于宋非與所與伐戰也非責不言與鄭戰恥不和也於伐與戰敗也内諱敗舉其可道者也於伐宋而與鄭戰内敗也戰輕於敗戰可道而敗不可道十有三年春二月公㑹紀侯鄭伯已巳及齊侯宋公衞侯燕人戰齊師宋師衛師燕師敗績徐貌曰僖九年傳曰禮柩在堂上孤無外事今衛宣未葬而嗣子稱侯以出其失禮明矣宋陳稱子而衛稱侯隨其所以自稱者而書之得失自見矣柩其救反見賢徧反其言及者由内及之也其曰戰者由外言之也内不言戰言戰則敗今魯與紀鄭同討以有紀鄭故可得言戰戰稱人敗稱師重衆也其不地於紀也春秋戰無不地即於紀戰無爲不地也鄭君曰紀當爲己謂在魯也字之誤耳時在龍門城下之戰迫近故不地三月葬衞宣公夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹無冰皆君不明去就政治紓緩之所置五行傳曰視之不明是謂不哲厥咎舒厥罰常燠哲陟列反一本作晢之列反燠於六反煖也下丈同無冰時燠也夏五夏五本或有月者非鄭伯使其弟禦來盟諸侯之尊弟兄不得以屬通其弟云者以其來我舉其貴者也來盟前定也不日前定之盟不日言信在前非結於今禦魚吕反本亦作御左氏作語孔子曰聽逺音者聞其疾而不聞其舒疾謂激揚之聲舒謂徐緩望逺者察其貌而不察其形貌姿躰形容色立乎定哀以指隱桓隱桓之日逺矣夏五傳疑也孔子在於定哀之丗而録隱桓之事故承闕文之疑不書月明皆實録傳直專反秋八月壬申衘廪災御廪藏公所親耕以奉粢盛之倉也内災例日廪力甚反乙亥甞御廪之災不志以其微此其志何也以爲唯未易災之餘而甞可也志不敬也鄭嗣曰唯以未易災之餘而甞然後可志也用火焚之餘以祭宗廟非人子所以盡其心力不敬之大也盡津忍反天子親耕以共粢盛天子親耕其禮三推黍稷曰粢在器曰盛共音恭一本作㳟粢音咨推昌誰反一音他回反王后親蠶以共祭服王后親𧖟齊戒躬桑夫人三繅遂班三宫朱緑玄黄以爲黼黻文章服旣成君服以祀之齊戒側皆反本亦作齋繅先刀反黼音甫亦作黼黻音弗俗作紱國非無良農工女也以爲人之所盡事其祖襧不若以己所自親者也凱曰夫治人之道莫急於禮禮有五經莫重於祭祭者非物自外至者也由中出者身致其誠信然後可以交於神明祭之道也禰乃禮反何用見其未易災之餘而甞也曰甸粟而内之三宫三宫米而藏之御廪甸甸師掌田之官也三宫三夫人也宗廟之禮君親割夫人親舂親舂傷容反夫甞必有兼甸之事焉夫人親舂是兼甸之事兼甸如字一本作旬十日爲旬注亦然壬申御廩災乙亥甞以爲未易災之餘而甞也鄭嗣曰壬申乙亥相去四日言用日至少而功多明未足及易而甞冬十有二月丁巳齊侯禄父卒宋人以齊人蔡人衞人陳人伐鄭以者不以者也民者君之本也使人以其死非正也不以者謂本非所得制今得以之也刺四國使宋專用其師輕民命也刺七賜反十有五年春二月天王使家父來求車古者諸侯時獻于天子以其國之所有故有辭讓而無徴求求車非禮也求金甚矣文九年毛伯來求金三月乙未天王崩桓王夏四月已巳葬齊僖公五月鄭伯突出奔蔡譏奪正也禮諸侯不生名今名突以譏之鄭丗子忽復歸于鄭反正也許叔入于許傳例曰太夫出奔反以好曰歸以惡曰入許叔許之貴者也莫冝乎許叔其曰入何也其歸之道非所以歸也泰曰許國之貴莫過許叔叔之冝立又無與二而進無王命退非父授故不書曰歸同之惡入公㑹齊侯于蒿蒿左氏作艾公羊作鄗邾人牟人葛人來朝何休曰桓公行惡而三人俱朝事之三人爲衆衆足責故夷狄之行下孟反又如字秋九月鄭伯突入于櫟櫟鄭邑也突不正書入明不當受櫟力狄反冬十有一月公㑹宋公衛侯陳侯于袲伐鄭袲宋地袲昌氏反地而後伐疑辭也非其疑也鄭突欲篡國伐而正之義也不應疑故責之十有六年春正月公㑹宋公蔡侯衛侯于曹夏四月公㑹宋公衞侯陳侯蔡侯伐鄭蔡常在衞上今序陳下蓋後至秋七月公至自伐鄭桓無㑹其致何也危之也桓公再助篡伐正危殆之甚喜得全歸故致之冬城向向舒亮反十有一月衛侯朔出奔齊朔惠公名朔之名惡也天子召而不往也十有七年春正月丙辰公㑹齊侯紀侯盟于黃黄齊地二月丙午公及邾儀父盟于趡趡魯地趡翠軌反夏五月丙午及齊師戰于郎内諱敗舉其可道者也敗恥大戰恥小戰于郎左氏作于奚不言其人以吾敗也言人則微者敗於微者其恥又甚故言師不言及之者爲内諱也及當有人公親帥之恥大不可言爲于僞反六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡蔡季蔡之貴者也自陳陳有奉焉爾陳以力助癸巳葬蔡桓侯徐邈曰葬者臣子之事故書葬皆以公配謚此稱侯蓋蔡臣子失禮故即其所稱以示過及宋人衞人伐邾冬十月朔日有食之言朔不言日食旣朔也旣盡也盡朔一日至明日乃食是月二日食也十有八年春王正月公㑹齊侯于濼此年書王以王法終治桓之事濼力沃反又音洛舊音匹沃反公與夫人姜氏遂如齊公本與夫人俱行至濼公與齊侯行㑹禮故先書㑹濼既㑹而相隨至齊故曰遂遂繼事之辭他皆放此濼之㑹不言及夫人何也據夫人實在當言公及夫人姜氏㑹齊侯于濼以夫人之伉弗稱數也濼之㑹夫人驕伉不可言及故舎而弗數今書遂如齊欲録其致變之由故不可以不書實驕伉而不制故不言及伉本又作亢苦浪反數色户反舎音捨夏四月丙子公薨于齊夫人與齊謀殺之不書諱也魯公薨正與不正皆日所以别内外也别内外彼列反其地於外也薨稱公舉上也公五等之上丁酉公之䘮至自齊秋七月冬十有二月己丑葬我君桓公葬我君接上下也言我君舉國上下之辭君弑賊不討不書葬此其言葬何也據隱公不書葬不責踰國而討于是也禮君父之讎不與共戴天而曰不責踰國而討于是者時齊強大非已所討君子即而恕之以申臣子之恩桓公葬而後舉謚謚所以成德也於卒事乎加之矣謚者行之迹所以表德人之終卒事畢於葬故於葬定稱號也昔武王崩周公制謚法大行受大名小行受小名所以勤善而懲惡禮天子崩稱天命以謚之諸侯薨天子謚之卿大夫卒受謚於其君行之下孟反下同稱尺證反知者慮義者行仁者守有此三者備然後可以㑹矣桓無此三者而出㑹大國所以見殺知音智守如字又音狩春秋榖梁卷第二經傳叄阡零伍拾叄字注叄阡柒伯捌拾肆字音義壹阡零貳拾肆字余仁仲刋于家塾
