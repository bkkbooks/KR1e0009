front:
  text: 春秋榖梁傳序昔周道衰陵乾綱絶紐乾其連反天也紐女乆反禮壊樂崩彝倫攸斁彞倫以之反彞常倫理也攸斁丁故反字書作殬敗也弑逆篡盗者國有弑申志反又作殺音同篡盗􅀄患反爾雅云取也􅁋縱破義者比肩􅁋縱子用反是以妖災因釁而作釁許靳反民俗染化而遷隂陽爲之愆度爲之于僞反下同七耀爲之盈縮縮所大反川岳爲之崩竭􅀑神爲之疵厲疵才斯反厲音例又作癘故父子之恩缺則小弁之刺作缺丘恱反弁歩寒反刺七賜反此所引皆詩篇名谷風在􅆁風餘皆小雅君臣之禮廢則桑扈之諷興扈音戸諷方鳯反又作風夫婦之道絶則谷風之篇奏骨肉之親離則角􅃓之怨彰君子之路塞則白駒之詩賦天垂象見􅁻凶見賢徧反聖作訓紀成敗欲人君戒愼厥行行下孟反増修徳政蓋誨爾諄諄聽我藐藐藐亡角反履霜堅冰所由者漸四夷交侵華戎同貫幽王以􅁀虐見禍平王以微弱東遷征伐不由天子之命號令出自權臣之門故兩觀表而臣禮亡觀古亂反朱干設而君權䘮䘮息浪反下道䘮同下陵上替僣逼理極替他計反僣子念反天下蕩蕩王道盡矣孔子覩滄海之橫流廼喟然而嘆曰喟起愧反又苦怪反文王旣没文不在兹乎言丈王之道䘮興之者在已於是就大師而正雅頌大師音泰因魯史而脩春秋列􅁰離於國風齊王徳於􅀖君所以明其不能復雅復扶又反政化不足以􅀍羣后也􅀍皮義反於時則接乎隱公故因兹以託始該二儀之化育賛人道之幽變舉得失以彰黜陟明成敗以著勸誡拯頽綱以繼三五拯拯救之拯頽徒回反鼔芳風以扇遊塵一字之襃寵踰華衮之贈衮古本反衮冕上公之服片言之貶辱過市朝之撻貶彼撿反市朝直遥反撻吐逹反徳之所助雖賤必申義之所抑雖貴必屈故附􅀔匿非者無所逃其罪匿女力反潜徳獨運者無所隱其名信不易之宏􅁤百王之通典也先王之道旣􅀪麟感化而來應麟本又作驎吕辛反瑞獸也應應對之應因事備而終篇故絕筆於斯年成天下之事業定天下之邪正邪似嗟反莫善於春秋春秋之傳有三而爲經之旨一臧否不同臧子郎反否音鄙又方九反臧否猶善惡也襃貶殊致蓋九流分而微言隱異端作而大義乖左氏以鬻拳兵諌爲愛君鬻音育拳音權文公納幣爲用禮榖梁以衞輒拒父爲尊祖不納子糾爲内惡糾居􅉳反公羊以祭仲廢君爲行權􅀕側界反妾母稱夫人爲合正以兵諌爲愛君是人主可得而脅也以納幣爲用禮是居䘮可得而㛰也以拒父爲尊祖是爲子可得而叛也以不納子糾爲内惡是仇讎可得而容也以廢君爲行權是神器可得而闚也闚本又作竀去規反以妾母爲夫人是嫡庻可得而齊也嫡丁歷反本又作適亦同若此之􅀋傷教害義不可得強通者也強其丈反凡傳以通經爲主經以必當爲理當丁浪反下同夫至當無二而三傳殊說庸得不棄其所滯擇善而從乎旣不俱當則固容俱失若至言幽絶擇善靡從庸得不並舎以求宗據理以通經乎舎以音捨雖我之所是理未全當安可以得當之難而自絶於希通哉難乃旦反而漢興以來􅉞望碩儒􅉞古回反各信所習是非紛錯錯七洛反準裁靡定裁在伐反又音才下同故有父子異同之論石渠分争之說父子異同謂劉向好榖梁劉歆善左氏之論力困反石渠其居反閣名漢宣帝時使諸儒講論同異於石渠閣也分争争闘之争廢興由於好惡好呼報反惡烏路反盛衰繼之辯訥字書云訥或作呐乃骨反字詁云訥遟於言也包咸論語注云遲鈍也斯蓋非通方之至理誠君子之所歎息也左氏豔而冨其失也巫豔移驗反巫音無榖梁清而婉其失也短婉於阮反公羊辯而裁其失也俗若能冨而不巫清而不短裁而不俗則深於其道者也故君子之於春秋没身而巳矣升平之末歳次大梁先君北蕃廻軫蕃方元反又作藩頓駕于呉乃帥門生故吏我兄弟子姪姪徒節反字林文一反杜預注左氏傳云兄子曰姪研講六籍次及三傳左氏則有服杜之注公羊則有何嚴之訓釋榖梁傳者雖近十家近附近之近皆膚淺末學不經師匠辭理典據旣無可觀又引左氏公羊以解此傳文義違反斯害也巳於是乃啇略名例敷陳疑滯愽示諸儒同異之說昊天不弔大山其頽昊天胡老反詩云欲報之德昊天亡極本又作早亡巾反匍匐墓次死亡無日匍音蒲又音扶匐蒲北反又音服日月逾邁逾音榆􅉥及視息􅉥丘弭反又丘䜴反乃與二三學士及諸子弟各記所識并言其意業未及終嚴霜夏墜墜直􅀋反從弟彫落從才用反二子泯没泯忘忍反又作汦天實䘮予䘮息浪反何痛如之今撰諸子之言各記其姓名名曰春秋榖梁傳集解
