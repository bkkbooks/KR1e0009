front:
  text: 春秋榖梁傳閔公第四名開惠王十六年即位
  hash: sha256:848f88d7cae038f16bbb6abe8b7fc857a3b2411c6e6cad49e67a646fa0e74d47
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_004-1a}
body:
  text: 范寧集解元年春王正月繼弒君不言即位正也親之非父也兄也尊之非君也未踰年也繼之如君父也者受國焉爾齊人救邢善救邢也善齊桓得伯之道夏六月辛酉葬我君莊公莊公葬而後舉諡諡所以成德也於卒事乎加之矣秋八月公及齊侯盟于洛姑洛姑齊地洛姑一本作路姑盟納季子也季子來歸其曰季子貴之也大夫稱名氏今曰子是貴之也子男子之美稱美稱尺證反其曰來歸喜之也大夫出使歸不書執然後致不言歸國內之人不曰來今言來者明本欲遂去同他國之人也言歸者明實魯人也喜之者季子賢大夫以亂故出奔國人思之懼其遂去不反今得其還故皆喜曰季子來歸使所吏反冬氓齊仲孫來其曰齊仲孫外之也魯絶之故繫之于齊齊仲孫慶父也左氏以為齊大夫其不目而曰仲孫疏之也不目謂不言公子慶父其言齊以纍桓也繫仲孫於齊言桓容赦有罪纍劣偽反二年春王正月齊人遷陽夏五月乙酉吉禘于莊公三年喪畢致新死者之主於廟廟之逺主當遷入大祖之廟因是大祭以審昭穆謂之禘莊公喪制未闋時别立廟廟成而吉祭又不於大廟故詳書以示譏禘徒帝反大祖音泰下大廟同昭上饒反闋苦穴反吉禘者不吉者也喪事未畢而舉吉祭故非之也莊公薨至此方二十二月喪未畢秋八月辛丑公薨不地故也其不書葬不以討母葬子也凡君弒賊討則書葬哀薑實秛討而不書葬者不以討母葬子九月夫人薑氏孫于邾哀薑與弒閔公故出奔孫音遜本或作遜與音豫孫之為言猶孫也諱奔也公子慶父出奔莒其曰出絶之也慶父不復見矣慶父弒子般閔公不書弒諱之復扶又反見賢遍反冬齊髙子來盟其曰來喜之也其曰髙子貴之也盟立僖公也不言使何也據桓十四年鄭伯使其弟禦來盟言使禦魚吕反下同不以齊侯使髙子也齊侯不討慶父使魯重罹其禍今若髙子自來非齊侯所得使也猶屈完不稱使也江熙曰魯頻弒君僖公非正也桓公遣髙傒立僖公以存魯魯人德之不名其使以貴之貴其使則其主重矣重直用反屈君勿反傒音奚其使所吏反下同十有二月狄入衛僖公二年城楚丘以封衛則衛為狄所滅明矣不言滅而言入者春秋為賢者諱齊桓公不能攘夷狄救中國故為之諱為賢于偽反下同攘如羊反鄭棄其師惡其長也兼不反其衆則是棄其師也長謂髙克也髙克好利不顧其君丈公惡而逺之不能使髙克將兵禦狄于竟陳其師旅翶翔河上久而不召衆將離散髙克進之不以禮文公退之不以道危國亡師之本惡其烏路反注同長丁丈反兼戶謙反又如字好呼報反逺于萬反將子匠反竟音境翶五羔反春秋榖梁卷第四經傳叄伯一拾玖字注肆伯陸拾字音義一伯陸拾二字余仁仲刋于家孰
