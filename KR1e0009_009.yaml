front:
  text: 春秋榖梁傳襄公第九襄公名午簡王十四年即位
  hash: sha256:3302f286d71bb9c16fd5b9aa33ad5f8b306579e91aacb2e68ac0a9a0fe7b3721
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_009-1a}
body:
  text: 范寧集解元年春王正月公即位繼正即位正也仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城繫彭城於宋者不與魚石正也魚石得罪於宋成十五年奔楚十八年復入于彭城然則彭城巳屬魚石今猶繫末者崇君抑叛臣也復扶又反夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人𣏌人次于鄫鄫鄭地鄫或為合鄫似陵反秋楚公子壬夫帥師侵宋壬而林反九月辛酉天王崩邾子來朝朝直遙反冬衛侯使公孫剽來聘剽匹妙反晉侯使荀罃來聘冬者十月𥘉也王崩赴未至皆未聞喪故各得行朝聘之禮二年春王正月葬簡王鄭師伐宋夏五月庚寅夫人薑氏薨六月庚辰鄭伯睔卒睔古困反晉師宋師衛寧殖侵鄭其曰衛寧殖如是而稱于前事也𥘉衛侯速卒鄭人侵之故舉寧殖之報以明稱其前事不書晉宋之將以慢其伐人之喪稱于尺證反秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚已丑葬我小君齊薑齊諡齊薑如字齊諡也一音側皆反後齊歸同叔孫豹如宋冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢若言中國焉內鄭也虎牢鄭邑鄭服罪內之故為之城不繫虎牢於鄭者如中國之邑也僖二年城楚丘傳曰楚丘者何衛之邑國曰城此邑也其曰城何封衛也然則非魯邑皆不言城中國猶國中也為于偽反楚殺其大夫公子申至皆未聞喪故各三年春楚公子嬰齊帥師伐吳公如晉夏四月壬戍公及晉侯盟于長樗晉侯出其國都與公盟于外地樗丑居反公至自晉六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊丗子光己未同盟于雞澤雞澤地也同者有同也同外楚也陳侯使袁僑如會如會外乎會也外乎會者明本非會內也諸侯巳會乃至耳於會受命也戊寅叔孫豹及諸侯之大夫及陳袁僑盟及以及與之也諸侯在會而大夫又盟是大夫執國之權亢君之禮陳君不會袁僑受使來盟袁僑之盟得其義也通言叔孫豹及諸侯之大夫則無以表袁僑之得禮故再言及明獨與袁僑不與諸侯之大夫受使所吏反諸侯以為可與則與之不可與則釋之諸侯盟又大夫相與私盟是大夫張也故雞澤之會諸侯始失正矣大夫執國權曰袁僑異之也釋不但揔言及諸侯之大夫而復别言袁僑者是兾袁僑之得禮復扶又反秋公至自晉冬晉荀罃帥師伐許四年春王三月已酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人姒氏薨成公夫人襄公母也姒𣏌姓𣏌音起葬陳成公八月辛亥葬我小君定姒定諡冬公如晉陳人圍頓五年春公至自晉夏鄭伯使公子發來聘叔孫豹繒丗子巫如晉外不言如而言如為我事往也外相如不書為魯事往故同於內巫亡符反為于偽反仲孫蔑衛孫林父會吳于善稻善稻吳地善稻吳謂之伊緩左氏作善道吳謂善伊謂稻緩號從中國名從主人夷狄所號地形及物類當從中國言之以教殊俗故不言伊緩而言善稻人名當從其本浴言秋大雩楚殺其大夫公子壬夫公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊丗子光吳人繒人于戚繒以外甥為子曽夷狄之不若故序吳下所以不復殊外吳者以其數會中國故曽夷才登反又如字不復扶又反數會音朔公至自會冬戍陳內辭也不言諸侯是魯戍之楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯齊丗子光救陳十有二月公至自救陳善救陳也楚人伐陳公能救中國而攘夷狄故善之善之謂以救陳致辛未季孫行父卒六年春王三月壬午𣏌伯姑容卒夏宋華弱來奔秋葬𣏌桓公滕子來朝朝直遙反莒人滅繒莒是繒甥立以為後非其族類神不歆其祀故言滅莒人滅繒似陵反立其甥為後異姓故言滅也非滅也非以兵滅中國日卑國月夷狄時繒中國也而時非滅也家有既亡國有既滅滅猶亡亡猶滅家立異姓為後則亡國立異姓為嗣則滅既盡也滅而不自知由别之而不别也繒不逹滅亡之義故國滅而不知别彼列反莒人滅繒非滅也非立異姓以蒞祭祀滅亡之道也蒞音利又音類冬叔孫豹如邾季孫宿如晉宿行父子十有二月齊侯滅萊七年春郯子來朝郯音談朝直遙反下同夏四月三卜郊不從乃免牲夏四月不時也三卜禮也乃者亡乎人之辭也小邾子來朝城費費音祕秋季孫宿如衛八月螽冬十月衛侯使孫林父來聘壬戍及孫林父盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄬鄭地鄬本又作鄬于詭鄭伯髡原如會髡苦門反本又作郡或作頵頵音於倫反左氏作髡頑未見諸侯丙戌卒于操操鄭地操七報反未見諸侯其曰如會何也致其志也禮諸侯不生名此其生名何也卒之名也卒之名則何為加之如會之上見以如會卒也其見以如會卒何也鄭伯將會中國其臣欲從楚不勝其臣弒而死其不言弒何也不使夷狄之民加乎中國之君也邵曰以其臣欲從楚故謂夷狄之民不欲使夷狄之臣得弒中國之君故去弒而言卒使若正卒然見以賢遍反去起吕反其地於外也其日未踰竟也日卒時葬正也踰竟音境陳侯逃歸以其去諸侯故逃之也鄭伯欲從中國而罹其凶禍諸侯莫有討心於是懼而去之背華即夷故書逃以抑之背音佩八年春王正月公如晉夏葬鄭僖公鄭人侵蔡獲蔡公子濕獲者不與之辭侵者所以服不義無相獲之道公子濕本又作隰同音隰又音夑二十年同左氏作燮人微者也侵淺事也而獲公子公子病矣季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘邢丘地邢音刑見魯之失正也公在而大夫會也見賢遍反公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士丐來聘九年春宋災外災不志此其志何也故宋也故猶先也孔子之先宋人夏季孫宿如晉五月辛酉夫人薑氏薨成公母秋八月癸未葬我小君穆薑冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯𣏌伯小邾子齊丗子光伐鄭十有二月已亥同盟于戲戲鄭地于戲許冝反不異言鄭善得鄭也不致恥不能據鄭也戲盟還而楚伐鄭故恥不能終有鄭楚子伐鄭十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯𣏌伯小邾子齊丗子光會吳于柤柤楚地于柤莊加反會又會外之也五年會于戚不殊會今殊會吳者復夷狄故復夷扶又反下不復皆同夏五月甲午遂滅傅陽傳陽左氏作逼陽遂直遂也其曰遂何也不以中國從夷狄也言時實吳會諸侯滅傳陽恥以中國之君從夷狄之主故加甲午使若改日諸侯自滅傅陽滅卑國月此日蓋為遂耳為于偽反公至自會會夷狄不致惡事不致夷狄不致恥與同惡事不致恥有惡此其致何也會吳會夷狄也滅傳陽惡事也據不應致存中國也以中國之君從夷狄之主而滅人之邑也此即夷狄爾是無中國也故加甲午使若改日諸侯自滅傳陽爾不以諸侯從夷狄也滅中國雖惡事自諸侯之一眚爾從夷狄而滅人則中國不復存矣眚所景反中國有善事則并焉若中國有善事則不復言會諸侯改日遂滅傅陽如僖四年諸侯侵蔡蔡潰遂伐楚是并焉則并必性反又如字無善事則異之存之也諸侯會吳于柤甲午遂滅傅陽是則若會與遂異人汲鄭伯汲猶引也鄭伯髠原為臣所弒而不書弒此引而致於善事汲音急逃歸陳侯鄬之會陳侯不會以其為楚故言逃歸為于偽反致柤之會存中國也楚公子貞鄭公孫輒帥師伐宋晉師伐秦秋莒人伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊丗子光滕子薛伯𣏌伯小邾子伐鄭齊丗子光序滕薛之上蓋驕蹇蹇紀輦反冬盜殺鄭公子斐公子發公孫輒稱盜以殺大夫弗以上下道惡上也兩下相殺不志乎春秋惡鄭伯不能修政刑致盜殺大夫也以上下道當言鄭人殺其大夫斐芳尾反左氏作騑惡烏絡反戍鄭虎牢不稱其人則魯戍也猶戍陳其曰鄭虎牢決鄭乎虎牢也二年鄭去楚而從中國故城虎牢不言鄭使與中國無異自爾巳來數反覆無從善之意故繫之於鄭決絶而棄外數所角反覆芳服反楚公子貞帥師救鄭公至自伐鄭十有一年春王正月作三軍作為也古者天子六師諸侯一軍作三軍非正也周禮司馬法曰萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍其將皆命卿二千五百人為師然則此言天子六師凡萬有五千人大國三軍則萬七千五百人諸侯制踰天子非義也揔云諸侯一軍又非制也昭五年經曰舍中軍傳曰貴復正也然則魯有二軍今云作三軍增置中軍爾魯為次國於此為明將子匠反舍中音捨夏四月四卜郊不從乃不郊夏四月不時也四卜非禮也鄭公孫舍之帥師侵宋公會晉侯宋公衛侯曹伯齊丗子光莒子邾子滕子薛伯𣏌伯小邾子伐鄭秋七月已未同盟于京城北盟謀更共伐鄭京城北鄭者京城左氏京作亳公至自伐鄭不以後致盟後復伐鄭也傳例曰巳伐而盟復伐者則以伐致盟不復伐者則以會致此言不以後致謂會在伐後復扶又反楚子鄭伯伐宋公會晉侯宋公衛侯曹伯齊丗子光莒子邾子滕子薛伯𣏌伯小邾子伐鄭會于蕭魚蕭魚鄭地公至自會伐而後會不以伐鄭致得鄭伯之辭也鄭與會而服中國喜之故以會致鄭與音豫楚人執鄭行人良宵行人者挈國之辭也行人是傳國之辭命者傳直專反冬秦人伐晉十有二年春王三月莒人伐我東鄙圍邰蓋攻守之害深故以危録其月邰本又作台他來反又音臺伐國不言圍邑舉重也伐國重圍邑輕舉重可以包輕取邑不書圍安足書也不足書而今書蓋為下事起為于偽反季孫宿帥師救邰遂入鄆鄆莒邑鄆音運遂繼事也受命而救邰不受命而入鄆惡季孫宿也惡烏路反夏晉侯使士魴來聘秋九月吳子乘卒冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿邿音詩秋九月庚辰楚子審卒共王共音恭冬城防十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薜人𣏌人小邾人會吳于向向鄭地蠆丑邁反向舒亮反二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人𣏌人小邾人伐秦己未衛侯出奔齊諸侯出奔例月衎結怨于民自棄於位君弒而歸與知逆謀故出入皆日以著其惡與音豫莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚閲音悅十有五年春宋公使向戍來聘向舒亮反戍音恤二月己亥及向戍盟于劉劉夏逆王后于齊劉采地夏名書名則非卿也天子無外所命則成故不言逆女劉夏户雅反注同過我故志之也過音戈夏齊侯伐我北鄙圍成公救成至遇至遇而齊師巳退也遇魯地季孫宿叔孫豹帥師城成郛郛郭郛音孚秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯𣏌伯小邾子于溴梁湨梁地溴古閴反戊寅大夫盟湨梁之會諸侯失正矣諸侯會而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也晉人執莒子邾子以歸齊侯伐我北鄙夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許秋齊侯伐我北鄙圍成大雩冬叔孫豹如晉十有七年春王二月庚午邾子瞷卒􅗎音間左氏作牼宋人伐陳夏衛石買帥師伐曹秋齊侯伐我北鄙圍防九月大雩宋華臣出奔陳冬邾人伐我南鄙十有八年春白狄來不言朝不能行朝禮朝直遙反夏晉人執衛行人石買稱行人怨接於上也怨其君而執其使稱行人明使人爾罪在上也其使所吏反下同秋齊侯伐我北鄙冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯𣏌伯小邾子同圍齊非圍而曰圍據實伐齊有大焉亦有病焉齊若無罪諸侯豈得同病之乎非大而足同與齊非大國諸侯豈足同共圍之與同與音餘諸侯同罪之也亦病矣諸侯同罪大國是不量力必為大國所讎則亦病矣曹伯負芻卒于師閔之也楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯前年同圍齊之諸侯也祝柯齊地祝柯古河反注同晉人執邾子公至自伐齊春秋之義巳伐而盟復伐者則以伐致京城北之類是復扶又反下及注皆同盟不復伐者則以會致會于蕭魚之類是祝柯之盟盟復伐齊與怪不以會致與音餘曰非也不復伐齊然則何為以伐致也曰與人同事或執其君或取其地同與邾圍齊而晉執其君魯取其地此與盟後復伐無異取邾田自漷水以漷水為界漷水火虢反又音郭水名軋辭也軋委曲隨漷水言取邾田之多軋於八反其不日惡盟也惡烏路反季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士丐帥師侵齊至榖聞齊侯卒乃還還者事未畢之辭也受命而誅生死無所加其怒不伐喪善之也善之則何為未畢也君不尸小事臣不專大名善則稱君過則稱己則民作讓矣士丐外專君命故非之也然則為士丐者冝奈何冝墠帷而歸命乎介除地為墠於墠張帷反命于介介歸告君君命乃還不敢專也墠音善介音界副使也八月丙辰仲孫蔑卒齊殺其大夫髙厚鄭殺其大夫公子嘉冬葬齊靈公城西郛叔孫豹會晉士丐于柯柯地城武城二十年春王正月辛亥仲孫速會莒人盟于向向莒邑向舒亮反夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯𣏌伯小邾子盟于澶淵澶淵衛地澶市然反秋公至自會仲孫速帥師伐邾蔡殺其大夫公子濕蔡公子履出奔楚陳侯之弟光出奔楚諸侯之尊兄弟不得以屬通其弟云者親之也親而奔之惡也顯書弟明其親也親而奔逐之所以惡陳侯弟光左氏作黃惡烏路反叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以􅃮閭丘來奔以者不以者也凱曰人臣無專祿以邑叛之道􅃮音七閭力居反來奔者不言出舉其接我者也􅃮閭丘不言及小大敵也夏公至自晉秋晉欒盈出奔楚九月庚戍朔日有食之冬十月庚辰朔日有食之曹伯來朝朝直遙反公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于啇任啇任某地任音壬庚子孔子生二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯𣏌伯小邾子于沙隨公至自會楚殺其大夫公子追舒二十有三年春王二月癸酉朔日有食之三月已已𣏌伯丐卒丐古害反夏邾卑我來奔卑必二反葬𣏌孝公陳殺其大夫慶虎及慶寅稱國以殺罪纍上也及慶寅慶寅纍也陳侯之弟光自楚歸于陳光反稱弟言歸無罪明矣晉欒盈復入于晉入于曲沃曲沃晉地復扶又反秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍渝雍渝晉地雍於用反又如字渝羊朱反言救後次非救也惡其不遂君命而專止次故先通君命而後言次尊君抑臣之義鄭嗣曰次止也凡先書救而後言次眥非救也僖元年齊師宋師曹師次于聶北救邢此師本欲止聶北遙為之援爾隨其本意而書故先言次而後言救豹本受君命救晉中道不能故先言救而後言次若鄭伯未見諸侯而曰如會致其本意惡其烏路反下傳惡之同聶北不輒反中道丁仲反又如字巳卯仲孫速卒冬十月乙亥臧孫紇出奔邾其日正臧孫紇之出也正其有罪蘧伯玉曰不以道事其君者其出乎必不見容籧其居反晉人殺欒盈惡之弗有也不言殺其大夫是不有之以為大夫齊侯襲莒輕行掩其不備曰襲輕遣政反又如字二十有四年春叔孫豹如晉仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之既齊崔杼帥師伐莒大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯𣏌伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自會陳針冝咎出奔楚針其廉反咎其九反叔孫豹如京師大飢五榖不升為大飢升成也一榖不升謂之嗛嗛不足貌嗛去簟反二榖不升謂之飢三榖不升謂之饉饉音近四榖不升謂之康康虛五榖不升謂之大侵侵傷大侵之禮君食不兼味臺榭不塗塗堊飾榭音謝堊烏路反又烏洛反弛侯廷道不除弛廢也侯射侯也廢侯不燕射廷內道路不修除弛侯式氏反廷道徒佞反朝廷之道也一音庭百官布而不制官職修列不可闕廢不更有造作鬼神禱而不祀周書曰大荒有禱無祀此大侵之禮也二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弒其君光莊公失言淫于崔氏放言將淫崔氏為此見弒也邵曰淫過也言莊公言語失漏有過於崔子而崔子弒之故傳載其致弒之由以明崔杼之罪甚為此于偽反下為其同公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯𣏌伯小邾子于夷儀六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘會夷儀之諸侯也重丘齊地重直龍反公至自會衛侯入于夷儀夷儀本邢地衛滅邢而為衛地楚屈建帥師滅舒鳩屈居勿反冬鄭公孫夏帥師伐陳夏尸雅反十有二月吳子謁伐楚門于巢卒以伐楚之事門于巢卒也所以攻巢之門者為其伐楚之事故也然則伐楚經巢子謁左氏作遏于巢者外乎楚也若但言伐楚卒而不言于巢者則卒在楚也言于巢則不在楚門于巢乃伐楚也先攻巢然後楚乃可得伐諸侯不生名取卒之名加之伐楚之上者見以伐楚卒也其見以伐楚卒何也據伐楚惡事無緣致本意見賢遍反古者大國過小邑小邑必飾城而請罪禮也飾城者修守備請罪問所以為闕致師之意守備手又反或如字吳子謁伐楚至巢入其門門人射吳子有矢創反舍而卒古者雖有文事必有武備非巢之不飾城而請罪非吳子之自輕也非責射食亦反創𥘉良反二十有六年春王二月辛卯衛寧喜弒其君剽此不正其日何也殖也立之喜也君之正也父立以為君則子宜君之以明正也君剽匹妙反衛孫林父入于戚以叛甲午衛侯衎復歸于衛日歸見知弒也書喜弒君衎可言歸衎實與弒故録日所以知其與弒者言辛卯弒君甲午便歸是待弒而入故得速也衎苦旦反一本作衍見知賢遍反實與音豫下同夏晉侯使荀吳來聘公會晉人鄭良霄宋人曹人于澶淵秋宋公殺其丗子座座在禾反晉人執衛寧喜八月壬午許男寧卒于楚宣九年九月辛酉晉侯黑臀卒于扈傳曰其日未踰竟也此乃在楚何以日邪隱三年八月庚辰宋公和卒傳曰日卒正也許男卒于楚則在外巳顯日卒明其正竟音境冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋奐呼亂反衛殺其大夫寧喜稱國以殺罪纍上也寧喜弒君其以纍上之辭言之何也嘗為大夫與之涉公事矣鄭嗣曰若獻公以喜有弒君之罪而殺之則不冝既入以為大夫而復殺之明以他故復扶又反寧喜由君弒君而不以弒君之罪罪之者惡獻公也獻公即衎也鄭嗣曰書寧喜弒其君則喜之罪不嫌不明今若不言喜之無罪而死則獻公之惡不彰惡獻烏路反衛侯之弟專出奔晉專左氏作鱄專喜之徒也專之為喜之徒何也巳雖急納其兄與人之臣謀弒其君是亦弒君者也專其曰弟何也據稱弟則無罪巳音紀專有是信者言君本使專與喜為約納君許以寵賂今反殺之獻公使專失信故稱弟見獻公之惡也見賢遍反君賂不入乎喜而殺喜是君不直乎喜也故出奔晉織絇邯鄲終身不言衛恥失信絇其俱反邯音寒鄲音舟專之去合乎春秋何休曰寧喜本弒君之家獻公過而殺之小負也專以君之小負自絶非大義也何以台乎春秋鄭君釋之曰寧喜雖弒君之家本專與約納獻公爾公由喜得入已與喜以君臣從事矣春秋襏亂重盟約今獻公背之而殺忠干己者是獻公惡而難親也獻公既惡而難親專又與喜為黨懼禍將及君子見幾而作不俟終日微子去紂孔子以為上仁專之去衛其心若此合于春秋不亦冝乎與約如字又於妙反下同為約于偽反本或作盟約背之音佩秋七月辛巳豹及諸侯之大夫盟于宋溴梁之會諸侯在而不曰諸侯之大夫大夫不臣也晉趙武恥之豹云者恭也不舉氏姓諸侯不在而曰諸侯之大夫大夫臣也其臣恭也晉趙武為之會也冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉邾子來朝朝直遙反秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩靈王乙未楚子昭卒二十有九年春王正月公在楚閔公也閔公為楚所制故存録夏五月公至自楚喜之也凱曰逺之蠻國喜得全歸致君者殆其往殆危而喜其反此致君之意義也庚午衛侯衎卒􅕡弒吳子餘祭􅕡門者也寺人也不稱名姓􅕡不得齊於人不稱其君􅕡不得君其君也禮君不使無恥不近刑人無恥不知臧否􅕡音昏守門人也祭側界反寺人本又作侍人不近附近之近下同否音鄙又方九反不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也􅕡弒吳子餘祭仇之也怨仇餘祭故弒之狎户甲反怨於願反又於元反仇音求仲孫羯會晉荀盈齊髙止宋華定衛丗叔儀鄭公孫段曹人莒人邾人滕人薛人小邾人城𣏌古者天子封諸侯其地足以容其民其民足以滿城以自守也𣏌危而不能自守故諸侯之大夫相帥以城之此變之正也諸侯微弱政由大夫大夫能同恤災危故曰變之正晉侯使士鞅來聘𣏌子來盟𣏌復稱子蓋時王所黜復扶又反吳子使札來聘杜預曰吳子餘祭既遣札聘上國而後死札以六月到魯夫聞喪也不稱公子其禮未同於止國札側八反吳其稱子何也善使延陵季子故進之也身賢賢也使賢亦賢也延陵季子之賢尊君也以季札之賢吳子得進稱子是尊君也其名成尊於上也春秋賢者不名而禮名者許夷狄不一而足唯成吳之尊稱直稱吳則不得有大夫尊稱尺證反秋九月葬衛獻公齊髙止出奔北燕其曰北燕從史文也南燕姞姓在鄭衛之間北燕姬姓在晉之北史曰北燕據時然故不改也傅所言解時但有言有燕者北燕音煙國名姞其乙反又其吉反冬仲孫羯如晉三十年春王正月楚子使薳罷來聘聘例時此聘月之何也泰曰桓二年宋督弒其君與夷傳曰書王以正與夷之卒然則義有所明皆須王以正之書王必上繫于春下統于月此書王以治蔡般弒父之罪爾非以録薳罷之聘薳罷于委反下音皮與夷如字又音餘宋殤公名夏四月蔡丗子般弒其君固其不日子奪父政是謂夷之比之夷狄故不日也丁未楚丗子啇臣弒其父傳曰日髠之卒所以謹商臣之弒也楚公子比弒其君傳曰不日比不弒般弒不日而曰夷之何也徐乾曰凡中國君正卒皆書日以録之夷狄君卒皆不日以略之所以别中國與夷狄夷狄弒君而日者閔其為惡之甚謹而録之中國君卒例日不以弒與不弒也至于卒而不日者乃所以略之與夷狄同例子舨音班本又作班髠苦門反以别彼列反五月甲午宋災伯姬卒取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂宵夜見以賢遍反辟音避下同左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也逮音代又大計反行下孟反天王殺其弟佞夫傳曰諸侯且不首惡况於天子乎君無忍親之義天子諸侯所親者唯長子母弟耳天王殺其弟侫夫甚之也長丁丈反王子瑕奔晉不言出周無外秋七月叔弓如宋葬共姬共姬從夫之諡共音恭外夫人不書葬此其言葬何也吾女也卒災故隱而葬之也鄭良霄出奔許自許入于鄭鄭人殺良霄不言大夫惡之也惡烏路反冬十月葬蔡景公不日卒而月葬不葬者也卒而葬之不忍使父失民於子也鄭嗣曰夫葬者臣子之事也景公無子不可謂無民無民則景公有失於民有民則罪歸於子若不書葬則嫌亦失民故曰不忍使父失民於子晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人𣏌人小邾人會于澶淵宋災故會不言其所為其曰宋災故何也不言災故則無以見其善也其曰人何也救災以衆何救焉更宋之所喪財也償其所喪財故雖不及災時而猶曰救災所為于偽反以見賢遍反更音庚償也喪息浪反償時亮反澶淵之會中國不侵伐夷狄夷狄不入中國無侵伐八年善之也晉趙武楚屈建之力也三十有一年春王正月夏六月辛巳公薨于楚宫楚宫非正也楚宫别宫名非路寢秋九月癸巳子野卒襄公大子大音泰子卒日正也已亥仲孫羯卒冬十月滕子來會葬書非禮癸酉葬我君襄公十有一月莒人弒其君密州春秋榖梁卷第九經傳肆阡陸伯捌拾玖字玖拾一字音義玖伯零單肆字千家孰
