front:
  text: 春秋榖梁傳莊公第三名同莊王四年即位
  hash: sha256:04341116d329ad5cc6ad2ea8e4c9945e3dd233d8b6be699a0bc1945e5cab62b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_003-1a}
body:
  text: 范寧集解元年春王正月繼弒君不言即位正也繼弒君不言即位之為正何也據君不絶曰先君不以其道終則子不忍即位也三月夫人孫于齊桓公夫人文薑也哀薑有殺子之罪輕故僖元年曰夫人氏之喪至自齊去薑以貶之文薑有殺夫之罪重故去薑氏以貶之此輕重之差孫音遜本亦作遜去起吕反下去薑同孫之為言猶孫也孫孫遁而去遁徒困反諱奔也接練時録母之變始人之也夫人𥘉與桓俱如齊今又書者於練時感夫人不與祭故始以人道録之與祭音豫不言氏姓貶之也人之於天也以道受命於人也以言受命臣子則受君父之命婦受夫之命不若於道者天絶之也若順不若於言者人絶之也臣子大受命言義得貶夫人夏單伯逆王姬單姓也伯字單音善單姓伯字左氏以為王卿士逆王姬左氏作送王姬單伯者何吾大夫之命乎天子者也命大夫故不名也諸侯歲貢士于天子天子親命之使還其國為大夫者不名天子就其國命之者以名氏通也其不言如何也據僖二十九年公子遂如京師言如其義不可受於京師也其義不可受於京師何也曰躬君殺於齊使之主婚姻與齊為禮其義固不可受也禮尊卑不敵天子嫁女于諸侯必使同姓諸侯主之魯桓親見殺于齊若天子命使為主則非禮大矣春秋為尊者諱故不可受之于京師弒又作殺為尊于偽反下為之築同秋築王姬之館于外築禮也于外非禮也外城外也築之為禮何也主王姬者必自公門出公門朝之外門主王姬者當設几筵于宗廟以俟迎者故在公門之內築王姬之館朝之直遙反下於朝同迎魚敬反下同於廟則巳尊於寢則巳卑為之築節矣築之外變之正也築之外變之為正何也仇讎之人非所以接婚姻也衰麻非所以接辨冕也親迎服祭服者重婚姻也公時有桓之喪衰七坰反辨皮彥反其不言齊侯之來逆何也不使齊侯得與吾為禮也冬十月乙亥陳侯林卒諸侯日卒正也王使榮叔來錫桓公命榮氏叔字天子之上大夫也禮有九錫一曰輿馬二曰衣服三曰樂則四曰朱户五曰納陛六曰虎賁七曰弓矢八曰鈇鉞九曰秬鬯皆所以褒德賞功也德有厚薄功有輕重故命有多少何休曰桓弒逆之人王法所冝誅絶而反錫命悖亂天道故不言天王也文五年王使榮叔歸含且賵則曰含者臣子之職也以至尊行卑事故不言天王也三月王使毛伯來會葬又曰刺比失禮故亦不言天王也寧案僖二十四年天王出居于鄭不可最大矣禮天子既有賵含之制傳但譏二事共一使耳言且所以示譏一事無再貶之道也以天王之尊會人妾祖母之葬誠失禮矣孰若使任叔之子來聘使家父來求車之不可乎此三者皆言天王明非義之所存舊史有詳略夫子因而弗革故知曲説雖巧致逺則滯矣錫星歷反賁音奔鈇方胡反鉞音越秬音巨黑黍鬯勑亮皮香酒也悖輔對反含胡暗反賵芳鳯反刺七賜反一使所吏反任音壬滯乃計反一本作泥禮有受命無來錫命錫命非正也賞人於朝與士共之當召而錫也周禮大宗伯職曰王命諸侯則儐之是來受命朝直遙反儐必刃反生服之死行之禮也生不服死追錫之不正甚矣王姬歸于齊為之中者歸之也齊師遷紀郱鄑郚紀國也郱鄑郚國也此國以三言為名邢步丁反鄑子移反郚音吾或曰遷紀于郱鄑郚十年宋人遷宿傳曰遷亡辭也其不地宿不復見矣齊師遷紀四年復書紀侯大去其國者紀侯賢不與齊師之亡紀故變丈以見義郱鄑郚之君無紀侯之賢故不復見從常例也若齊師遷紀于郱鄑郚當言于以明之又不應復書地當如宋人遷宿齊人遷陽或曰之説寧所未詳復扶又反見賢遍反二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘慶父名字仲父國而曰伐於餘丘邾之邑也其曰伐何也公子貴矣師重矣而敵人之邑公子病矣病公子所以譏乎公也其一曰君在而重之也邾君在此邑故不繼于邾使若國秋七月齊王姬卒為之主者卒之也主其嫁則有兄弟之恩死則服之服之故書卒禮記曰齊告王姬之喪魯莊公為之大功為之大功于偽反冬十有二月夫人薑氏會齊侯于禚禚齊地禚章略反婦人既嫁不踰竟踰竟非正也婦人不言會言會非正也饗甚矣饗在四年踰竟音境後踰之例皆同乙酉宋公馮卒馮皮冰反三年春王正月溺會齊侯伐衛徐邈曰傳例曰往月危往也齊受天子罪人為之興師而魯與同其理危也溺乃狄反溺者何也公子溺也其不稱公子何也據二年公子慶父帥師伐於餘丘稱公子惡其會仇讎而伐同姓故貶而名之也惡烏路反夏四月葬宋莊公月葬故也五月葬桓王傳曰改葬也若實改葬當言改以明之郊牛之口傷改卜牛是也傳當以七年乃葬故謂之改葬改葬之禮緦舉下𬗟也緦者五服最下言舉下𬗟上從緦皆反其故服因葬桓王記改葬之禮不謂改葬桓王當服緦也猶晦震夷伯之廟因明天子諸侯之制不謂夷伯非魯之大夫也寧之先君與蔡司徒論之詳矣江熙曰葬稱公舉五等之上改葬禮緦舉五服之下以喪𬗟藐逺也天子諸侯易服而葬以為交於神明者不可以純凶况其𬗟者乎是故改葬之禮其服唯輕言𬗟釋所以緦也緦息詞反𬗟亡善反逺也或曰郤尸以求諸侯停尸七年以求諸侯會葬非人情也卻尸去略反又去逆反杜預云尸未葬之通稱天子志崩不志葬必其時也何必焉舉天下而葬一人其義不疑也志葬故也危不得葬也曰近不失崩不志崩失天下也京師去魯不逺赴告之命可不踰旬而至史不志崩則亂可知獨隂不生獨陽不生獨天不生三合然後生徐邈曰古人稱萬物負隂而抱陽沖氣以為和然則傳所謂天蓋名其沖和之功而神理所由也會二氣之和極發揮之美者不可以柔剛滯其用不得以隂陽分其名故歸於冥極而謂之天凡生類稟靈知於天資形於二氣故又曰獨天不生必三合而形神生理具矣揮許歸反冥亡丁反稟彼錦反知於音智故曰母之子也可天之子也可尊者取尊稱焉卑者取卑稱焉王者尊故稱天子衆人卑故稱母子母之子也可絶句下倣此尊稱尺證及下卑稱司其曰王者民之所歸往也秋紀季以酅入于齊季紀侯弟以酅下圭反酅紀之邑也入于齊者以酅事齊也入者內弗受也雍日紀國微弱齊將吞并紀季深覩存亡之機大懼社稷之傾故超然遐舉以酅事齊庶胤嗣不泯宗廟永存春秋賢之故褒之以字齊受人之邑而滅人之國故於義不可受也并必性反泯彌忍反冬公次于郎次止也有畏也欲救紀而不能也畏齊四年春王二月夫人薑氏饗齊侯于祝丘饗食也兩君相見之禮凡會書月著時事有危雖於公發例亦無所不關祝丘魯地饗本又作享香丈反著張略反又張慮反饗甚矣以非禮尤甚故謹而月之饗齊侯所以病齊侯也三月紀伯姬卒隱二年履緰所逆者內女卒例日伯姬失國略之故月也緰音須外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也禮諸侯絶傍期姑姊妹女子子嫁於國君者尊與巳同則為之服大功九月變不服之例然則適大夫者不書卒為于偽反期居其反夏齊侯陳侯鄭伯遇于垂傳例曰不期而會曰遇遇者志相得也紀侯大去其國大去者不遺一人之辭也言民之從者四年而後畢也紀侯賢而齊侯滅之不言滅而曰大去其國者不使小人加乎君子不曰滅而曰大去其國蓋抑無道之強以優有道之弱若進止在己非齊所得滅也何休曰春秋楚丗子啇臣弒其君其後滅江六不言大去又大去者於齊滅之不明但知不使小人加乎君子而不言滅縱失襄公之惡反為大去也鄭君釋之曰商臣弒其父大惡也不得但為小人江六之君又無紀侯得民之賢不得變滅言大去也元年冬齊師遷紀三年紀季以酅入于齊今紀侯大去其國是足起齊滅之矣即以變滅言大去為縱失襄公之惡是乃經也非傳也且春秋因事見義舍此以滅人為罪者自多矣縱子用反見賢遍反舍音捨六月乙丑齊侯葬紀伯姬外夫人不書葬此其書葬何也吾女也失國故隱而葬之隱痛也不曰卒而曰葬閔紀之亡也秋七月冬公及齊人狩于郜郜齊地狩音獸郜古報反左氏作禚齊人者齊侯也其曰人何也卑公之敵所以卑公也內無貶公之道何為卑公也不復讎而怨不釋刺釋怨也怨紆元反又紆願反後同刺七賜反五年春王正月夏夫人薑氏如齊師師而曰如衆也言師衆大如國故可以言如若言如齊侯則不可婦人既嫁不踰竟踰竟非禮也秋郳黎來來朝黎來名也郳五兮反國名黎郎兮反黎來郳君名朝直遙反郳國也黎來微國之君未爵命者也冬公會齊人宋人陳人蔡人伐衛納惠公朔是齊侯宋公也其曰人何也人諸侯所以人公也其人公何也逆天王之命也王不欲立朔也六年春王三月王人子突救衛徐邈曰諸侯不奉王命朔遂得篡王威屈辱有危故月也救衛於義善故重子突功不立故著其危王人卑者也稱名貴之也何休以為稱子則非名也鄭君釋之曰王人賤者録則名可今以其銜命救衛故貴之貴之則子突為字可知明矣此名當為字誤爾徐乾曰王人者卑者之稱也當直稱王人而巳今以其能奉天子之命救衛而拒諸侯故加名以貴之僖八年公會王人齊侯是卑者之常稱卑者之稱尺證反下常稱同善救衛也救者善則伐者不正矣夏六月衛侯朔入于衛其不言伐衛納朔何也據九年伐齊納糾言納不逆天王之命也不與諸侯得納王之所絶入者內弗受也何用弗受也為以王命絶之也朔之名惡也朔入逆則出順矣朔出入名以王命絶之也秋公至自伐衛惡事不致此其致何也據襄九年時有穆薑之喪會諸侯伐鄭不致不致則無用見公之惡事之成也見賢遍反螟螟亡丁反冬齊人來歸衛寶以齊首之分惡於齊也使之如下齊而來我然惡戰則殺矣若衛自歸寶於齊過齊然後與我齊首其事則我與王人戰罪差減分惡烏各反下同殺色界反舊色例反過古禾反差𥘉賣反七年春夫人薑氏會齊侯于防防魯地婦人不會會非正也夏四月辛卯昔恆星不見恆星者經星也經常也謂常列宿昔如字或作㝜同不見賢遍反下不音者同列宿夙又反下皆同日入至於星出謂之昔不見者可以見也夜中星隕如雨如而也星既隕而復雨隕云敏反復扶又反其隕也如雨是夜中與星既隕而雨必晦暝安知夜中乎與音餘暝亡定反春秋著以傳著疑以傳疑明實録也傳直專反中之幾也而曰夜中著焉爾幾微也星既隕而雨中微難知而曰夜中自以實著爾非億度而知度徒各反何用見其中也失變而録其時則夜中矣失星變之始而録其巳隕之時檢録漏刻以知夜中其不曰恆星之隕何也我知恆星之不見而不知其隕也我見其隕而接於地者則是雨説也言我見從上來接於下然後可言雨星今唯見在下故曰隕星我見見音如字注同雨于付反注同著於上見於下謂之雨著於下不見於上謂之隕豈雨説哉解經不得言雨星而言隕星也鄭君曰衆星列宿諸侯之象不見者是諸侯棄天子禮義法度也劉向曰隕者象諸侯隕隊失其所也又中夜而隕者象不終其性命中道而落見于下如字或賢遍反不見賢遍反隊直類反秋大水髙下有水災曰大水無麥苗麥苗同時也麥與黍稷之苗同時死冬夫人薑氏會齊侯于榖榖齊地婦人不會會非正也八年春王正月師次于郎以俟陳人蔡人時陳蔡欲伐魯故出師以待之次止也俟待也甲午治兵出曰治兵習戰也入曰振旅習戰也振整也旅衆也治兵而陳蔡不至矣兵事以嚴終以嚴整終事故敵人不至故曰善陳者不戰此之謂也善為國者不師導之以德齊之以禮江熙曰鄰國望我歡若親戚何師之為陳直覲反下文皆同導徒報反下同善師者不陳師衆素嚴不須耀軍列陳江熙曰上兵伐謀何乃至陳善陳者不戰軍陳嚴整敵望而畏之莫敢戰善戰者不死投兵勝地故無死者江熙曰辟實攻虛則不死善死者不亡民盡其命無奔背散亡者也江熙曰見危授命義存君親雖沒猶存盡津忍反皆音佩夏師及齊師圍郕郕降于齊師其曰降于齊師何不使齊師加威於郕也郕同姓之國而與齊伐之是用師之過也故使若齊無武功而郕自降降户江反皆同秋師還還者事未畢也遁也郕巳降而以未畢為文者蓋辟滅同姓之國示不卒其事還音旋遁徒困反冬十有一月癸未齊無知弒其君諸兒大夫弒其君以國氏者嫌也弒而代之也兒如字一音五兮反九年春齊人殺無知無知之挈失嫌也稱人以殺大夫殺有罪也挈苦結反公及齊大夫盟于暨暨魯地暨其器反左氏作蔇公不及大夫春秋之義內大夫可以會諸侯公不可以盟外大夫所以明尊卑定內外也今齊國無君要當有任其盟者故不得不以權通大夫不名無君也禮君前臣名齊無君故大夫不名盟納子紏也不日其盟渝也變盟立小白渝羊朱反當齊無君制在公矣當可納而不納故惡內也惡烏路反下及注惡內皆同夏公伐齊納紏不言子糾而直云紏者盟繫在於魯故挈之也春秋於內公子為大夫者乃記其奔子紏不為大夫故不書其奔鄭忽既受命嗣位是以書其出然則重非嫡嗣官非大夫皆事例所略故許叔蔡季小白重耳通亦不書出紏居􅉳反左氏作子紏嫡丁歷反重直龍反當可納而不納齊變而後伐故乾時之戰不諱敗惡內也何休曰三年溺會齊師伐衛故貶而名之四年公及齊人狩于郜故卑之曰人今親納讎子反惡其晚恩義相違莫此之甚鄭君釋之曰於讎不復則怨不釋而魯釋怨屢會仇讎一貶其臣一卑其君亦足以責魯臣子其餘則同不復譏也至於伐齊納糾譏當可納而不納爾此自正義不相反也寧謂讎者無時而可與通縱納之遲晚又不能全保讎子何足以惡內乎然則乾時之戰不諱敗齊人取子糾殺之皆不迃其文正書其事內之大惡不待貶絶居然顯矣二十四年公如齊親迎亦其類也惡內之言傳或失之敗惡烏各反注同復扶又反迃音于一音紆又於武反迎魚敬反齊小白入于齊大夫出奔反以好曰歸成十四年衛孫林父自晉歸于衛是也以惡曰入齊公孫無知弒襄公公子糾公子小白不能存出亡子糾奔魯小白奔莒齊人殺無知而迎公子糾於魯公子小白不讓公子糾先入又殺之于魯故曰齊小白入于齊惡之也惡烏路反秋七月丁酉葬齊襄公諸公子爭立國亂故危之八月庚申及齊師戰于乾時我師敗績不言及者主名內之卑者乾時齊地九月齊人取子糾殺之言子糾者明其貴冝為君外不言取言取病內也取易辭也猶曰取其子糾而殺之云爾猶言自齊之子糾今取而殺之言魯不能救護也易以䜴反十室之邑可以逃難百室之邑可以隱死以千乘之魯而不能存子糾以公為病矣難乃旦反下注同乘繩證反冬浚洙浚洙者深洙也著力不足也畏齊難浚音峻深也洙音殊杜預云水名十年春王正月公敗齊師于長勺長勺魯地勺時酌反不日疑戰也疑戰者言不尅曰而戰以詐相襲疑戰而曰敗勝內也勝內謂勝在內二月公侵宋侵時此其月何也乃深其怨於齊又退侵宋以衆其敵惡之故謹而月之惡烏路反三月宋人遷宿遷亡辭也為人所遷則無復國家故曰亡辭閔二年齊人遷陽亦是也復扶冨反下文及注同其不地宿不復見也國亡不復見經不言滅者言滅則弒其君滅其宗廟社稷就而有之不遷其民見賢遍反遷者猶未失其國家以往者也謂自遷者僖元年邢遷于夷儀成十五年許遷于葉之類是也彼二傳曰遷者猶得其國家以往者也此傳云遷者猶未失其國家以往互丈也葉舒涉反夏六月齊師宋師次于郎次止也畏我也公敗宋師于乘丘乘丘魯地乘繩證反不日疑戰也疑戰而曰敗勝內也秋九月荆敗蔡師于莘莘蔡地莘所巾反以蔡侯獻武歸荆者楚也何為謂之荆狄之也何為狄之聖人立必後至天子弱必先叛故曰荆狄之也蔡侯何以名也據僖十五年秦獲晉侯不名獻武本亦依左氏作舞絶之也何為絶之獲也中國不言敗據宣十二年晉荀林父帥師及楚子戰于邲晉師敗績不言敗晉師邲皮必反又扶必反一音弼敗績如字此其言敗何也中國不言敗蔡侯其見獲乎其言敗何也釋蔡侯之獲也以歸猶愈乎執也為中國諱見執故言以歸為于偽反冬十月齊師滅談談子奔莒桓十一年鄭忽出奔衛傳曰其名失國也十六年衛侯朔出奔齊傳曰朔之名惡也然則出奔書名有二義談子國滅不名蓋無罪也凡書奔者責不死社稷不言出者國滅無所出也他皆放此十有一年春王正月夏五月戊寅公敗宋師于鄑鄑魯地敗必邁反下及注同鄑子移反內事不言戰舉其大者其日成敗之也結日列陳不以詐相襲得敗師之道故曰成也列陳直覲反宋萬之獲也秋宋大水外災不書此何以書王者之後也髙下有水災曰大水冬王姬歸于齊其志過我也過古禾反十有二年春王三月紀叔姬歸于􅈶􅈶紀邑也紀季所用入于齊者紀國既滅故歸􅈶國而曰歸此邑也其曰歸何也吾女也失國喜得其所故言歸焉爾江熙曰四年齊滅紀不言滅而言大去者義有所見爾則國滅也叔姬來歸不書非歸寧且非大歸也叔姬守節積有年矣紀季雖以􅈶入于齊不敢懷二然襄公豺狼未可暗信桓公既立德行方宣於天下是以叔姬歸于􅈶魯喜其女得申其志見賢遍反豺仕皆反行下孟反夏四月秋八月甲午宋萬弒其君捷捷宋閔公宋萬宋之卑者也卑者以國氏及其大夫仇牧以尊及卑也仇牧間也仇牧扞衛其君故見殺也桓二年傳曰臣既死君不忍稱其名今仇牧書名則知宋君先弒仇牧音目捍曷旦反冬十月宋萬出奔陳宋久不討賊致令得奔故謹而月之令力呈反十有三年春齊人宋人陳人蔡人邾人會于北杏北杏齊地是齊侯宋公也其曰人何也始疑之何疑焉桓非受命之伯也將以事授之者也言諸侯將權時推齊侯使行伯事曰可矣乎未乎邵曰疑齊桓雖非受命之伯諸侯推之便可以為伯乎未也舉人衆之辭也稱人言非王命衆授之以事夏六月齊人滅遂遂國也其不日微國也秋七月冬公會齊侯盟于柯柯齊地柯古何反曹劌之盟也信齊侯也曹劌之盟經傳無文蓋有信者也公羊傳曰要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信著於天下自柯之盟始劌居衛反要盟於遙反桓盟雖內與不日信也公盟例日外諸侯盟例不日桓大信逺著故雖公與盟猶不日與音預注同十有四年春齊人陳人曹人伐宋夏單伯會伐宋會事之成也伐事巳成單伯乃至單音善秋七月荆入蔡荆者楚也其曰荆何也州舉之也州不如國言荆不如言楚國不如名言楚不如言介葛廬介音界名不如字言介葛廬不如言邾儀父冬單伯會齊侯宋公衛侯鄭伯于鄄鄄衛地鄄音絹復同會也諸侯欲推桓以為伯故復同會于此以謀之復扶又反十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄復同會也為欲推桓為伯故復會於此復扶又反為欲于偽反夏夫人薑氏如齊婦人既嫁不踰竟踰竟非禮也秋宋人齊人邾人伐郳宋主兵故序齊上也班序上下以國大小為次夷狄在下征伐則以主兵為先春秋之常也他皆放此鄭人侵宋冬十月十有六年春王正月夏宋人齊人衛人伐鄭秋荆伐鄭冬十有二月會齊侯宋公陳侯衛侯鄭伯許男曹伯滑伯滕子同盟于幽幽宋地滑于八反同者有同也同尊周也不言公外內寮一疑之也十三年春會于北杏諸侯俱疑齊桓非受命之伯欲共以事推之可乎今于此年諸侯同共推桓而魯與齊讎外內同一疑公可事齊不會不書公以著疑焉同官為尞謂諸侯也至二十七年同盟于幽遂伯齊侯寮一力雕反邾子克卒其曰子進之也附齊而尊周室王命進其爵十有七年春齊人執鄭詹人者衆辭也以人執與之辭也與令得執詹者廉反令力呈反鄭詹鄭之卑者卑者不志此其志何也以其逃來志之也逃來則何志焉將有其末不得不録其本也末謂逃來鄭詹鄭之佞人也佞乃定反夏齊人殱于遂殱者盡也然則何為不言遂人盡齊人也無遂之辭也無遂則何為言遂其猶存遂也以其能殺齊戍故若遂之存殱子廉反盡也遂人盡齊人絶句存遂奈何曰齊人滅遂使人戍之遂之因氏飲戍者酒而殺之齊人殱焉此謂狎敵也狎猶輕也飲於鴆反狎户甲反秋鄭詹自齊逃來逃義曰逃齊稱人以執是執有罪也執得其罪故曰義也今而逃之是逃義也冬多麋京房易傳曰廢正作淫為火不明則國多麋麋士悲反十有八年春王三月日有食之不言日不言朔夜食也何以知其夜食也曰王者朝日王制曰天子玄冕而朝日於東門之外故日始出而有虧傷之處是以知其夜食也何休曰春秋不言月食日者以其無形故闕疑其夜食何緣書乎鄭君釋之曰一日一夜合為一日今朔日日始出其食虧傷之處未復故知此日以夜食夜食則亦屬前月之晦故榖梁子不以為疑朝直遙反處昌慮反故雖為天子必有尊也貴為諸侯必有長也故天子朝日諸侯朝朔長丁丈反夏公追戎于濟西其不言戎之伐我何也以公之追之不使戎邇於我也邇猶近也不使戎得逼近於我故若入竟望風退走濟子禮反濟水名邇如字邇近也一本作介音界亦近也竟音境于濟西者大之也何大焉為公之追之也言戎逺來至濟西必大有徒衆以公自追之知其審然為于偽反秋有􅈮􅈮短狐也蓋含沙射人京房易傳曰忠臣進善君不識厥咎國生􅈮􅈮本亦作蜮音或短狐本草謂之射工射人食亦反下文同一有一亡曰有􅈮射人者也亡音無又如字冬十月十有九年傳本或分此以下為莊公與閔公同卷春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟媵淺事也不志此其志何也辟要盟也魯實使公了結要二國之盟欲目託於大國未審得盟與不故以媵婦為名得盟則盟不則止此行有辭也媵以證反又繩證反爾雅云送也要於遙反注同何以見其辟要盟也媵禮之輕者也盟國之重也以輕事遂乎國重無説以輕遂重無他異説故知辟要盟耳見賢𥚹反其曰陳人之婦略之也但為遂事假録媵事耳故略言陳人之婦不處其主名為于偽反其不日數渝惡之也數音朔惡烏路反夫人薑氏如莒婦人既嫁不踰竟踰竟非正也冬齊人宋人陳人伐我西鄙其曰鄙逺之也其逺之何也不以難邇我國也難乃旦反邇如字本又作介音界二十年春王二月夫人薑氏如莒夫人比年如莒過而不改無禮尤甚故謹而月之莒音舉婦人既嫁不踰竟踰竟非正也竟音境夏齊大災其志以甚也外災不志甚謂災及人也外災例時秋七月冬齊人伐我二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戍夫人薑氏薨婦人弗目也鄭嗣曰弗目謂不目言其地也婦人無外事居有常所故薨不書地僖元年傳曰夫人薨不地此言弗目蓋互辭爾定九年得寶玉大弓傳曰弗目羞也蓋此類也江熙曰文薑有弒公之逆而弗目其罪弗目謂不題目文薑薨所也一曰弗目其罪冬十有二月葬鄭厲公二十有二年春王正月肆大眚肆失也眚災也易稱赦過宥罪書稱眚災肆赦經稱肆大眚皆放赦罪人蕩滌衆故有時而用之非經國之常制肆音四眚所景反宥音又滌音狄災紀也失故也災謂罪惡紀治理也有罪當治理之今失之者以文薑之故為嫌天子之葬也文薑罪應誅絶誅絶之罪不葬若不赦除衆惡而書葬者嫌天子許之明須赦而後得葬為于偽反癸丑葬我小君文薑小君非君也不治其民其曰君何也以其為公配可以言小君也陳人殺其公子禦寇禦寇宣公之子禦魚吕反又作御言公子而不言大夫公子未命為大夫也其曰公子何也公子之重視大夫視比命以執公子大夫既命得執公子之禮一本大夫命以視公子夏五月以五月首時寧所未詳秋七月丙申及齊髙傒盟于防不言公髙傒伉也書日則公盟也髙傒驕伉與公敵體恥之故不書公傒音奚伉苦浪反冬公如齊納幣納幣大夫之事也禮有納采采擇女之德性也其禮用鴈為贄者取順隂陽往來贄音至有問名問女名而卜之知吉凶也其禮如納采有納徴徴成也納幣以成婚有告期告迎期迎魚敬反四者備而後娶禮也公之親納幣非禮也故譏之公母喪未再期而圗婚傳無譏文但譏親納幣者喪婚不待貶絶而罪惡見見賢遍反二十有三年春公至自齊祭叔來聘祭叔天子寰內諸侯叔名祭側界反寰音縣又音環其不言使何也天子之內臣也不正其外交故不與使也何休曰南季宰渠伯糾家父宰周公來聘皆稱使獨于此奪之何也鄭君釋之曰諸稱使者是奉王命其人無自來之意今祭叔不一心於王而欲外交不得王命來故去使以見之去起吕反見賢遍反夏公如齊觀社常事曰視視朔是也非常曰觀觀無事之辭也言無朝會之事朝直遙反下同以是為尸女也尸主也主為女往爾以觀社為辭主為于偽反無事不出竟公至自齊公如陳公行例往時正也正謂無危懼也皆放此致月故也如往月致月有懼焉爾荆人來聘善纍而後進之其曰人何也舉道不待再明聘問之禮朝宗之道非夷狄之所能故一舉而進之公及齊侯遇于榖及者內為志焉爾遇者志相得也蕭叔朝公微國之君未爵命者其不言來於外也言於榖朝公也朝於廟正也於外非正也秋丹桓宫楹楹柱禮天子諸侯􅉳堊黝堊黑色􅉳於糾反又於栁反注同堊烏路反又烏各反范云􅉳堊黑色案􅉳黑也堊白土大夫倉士黈黈黃色黈他苟反黃色也麋氏云張斗反丹楹非禮也冬十有一月曹伯射姑卒射音亦本或作亦十有二月甲寅公會齊侯盟于扈桓盟不日此盟日者前公如齊觀社傳曰觀無事之辭以是為尸女也公怠棄國政比行犯禮憂危甚矣霸主降心親與之盟實有弘濟之功而魯得免於罪臣子所慶莫重於此時事所重文亦冝詳故特謹日以著之扈音戶二十有四年春王三月刻桓宫桷禮天子之桷斫之礱之加密石焉以細石磨之刻音克桷音角榱也方曰桷圎曰椽斫丁角反削也礱之力公反磨也諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也夫人所以崇宗廟也取非禮與非正而加之於宗廟以飾夫人非正也非禮謂娶讎女非正謂刻桷丹楹也本非宗廟之冝故曰加言將親迎欲為夫人飾又非正也迎魚敬反下皆同刻桓宫桷丹桓宫楹斥言桓宫以惡莊也不言新宫而謂之桓宫以桓見殺於齊而飾其宗朝以榮讎國之女惡莊不子惡烏路反下同葬曹莊公夏公如齊逆女親迎恆事也不志此其志何也不正其親迎於齊也秋公至自齊迎者行見諸舍見諸諸之也言瞻望夫人乘車乘繩證反先至非正也八月丁丑夫人薑氏入哀薑入者內弗受也日入惡入者也何用不受也以宗廟弗受也其以宗廟弗受何也娶仇人子弟以薦舍於前其義不可受也薦進舍置惡入烏路反一音如字戊寅大夫宗婦覿用幣宗婦同宗大夫之婦覿用徒歷反見也覿見也禮大夫不見夫人不言及不正其行婦道故列數之也男子之贄羔鴈雉腒贄所以至者也上大夫用羔取其從羣帥而不黨也下大夫用鴈取其知時飛翔有行列也士冬用雉夏用腒取其耿介交有時别有倫也腒臘也雉必用死為其不可生服也夏用腒備腐臭也數色主反腒其居反臘也乾雉也士夏執之備腐臭也説文云北方謂烏臘曰腒傳曰堯臘舜始腒别彼列反為其于偽反腐符甫反婦人之贄棗栗煆修棗取其早自矜莊栗取其敬栗煆修取斷斷自修整煆丁亂反脯也鍛而加薑桂曰修修飭本或作勑同恥力反一本作飾申職反或作整音征領反用幣非禮也用者不冝用者也大夫國體也國體謂為君股肱股音古肱古弘反而行婦道惡之故謹而日之也惡烏路反大水冬戎侵曹曹羈出奔陳赤歸于曹郭公赤蓋郭公也何為名也禮諸侯無外歸之義外歸非正也徐乾曰郭公郭國之君也名赤蓋不能治其國舍而歸于曹君為社稷之主承宗廟之重不能安之而外歸他國故但書名以罪而懲之不直言赤復云郭公者恐不知赤者是誰將若魯之微者故也以郭公著上者則是諸侯失國之例是無以見微之義羈居冝反郭公左氏如字公羊音虢舍音捨懲直升反復杖又反著張慮反又張略反見賢遍反二十有五年春陳侯使女叔來聘女氏叔字女音汝其不名何也據成三年晉侯使荀庚來聘稱名天子之命大夫也夏五月癸丑衛侯朔卒惠公也犯逆失德故不書葬六月辛未朔日有食之言日言朔食正朔也鼓用牲于社鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓麾旌幡也五兵豫戟鉞楯弓矢麾毀為反幡芳元反矛亡侯反鉞音越楯時準反又音允諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也凡有聲皆陽事以壓隂氣柝兩木相擊充實也柝吐洛反壓於甲反又於涉反伯姬歸于𣏌其不言逆何也逆之道微無足道焉爾秋大水鼓用牲于社于門門國門也髙下有水災曰大水既戒鼓而駭衆用牲可以巳矣救日以鼓兵救水以鼓衆冬公子友如陳二十有六年春公伐戎夏公至自伐戎曹殺其大夫言大夫而不稱名姓無命大夫也無命大夫而曰大夫賢也為曹羈崇也徐邈曰于時微國衰陵不能及禮其大夫降班失位下同於士故略稱人而傳謂之無命大夫也莒慶莒拿邾庶其邾快皆特以事書非實能貴故略名而巳楚雖荆蠻漸自通于諸夏故莊二十三年書荆人來聘文九年又褒而書名國轉強大書之益詳然當僖公文公之丗楚猶未能自同于列國故得臣及椒並略名惟屈完來會諸侯以殊禮成之楚莊王之興為江漢盟主與諸夏之君權行抗禮其勢強于當年而事交於內外故春秋書之遂從中國之例夫政俗隆替有乎其人三后之姓日失其序而諸國乘間與之代興因詳略之文則可以見時事之實矣秦爵伯也上據西周班列中夏故得稱師有大夫其大夫當名氏而文十二年秦術略名蓋于時晉主魯盟而秦方敵晉則魯之于秦情好疏矣禮以飾情情疏則禮略春秋所以略文乎又吳札不書氏以成尊于上也宋之盟叔孫豹不書氏以著其能恭此皆因事而為義為曹于偽反拿女居反又女加反快苦夬反諸夏户雅反下同屈君勿反情好呼報反秋公會宋人齊人伐徐冬十有二月癸亥朔日有食之二十有七年春公會𣏌伯姬于洮伯姬莊公女洮魯地洮他刀反本或作桃夏六月公會齊侯宋公陳侯鄭伯同盟于幽同者有同也同尊周也於是而後授之諸侯也其授之諸侯何也齊侯得衆也桓會不致安之也桓盟不日信之也信其信仁其仁衣裳之會十有一未嘗有歃血之盟也信厚也十三年會北杏十四年會鄄十五年又會鄄十六年會幽二十七年又會幽僖元年會柳二年會貫三年會陽榖五年會首戴七年會寧母九年會葵丘歃所洽反于朾他貞反又勑丁反本亦作柳寧如字又音寧母音無又茂后反兵車之會四未嘗有大戰也愛民也僖八年會洮十三年會鹹十五年會牡丘十六年會淮於末年乃言之不道侵蔡伐楚者方書其盛不道兵車也此則以兵車會而不用征伐鹹音咸牡荗后反秋公子友如陳葬原仲原仲陳大夫原氏仲字言葬不言卒不葬者也外大夫例不書卒不葬而曰葬諱出奔也言季友辟內難而出以葬原仲為辭難乃旦反冬𣏌伯姬來歸寧莒慶來逆叔姬慶名也莒大夫也叔姬莊公女禮檀弓記曰陳莊子死赴於魯魯人欲勿哭繆公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之今之大夫交政於中國雖欲勿哭安得而勿哭則大夫越竟逆女非禮也董仲舒曰大夫無束修之餽無諸侯之交越竟逆女紀罪之繆音穆縣音玄竟音境焉於虔反餽旦愧反越竟本或作疆居良反諸侯之嫁子於大夫主大夫以與之君不敵臣來者接內也不正其接內故不與夫婦之稱也接內謂與君為禮也大婦之稱當言逆女稱尺證反𣏌伯來朝𣏌稱伯蓋時王所絀朝直遙反絀本又作黜勑律反公會齊侯于城濮城濮衛地濮音卜二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績於伐與戰安戰也問在何處戰處昌慮反戰衛戰則是師也其曰人何也微之也何為微之也今授之諸侯而後有侵伐之事故微之也其人衛何也以其人齊不可不人衛也齊桓始受方伯之任未能信著鄰國致有侵伐之事貶師稱人以微之也人不可以敵于師師不可以與人戰故亦以衛師為人衛非有罪衛小齊大其以衛及之何也以其微之可以言及也其稱人以敗何也不以師敗於人也人輕而師重夏四月丁未邾子瑣卒瑣素果反秋荆伐鄭荆者楚也其曰荆州舉之也公會齊人宋人救鄭善救鄭也冬築微微魯邑微左氏作麋山林藪澤之利所以與民共也虞之非正也虞典禽獸之官言規固而築之又置官司以守之是不與民共同利也築不志凡志皆譏也築例時藪素后反大無麥禾大者有顧之辭也於無禾及無麥也一災不書於冬無禾而後顧録無麥故言大明不收甚臧孫辰告糴于齊臧孫辰魯大夫臧文仲糴音狄國無三年之畜曰國非其國也一年不升告糴諸侯告請也糴糴也不正故舉臧孫辰以為私行也為內諱故不稱使使若私行畜勑六反下同為內干偽反下文為內同國無九年之畜曰不足無六年之畜曰急無三年之畜曰國非其國也諸侯無粟諸侯相歸粟正也臧孫辰告糴于齊告然後與之言內之無外交也古者稅什一宣十五年注詳矣稅始鋭反什一十而稅一豐年輔敗敗謂凶年不外求而上下皆足也雖纍凶年民弗病也一年不艾而百姓飢君子非之不言如為內諱也艾牛蓋反二十有九年春新延廏延廏者法廏也周禪天子十二間馬六種邦國六間馬四種每廏一間言法廏者六間之舊制也廏九又反六種之勇反下皆同其言新有故也言改故而新之有故則何為書也古之君人者必時視民之所勤民勤於力則功築罕罕希罕呼旦反民勤於財則貢賦少民勤於食則百事廢矣凶荒殺禮殺所界反冬築微春新延廏以其用民力為巳悉矣悉盡夏鄭人侵許秋有蜚榖梁説曰蜚者南方臭惡之氣所生也象君臣淫泆有臭惡之行蜚扶味反行下孟反一有一亡曰有亡如字又音無冬十有二月紀叔姬卒紀國雖滅叔姬執節守義故繫之紀賢而録之城諸及防諸防皆魯邑可城也以大及小也傳例曰凡城之志皆譏今云可者謂冬可用城不妨農役耳不謂作城無譏三十年春王正月夏師次于成次止也有畏也欲救鄣而不能也不言公恥不能救鄣也畏齊鄣音章秋七月齊人降鄣降猶下也鄣紀之遺邑也降户江反下遐嫁反八月癸亥葬紀叔姬不日卒而日葬閔紀之亡也九月庚午朔日有食之鼓用牲于社救日用牲既失之矣非正陽之月而又伐鼓亦非禮冬公及齊侯遇于魯濟濟水名濟子禮反及者內為志焉爾遇者志相得也齊人伐山戎齊人者齊侯也其曰人何也愛齊侯乎山戎也不以齊侯敵乎山戎故稱人其愛之何也桓內無因國外無從諸侯而越千里之險北伐山戎危之也內無因緣山戎左右之國為內間者外無諸侯者不煩役寮國從才用反內間間厠之間則非之乎善之也逺伐山戎雖危勤王職貢則善何善乎爾燕周之分子也燕周大保召康公之後成王所封分子謂周之别子孫也燕音煙注及後同分扶問反又如字本或作介音界大音泰召上照反貢職不至山戎為之伐矣言由山戎為害伐擊燕使之隔絶於周室為之如字三十有一年春築臺于郎夏四月薛伯卒築臺于薛薛魯地六月齊侯來獻戎捷獻下奉上之辭也春秋尊魯故曰獻捷在接反戎菽也捷獲也齊侯來獻捷者內齊侯也不言使內與同不言使也泰曰齊桓內救中國外攘夷狄親倚之情不以齊為異國故不稱使若同一國也攘如羊反倚於綺反下丈及注同獻戎捷軍得曰捷戎菽也菽豆秋築臺于秦秦魯地不正罷民三時虞山林藪澤之利且財盡則怨力盡則懟懟恚恨也罷音皮下同懟直類反怨也君子危之故謹而志之也或曰倚諸桓也桓外無諸侯之變內無國事越千里之險北伐山戎為燕辟地辟開為于偽反辟婢亦反魯外無諸侯之變內無國事一年罷民三時虞山林藪澤之利惡內也譏公依倚齊桓而與桓行異惡烏路反行下孟反冬不雨三十有二年春城小榖小榖魯邑夏宋公齊侯遇于梁丘遇者志相得也梁丘在曹邾之間去齊八百里非不能從諸侯而往也辭所遇遇所不遇大齊桓也辭所遇謂八百里間諸侯必有願從者而辭之遇所不遇謂逺遇宋公也能從才用反或如字注同秋七月癸巳公子牙卒牙慶父同母弟何休曰傳例大夫不日卒惡也牙與慶父共淫哀薑謀殺子般而日卒何也鄭君釋之曰牙莊公母弟不言弟其惡巳見不待去日矣寧案傳例諸侯之尊弟也不得以屬通蓋以禮諸侯絶期而臣諸父昆弟稱昆弟則是申其私親也宣十七年公弟叔肸卒傳曰其曰公弟叔肸賢之也然則不稱弟自其常例耳鄭君之説寧所未詳見賢遍反去起吕反期音期肸許乙反八月癸亥公薨于路寢公薨皆書其所謹凶變路寢正寢也寢疾居正寢正也男子不絶于婦人之手以齊終也齊潔齊側皆反本亦作齋冬十月乙未子般卒在喪故稱子般其名也莊公大子不書弒諱也般音班大音泰子卒日正也襄三十一年秋九月癸巳子野卒是也不日故也文十八年冬十月子赤卒是也有所見則日閔公不書即位是見繼弒者也故慶父弒子般子般可以日卒不待不日而顯見則賢遍反公子慶父如齊此奔也其曰如何也據閔二年慶父奔莒不言如諱莫如深深則隱深謂君弒賊奔隱痛之至也故子般日卒慶父如齊苟有所見莫如深也閔公不書即位見子般之弒慶父出奔狄伐邢春秋榖梁卷第三經傳伍阡一伯肆拾叄字注陸阡零丹二字音義一阡陸伯玖拾肆字仁仲比校訖
