front:
  text: 春秋榖梁傳定公第十一定公名宋昭公庻弟敬王十一年即位
  hash: sha256:c3c031bef4feede1515f65d3b99a1162d46cae07193f16c24fc5e87a24c6b1fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_011-1a}
body:
  text: 范寗集解元年春王不言正月定無正也定之無正何也昭公之終非正終也死在外故定之始非正始也昭無正終故定無正始不言即位䘮在外也三月晉人執宋仲幾于京師晉執人於尊者之側而不以歸京師故但言其執不書所歸徐邈曰案傳定元年不書正月言定無正也然則改元即位在于此年故不可以不書王書正必有月以承之故因其執月以表年首爾不以謹仲幾也此大夫其曰人何也微之也何爲微之不正其執人於尊者之所也不與大夫之伯討也夏六月癸亥公之䘮至自乾侯戊辰公即位殯然後即位也周人殯于西皆之上定無正見無以正也踰年不言即位是有故公也謂昭公在外故見賢徧反言即位是無故公也即位授受之道也先君見授後君乃受故須棺在殯乃言即位先君無正終則後君無正始也先君有正終則後君有正始也戊辰公即位謹之也定之即位不可不察也公即位何以日也據未有日者戊辰之日然後即位也癸亥公之䘮至自乾侯何爲戊辰之日然後即位也癸亥去戊辰六日怪不即位正君乎國然後即位也諸侯五日而殯今以君始死之禮治之故須殯而後言即位沈子曰正棺乎兩楹之間然後即位也兩楹之間南面之君聽治之處之處昌慮反内之大事日即位君之大事也其不日何也以年決者不以日決也此則其日何也著之也欲有所見何著焉踰年即位厲也厲危也公䘮在外踰年六月乃得即位危故日之於厲之中又有義也先君未殯則後君不得即位未殯雖有天子之命猶不敢况臨諸臣乎以輕喻重也雖爲天子所召不敢背殯而往况君䘮未殯而行即位之禮以臨諸臣乎周人有䘮魯人有䘮周人弔魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也故周人弔魯人不弔以其下成康爲未乆也周道尚明無愧于不往君至尊也去父之殯而往弔猶不敢况未殯而臨諸臣乎秋七月癸巳葬我君昭公九月大雩雩月雩之正也秋大雩非正也秋大雩之爲非正何也各禾稼旣成猶雩則非禮可知秋禾稼始苗嫌當湏雨故問也毛澤未盡人力未竭未可以雩也邵曰凡地之所生謂之毛公羊傳曰錫之不毛之地是也言秋百穀之潤澤未盡也人力未盡謂耕耘之功未畢耘本又作芸音云雩月雩之正也月之爲雩之正何也其時窮人力盡然後雩雩之正也何謂其時窮人力盡是月不雨則無及矣是年不艾則無食矣是謂其時窮人力盡也雩之必待其時窮人力盡何也雩者爲旱求者也求者請也古之人重請何重乎請人之所以爲人者讓也請道去讓也則是舎其所以爲人也是以重之焉請哉請乎應上公古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉道之謂君必爲先也其禱辭曰方今大旱野無生稼寡人當死百姓何謗不敢煩民請命願撫萬民以身塞無狀禱亦請也此即請辭也艾魚廢反爲旱于僞反去讓羗吕反是舎音捨焉請於䖍反應上時掌反道之音導夫請者非可詒託而往也必親之者也是以重之詒託猶假寄詒以之反立煬宮煬宫伯禽子廟毀巳乆煬宫餘亮反煬公之廟也煬公伯禽子立者不宜立者也冬十月隕霜殺菽建酉之月隕霜殺菽非常之災未可以殺而殺舉重舉殺豆則殺草可知可殺而不殺舉輕不殺草則不殺菽亦顯僖三十三年隕霜不殺草是也其曰菽舉重也二年春王正月夏五月壬辰雉門及兩觀災雉門公宫之南門兩觀闕也兩觀工喚反注及下文同其不曰雉門災及兩觀何也據先書雉門則應言雉門災及兩觀鄭嗣曰據災實從雉門起應言雉門災及兩觀災自兩觀始也不以尊者親災也始災者兩觀也鄭嗣曰今以災在兩觀下使若兩觀始災者不以雉門親災先言雉門尊尊也欲言兩觀災及雉門則卑不可以及尊災不從雉門起故不得言雉門災及兩觀兩觀始災故災在兩觀下也鄭嗣曰欲以兩觀親災則經冝言兩觀災及雉門雉門尊兩觀卑卑不可以及尊故不得不先言雉門而後言兩觀欲令兩觀始災故災在兩觀下爾令力呈反秋楚人伐呉冬十月新作雉門及兩觀言新有舊也作爲也有加其度也此不正其以志於後㑹也後志疑也公畏楚強疑於侵之故復㑹更謀也不日者後楚伐蔡不能救故復㑹扶又反𣏌伯成卒于㑹六月葬陳惠公許遷于容城秋七月公至自㑹劉卷卒劉采地劉卷音權采七代反此不卒而卒者賢之也寰内諸侯也非列土諸侯此何以卒也天子畿内大夫有采地者謂一寰内諸侯非列士之諸侯雖賢猶不當卒寰内音環天王崩爲諸侯主也昭二十二年景王崩甞以賔主之禮相接能爲諸侯主所以爲賢葬𣏌悼公楚人圍蔡晉士鞅衞孔圉帥師伐鮮虞葬劉文公冬十有一月庚午蔡侯以呉子及楚人戰于伯舉楚師敗績呉其稱子何也以蔡侯之以之舉其貴者也貴謂子也蔡侯之以之則其舉貴者何也呉信中國而攘夷狄呉進矣其信中國而攘夷狄奈何子胥父誅于楚也子胥父伍奢也爲楚平王所殺信音申攘如羊反却也挾弓持矢而干闔廬見不以禮曰干欲因闔廬復父之讎挾戸牒反又子恊反闔户臘反廬力居反見賢徧及闔廬曰大之甚勇之甚子胥匹夫乃欲復讎於國君其孝甚大其心甚勇爲是欲興師而伐楚子胥諌曰臣聞之君不爲匹夫興師且事君猶事父也虧君之義復父之讎臣弗爲也於是止蔡昭公朝於楚有美裘正是日囊瓦求之正是日謂昭公始朝楚之日爲是于僞反不爲及下爲是皆同朝於直遥反注同囊乃郎反昭公不與爲是拘昭公於南郢南郢楚都郢以井反又以正反數年然後得歸乃用事乎漢用事者禱漢水神數所主反曰苟諸侯有欲伐楚者寡人請爲前列焉楚人聞之而怒爲是興師而伐蔡蔡請救于呉子胥曰蔡非有罪楚無道也君若有憂中國之心則若此時可矣爲是興師而伐楚何以不言救也據實救蔡救大也夷狄漸進未同於中國楚囊瓦出奔鄭知見伐由己故懼而岀奔庚辰呉入楚日入易無楚也易無楚者壞宗廟徙陳器撻平王之墓鄭嗣曰陳器樂縣也禮諸侯軒縣言吴人壞楚宗廟徙其樂器鞭其君之尸楚無能亢御之者若曰無人也易以䜴反壞音怪撻土逹反縣音玄元苦浪反何以不言滅也據宗廟旣毀樂器巳徙則是滅也欲存楚也其欲存楚奈何昭王之軍敗而逃父老送之曰寡人不肖亡先君之邑父老反矣何憂無君寡人且用此入海矣父老曰有君如此其賢也以衆不如吴以必死不如楚雍曰呉勝而驕楚敗而奮肖音笑奮方問反相與擊之一夜而三敗呉人復立楚復立也敗必邁反復扶又反何以謂之呉也據戰稱子狄之也何謂狄之也君居其君之寢而妻其君之妻大夫居其大夫之寢而妻其大夫之妻蓋有欲妻楚王之母者不正乘敗人之績而深爲利居人之國故反其狄道也五年春王三月辛亥朔日有食之夏歸粟于蔡蔡侯比年在楚又爲楚所伐飢故諸侯歸之粟諸侯無粟諸侯相歸粟正也孰歸之諸侯也不言歸之者專辭也不言歸之者主名若獨是魯也義邇也言此是邇近之事故不足具列諸侯於越入呉舊說於越夷言也春秋即其所以自稱者書之見其不能慕中國故以本俗名自通見其賢徧反六月丙申季孫意如卒傳例曰大夫不日卒惡也意如逐昭公而日卒者明定之得立由于意如春秋因定之不惡而書日以示譏亦猶公子翬非桓之罪人故於桓不貶惡烏路反翬許韋反秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸二月公侵鄭公至自侵鄭夏季孫斯仲孫何忌如晉仲孫忌而曰仲孫何忌寗所未詳公羊傳曰譏二名秋晉人執宋行人樂祁犂冬城中城城中城者三家張也大夫稱家三家仲孫叔孫季孫也三家侈張故公懼而脩内城譏公不務德政恃城以自固張如字一音丁亮反注同或曰非外民也季孫斯仲孫忌帥師圍鄆七年春王正月夏四月秋齊侯鄭伯盟于鹹鹹音咸齊人執衛行人北宫結以侵衞以重辭也衞人重北宫結齊以衞重結故執以侵之若楚執宋公以伐宋凡言以皆非所冝以齊侯衞侯盟于沙沙地大雩齊國夏帥師伐我西鄙九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊未得志故三月公至自侵齊公如往時致月危致也往月致時危往也往月致月惡之也惡烏路反曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦瓦衛地也公至自瓦秋七月戊辰陳侯栁卒栁良乆反晉士鞅帥師侵鄭遂侵衞葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衞冬衞侯鄭伯盟于曲濮曲濮衞地濮音卜從祀先公貴復正也文公逆祀今還順盗竊寳玉大弓寳玉者封圭也始封之圭大弓者武王之戎弓也是武王征伐之弓周公受賜藏之魯周公受賜於周藏之魯者欲丗丗子孫無忘周德也非其所以與人而與人謂之亡亡失也非其所取而取之謂之盗九年春王正月夏四月戊申鄭伯蠆卒蠆田邁反得寳玉大弓杜預曰弓王國之分噐也得之足以爲榮失之足以爲辱故重而書之分噐扶問反其不地何也寳玉大弓在家則羞不目羞也國之大寳在家則羞也況陪臣專之乎恥甚而不目其地惡得之惡於何也惡音烏注亦同得之堤下或曰陽虎以解衆也六月葬鄭獻公秋齊侯衞侯次于五氏五氏晉地秦伯卒冬葬秦哀公十年春王三月及齊平平前八年再侵齊之怨夏公㑹齊侯于頰谷頰古恊反左傳作夾谷公至自頰谷離㑹不致雍曰二國㑹曰離各是其所是非其所非然則所是之是未必是所非之非未必非未必非者不能非人之真非未必是者不能是人之真是是非紛錯則未有是是非不同故曰離離則善惡無在善惡無在則不足致之于宗廟何爲致也危之也危之則以地致何也爲危之也其危奈何曰頰谷之㑹孔子相焉兩君就壇兩相相揖將欲行盟㑹之禮舄危于僞反相焉息亮反下兩相同壇徒丹反封土曰壇齊人鼔譟而起欲以執魯君羣呼曰譟鼔譟素報反呼火故反孔子歷階而上不盡一等而視歸乎齊侯階㑹壇之階曰兩君合好夷狄之民何爲來爲命司馬止之兩君合㑹以結親好而齊人欲執魯君此無禮之甚故謂之夷狄之民司馬主兵之官使禦止之合好呼報反注同使禦魚吕反齊侯逡廵而謝曰寡人之過也退而屬其二三大夫曰夫人率其君與之行古人之道二三子獨率我而入夷狄之俗何爲屬語也夫人謂孔子也齊人欲執魯君是夷狄之行逡七旬反屬章欲反夫人音扶語魚吕反之行下孟反罷㑹齊人使優施舞於魯君之幕下優俳施其名也幕帳欲嗤笑魯君幕音莫俳皮皆反嗤尺之反孔子曰笑君者罪當死使司馬行法焉首足異門而出齊人來歸鄆讙龜隂之田者蓋爲此也何休曰齊侯自頰谷歸謂晏子曰寡人獲過於魯侯如之何晏子曰君子謝過以質小人謝過以文齊甞侵魯四邑請皆還之讙好官反蓋爲于僞反因是以見雖有文事必有武備孔子於頰谷之㑹見之矣以見賢徧反晉趙鞅帥師圍衛齊人來歸鄆讙龜隂之田叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑郈音后秋叔孫州仇仲孫何忌帥師圍郈宋樂大心出奔曹宋公子地出奔陳冬齊俟衞侯鄭游速㑹于安甫安甫地名叔孫州仇如齊宋公之弟辰曁宋仲佗石彄出奔陳辰爲佗所強故曰曁曁其噐反佗大河反彄苦候反強其丈反十有一年春宋公之弟辰未失其弟也言辰未有失其爲弟之道故書弟以罪宋公及仲佗石彄公子地以尊及卑也自陳陳有奉焉爾入于蕭以叛蕭宋邑入者内弗受也以者不以也叛直叛也夏四月秋宋樂大心自曹入于蕭入蕭從叛人叛可知故不書叛冬及鄭平平六年侵鄭之怨傳例曰盟不日者渝盟惡之也取夫詳略之義則平不日者亦有惡矣蓋不能相結以信渝羊朱反變也惡之烏路反下同取夫音符叔還如鄭莅盟還音旋十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈墮猶取也陪臣專強違背公室恃城爲固是以叔孫墮其城若新得之故大墮墮猶取也堕非訓取言今但毀其城則郈永屬已若更取邑於他然墮許規反毀也背音佩衞公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費費音秘秋大雩冬十月癸亥公㑹齊侯盟于黄十有一月丙寅朔日有食之公至自黃十有二月公圍成非國不言圍圍成大公也以公之重而伐小邑則爲恥深矣故大公之事而言圍使若成是國然公至自圍成何以致危之也何危爾造乎齊也邊謂相接十有三年春齊侯次于垂葭葭音加夏築蛇淵囿蛇淵地名囿音又大蒐于比蒲比音毗衞公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛以者不以者也叛直叛也冬晉荀寅士吉射入于朝歌以叛射食夜反又食亦反晉趙鞅歸于晉此叛也其以歸言之何也據叛惡而歸善貴其以地反也貴其以地反則是大利也非大利也許悔過也許悔過則何以言叛也以地正國也地謂晉陽也蓋以晉陽之兵還正國也公羊傳曰逐君側之惡人以地正國則何以言叛據是善事其入無君命也凱曰專入晉陽以興甲兵故不得不言叛實以驅惡而安君則釋兵不得不言歸春秋善惡必著之義薜弑其君比比必履反又毗志反十有四年春衛公叔戍來奔晉趙陽出奔宋晉趙陽左氏作衞趙陽二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸佗徒河反又如字牂作郎反夏衛北宫結來奔五月於越敗呉于檇李檇李呉地敗必邁反檇李音醉公㑹齊侯衛侯于牽牽地牽去賢反公至自㑹秋齊侯宋公㑹于洮洮他刀反天王使石尚來歸脤脤祭肉天子祭畢以之賜同姓諸候親兄弟之國與之共福脤市軫反脤者何也爼實也祭肉也生曰脤熟曰膰其辭石尚士也辭猶書也膰音煩本或作煩何以知其士也天子之大夫不名石尚欲書春秋欲著名于春秋諌曰乆矣周之不行禮於魯也請行脤貴復正也衛丗子蒯聵出奔宋蒯瞶苦怪反下五怪反衛公孟彄岀奔鄭宋公之弟辰自蕭來奔稱弟猶未失爲弟之行行下孟反大蒐于比蒲邾子來㑹公㑹公于比蒲城莒父及霄無冬寗所未詳十有五年春王正月邾子來朝朝直遥反鼷䑕食郊牛牛死改卜牛不言所食食非一處以至死鼷音兮處昌慮反不敬莫大焉定公不敬最大故天災最甚二月卒丑楚子滅胡以胡子豹歸夏五月辛亥郊譏不時也壬申公薨于髙寢髙寢宫名髙寢非正也鄭罕逹帥師伐宋齊侯衛侯次于渠蒢渠蒢地也蒢直居反邾子來奔䘮䘮急故以奔言之秋七月壬申弋氏卒妾辭也不言夫人薨弋氏羊職反哀公之母左氏作姒氏哀公之母也八月庚辰朔日有食之九月滕子來㑹葬邾滕魯之屬國近則來奔䘮逺則來㑹葬於長帥之䘮同之王者書非禮長丁丈反帥所類反丁巳葬我君定公雨不克葬葬旣有日不爲雨止禮也雨不克葬䘮不以制也戊午日下稷乃克葬稷昊也下􅉴謂晡時爲于僞反稷如字左氏作􅉴晡布呉反乃急辭也不足乎日之辭也宣八年注詳矣辛巳葬定弋定戈左氏作定姒冬城漆春秋榖梁卷第十一經傳貳阡玖伯壹拾伍字注壹阡捌伯叄拾捌字音義伍伯捌拾伍字仁仲比校訖
