front:
  text: 春秋榖梁傳僖公第五名申惠王十八年即位
  hash: sha256:071db1e197dde55803a74139c1f1b89f6f325dbba12ab9f45439e4fca930779a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_005-1a}
body:
  text: 范寧集解元年春王正月繼弒君不言即位正也弒音試後皆同齊師宋師曹師次于聶北救邢聶北邢地聶女輒反救不言次據莊六年王人子突救衛不言次言次非救也次止也救赴急之意今方停止故知非救也非救而曰救何也遂齊侯之意也録其本意是齊侯與怪其稱師與音餘齊侯也何用見其是齊侯也據經書齊師見賢遍反下復見及注同曹無師曹師者曹伯也小國君將稱君卿將稱人不得稱師言師則是曹伯也曹君不可在師下故知是齊侯君將子匠反下同其不言曹伯何也以其不言齊侯不可言曹伯也其不言齊侯何也以其不足乎揚不言齊侯也救不及事不足稱揚以其不足乎揚絶句稱掦也夏六月邢遷于夷儀辟狄難夷儀邢地難乃旦反遷者猶得其國家以往者也其地邢復見也非若宋人遷宿滅不復見復扶又反下注並同齊師宋師曹師城邢是向之師也使之如改事然美齊侯之功也是向聶北之師當言遂今復列三國者美齊桓存亡國是鄉許亮反本又作向注同秋七月戊辰夫人姜氏薨于夷哀姜夫人薨不地地故也齊人以歸不言以喪歸非以喪歸也加喪焉諱以夫人歸也泰曰齊人實以夫人歸殺之于夷諱故使若自行至夷遇疾而薨然後齊人以喪歸也歸在薨前而今在下是加喪之文也經不言以喪歸者以本非以喪歸也傳例曰以者不以者也微旨見矣見賢遍反其以歸薨之也以歸然後殺之楚人伐鄭八月公㑹齊侯宋公鄭伯曹伯邾人于柳柳宋地柳勑貞反一本作朾音同九月公敗邾師于偃偃邾地敗必邁反下皆同偃于晚反一本作堰同不日疑戰也疑戰而曰敗勝內也冬十月壬午公子友帥師敗莒師于麗獲莒拿麗魯地傳例曰獲者不與之辭麗力池反拿女居反又女加反莒無大夫其曰莒拿何也據非大夫不書以吾獲之目之也內不言獲獲者不與之辭主善以內故不言獲此其言獲何也據文十一年叔孫得臣敗狄于鹹不言獲長狄惡公子之紿紿欺紿也惡烏路反紿徒乃反紿者奈何公子友謂莒拿曰吾二人不相說士卒何罪屏左右而相搏公子友處下左右曰孟勞孟勞者魯之寶刀也公子友以殺之然則何以惡乎紿也據得勝也說音悅卒子忽反搏音博手搏也勞如字孟勞寶刀名曰棄師之道也江熙曰經書敗莒師而傳云二人相搏則師不戰何以得敗理自不通也夫王赫斯怒貴在爰整子所慎三戰居其一季友令德之人豈當舍三軍之整佻身獨鬪潜刃相害以决勝負者哉雖千載之事難明然風味之所期古猶今也此又事之不然傳或失之赫呼白反舍音捨佻他堯反又徒堯反十有二月丁巳夫人氏之喪至自齊其不以不言師也人不得居師上貴賤之序夏陽户雅反左氏作下陽先蘇薦反下文及注同其先晉何也據小不先大為主乎滅夏陽也夏陽者虞虢之塞邑也其地險要故二國以為塞邑塞蘇代反注同滅夏陽而虞虢舉矣虞之為主乎滅夏陽何也晉獻公欲伐虢荀息曰君何不以屈産之乘垂棘之璧而借道乎虞也荀息晉大夫屈邑産駿馬垂棘出良璧屈其勿反又君勿反地名也乘繩證反駿音俊借子夜反及下不借而借皆同公曰此晉國之寶也如受吾幣而不借吾道則如之何荀息曰此小國之所以事大國也此謂璧馬之屬彼不借吾道必不敢受吾幣如受吾幣而借吾道則是我取之中府而藏之外府取之中廏而置之外廏也公曰宫之竒存焉宫之竒虞之賢大夫廏音救竒其冝反必不使受之也荀息曰宫之竒之為人也逹心而懦懦弱懦乃亂反又乃卧反又少長於君逹心則其言略明逹之人言則舉綱領要不言提其耳則愚者不悮少詩召反下同長丁丈反提徒兮反本作題音同懦則不能彊諌少長於君則君輕之且夫玩好在耳目之前而患在一國之後此中知以上乃能慮之臣料虞君中知以下也公遂借道而伐虢宫之竒諌曰晉國之使者其辭卑而幣重必不便於虞虞公弗聽遂受其幣而借之道宫之竒諌曰語曰脣亡則齒寒其斯之謂與語諺言也彊其良反又其丈反好呼報反知音智下同上時掌反料力雕反又力弔反使所吏反便婢面反與音餘諺音彥挈其妻子以奔曹獻公亡虢五年而後舉虞荀息牽馬操璧而前曰璧則猶是也而馬齒加長矣猶是言如故挈去結反操七刀反加長丁丈反秋九月齊侯宋公江人黃人盟于貫貫宋地貫古亂反貫之盟不期而至者江人黃人也江人黃人者逺國之辭也中國稱齊宋逺國稱江黃以為諸侯皆來至也冬十月不雨不雨者勤雨也言不雨是欲得雨之心勤也明君之恤民勤如字麋氏音覲後年同楚人侵鄭三年春王正月不雨不雨者勤雨也夏四月不雨一時不雨則書首月不言旱不為災一時言不雨者閔雨也經一時輒言不雨憂民之至閔憂也閔雨者有志乎民者也徐人取舒六月雨雨云者喜雨也喜雨者有志乎民者也秋齊侯宋公江人黃人㑹于陽榖陽榖齊地陽榖之㑹桓公委端搢笏而朝諸侯委委貌之冠也端玄端之服搢插也笏以記事者也所謂衣裳之㑹搢音進又音箭笏音忽朝直遙反插楚洽反諸侯皆諭乎桓公之志冬公子季友如齊蒞盟傳例曰蒞位也內之前定之盟謂之蒞外之前定之盟謂之來蒞音利又音類蒞者位也盟誓之言素定今但往其位而盟其不日前定也不言及者以國與之也不言其人亦以國與之也楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰傳例曰侵時而此月蓋為潰潰户內反蓋為于僞反下為退同潰之為言上下不相得也君臣不和而自潰散侵淺事也侵蔡而蔡潰以桓公為知所侵也責得其罪故裁侵而潰不土其地不分其民明正也遂伐楚次于陘楚彊齊欲綏之以德故不速進而次于陘陘楚地陘音刑遂繼事也次止也夏許男新臣卒十四年冬蔡侯肹卒傳曰諸侯時卒惡之也宣九年辛酉晉侯黑臀卒于扈傳曰其地于外也其日未踰竟也然則新臣卒于楚故不日耳非惡也惡烏路反下同臀徒門反諸侯死於國不地死於外地死於師何為不地據宣九年晉侯黑臀卒于扈地內桓師也齊桓威德洽著諸侯安之雖卒於外與其在國同楚屈完來盟于師盟于召陵屈完來如陘師盟齊桓以其服義為退一舍次于召陵而與之盟召陵楚地召上照反楚無大夫無命卿也其曰屈完何也以其來㑹桓成之為大夫也尊齊桓不欲令與卑者盟令力呈反下同其不言使權在屈完也邵曰齊桓威陵江漢楚人大懼未能量敵遣屈完如師完權事之冝以義郤齊遂得與盟以安竟內功皆在完故不言使與音預又如字則是正乎曰非正也臣無自專之道以其來㑹諸侯重之也重其宗中國歸有道來者何內桓師也來者內辭也內桓師故言來于師前定也于召陵得志乎桓公也得志者不得志也屈完來盟桓公退于召陵是屈完得其本志屈完得志則桓公不得志以桓公得志為僅矣桓為霸主以㑹諸侯楚子不來屈完受盟令問諸江辭又不順僅乃得志言楚之難服為僅其靳反屈完曰大國之以兵向楚何也桓公曰昭王南征不反菁茅之貢不至故周室不祭菁茅香草所以縮酒楚之職貢菁茅子丁反下亡交反菁茅香草也尚書傳云菁以為菹茅以縮酒縮所六反屈完曰菁茅之貢不至則諾昭王南征不反我將問諸江問江邊之民有見之者不此不服罪之言故退干召陵而與之盟屈完所以得志桓公之不得志爾齊人執陳袁濤塗袁濤塗陳大夫濤徒刀反齊人者齊侯也其人之何也於是哆然外齊侯也不正其踰國而執也江熙曰踰國謂踰陳而執陳大夫主人之不敬客由客之不先敬主人哆然衆有不服之心故春秋因而譏之所謂以萬物為心也莊十七年齊人執鄭詹傳與其執者詹奔在齊因執之哆昌者反又昌氏反詹之廉反秋及江人黃人伐陳不言其人及之者何內師也八月公至自伐楚有二事偶則以後事致後事小則以先事致其以伐楚致大伐楚也鄭君曰㑹為大事伐為小事今齊桓伐楚而後盟于召陵公當致㑹而致伐者楚彊莫能伐者故以伐楚為大事葬許穆公冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳莊十年春二月公侵宋傳曰侵時此其月何也惡之故謹而月之然則凡侵而月者皆惡之惡烏路反下同五年春晉侯殺其丗子申生目晉侯厈殺惡晉侯也厈指厈𣏌伯姬來朝其子婦人既嫁不踰竟踰竟非正也諸侯相見曰朝伯姬為志乎朝其子也伯姬為志乎朝其子則是𣏌伯失夫之道矣凱曰不能刑于寡妻朝直遙反下皆同為志于僞反下同諸侯相見曰朝以待人父之道待人之子非正也故曰𣏌伯姬來朝其子參譏也參譏謂伯姬𣏌伯魯侯也桓九年曹伯使其丗子射姑來朝譏丗子此不譏者明子隨母行年尚幼弱未可責以人子之道伯姬以莊二十五年夏嫁至今十三年則子幼可知參七南反又音三夏公孫兹如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王丗子于首戴惠王之丗子名鄭後立為襄王首戴衛地首戴左氏作首止及以㑹尊之也言及諸侯然後㑹王丗子不敢令丗子與諸侯齊列令力呈反何尊焉王丗子云者唯王之二也云可以重之存焉尊之也何重焉天子丗子丗天下也秋八月諸侯盟于首戴言諸侯者前目而後凡他皆放比無中事而復舉諸侯何也尊王丗子而不敢與盟也尊則其不敢與盟何也盟者不相信也故謹信也不敢以所不信而加之尊者桓諸侯也不能朝天子是不臣也王丗子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王丗子不子則其所善焉何也是則變之正也雖非禮之正而合當時之冝復扶又反下同瑰苦對反又苦怪反天子微諸侯不享覲桓控大國扶小國統諸侯不能以朝天子亦不敢致天王尊王丗子于首戴乃所以尊天王之命也丗子含王命㑹齊桓亦所以尊天王之命也丗子受之可乎是亦變之正也天子微諸侯不享覲丗子受諸侯之尊己而天王尊矣丗子受之可也鄭伯逃歸不盟以其去諸侯故逃之也專己背衆故書逃傳例曰逃義曰逃控大苦貢反背衆音佩楚人滅弦弦子奔黃弦國也其不日微國也九月戊申朔日有食之冬晉人執虞公虞公貪璧馬之寶棄兄弟之親拒絶忠諌之口不圗社稷之危故晉命行于虞使下執上虞同于晉是以謂之晉人執虞公江熙曰春秋有州公郭公虞公凡三公非爵也傳以為下執之辭嘗試因此論之五等諸侯民皆稱日公存有王爵之限沒則申其臣民之稱州公舍其國故先書州公郭公盜而歸曹故先名而後稱郭公夏陽亡則虞為滅國故冝稱虞公三人殊而一致三公舛而同歸生死齊稱蓋春秋所賤之稱尺證反下齊稱同舍音捨舛昌兖反執不言所於地緼於晉也時虞巳包裹屬於晉故雖在虞執而不書其處緼紆粉反包音苞裹音果處昌吕反其曰公何也據十九年宋人執滕子嬰齊不言公猶曰其下執之之辭也臣民執其君故稱公其猶下執之之辭何也晉命行乎虞民矣虞服于晉故從晉命而執其君虞虢之相救非相為賜也今日亡虢而明日亡虞矣言明日喻其速為于僞反又如字六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城伐國不言圍邑此其言圍何也據元年楚人伐鄭不言園病鄭也著鄭伯之罪也泰曰諸伐國而言圍邑傳皆以為伐者之罪而以此著鄭伯之罪者齊桓行霸尊崇王室綏合諸侯翼戴丗子盟之美者莫盛於此而鄭伯辟義逃歸違叛霸者是以諸侯伐而圍之罪著于上討顯于下圍伐之文雖同而善惡之義有殊亦猶桓盟不日以明信而葵丘之盟日之以為美著張慮反辟音避秋楚人圍許諸侯遂救許伐鄭之諸侯善救許也冬公至自伐鄭其不以救許致何也大伐鄭也七年春齊人伐鄭夏小邾子來朝朝直遙反鄭殺其大夫申侯稱國以殺大夫殺無罪也秋七月公㑹齊侯宋公陳丗子欵鄭丗子華盟于寧母寧母某地寧母上音如字又音寧下音無又荗后反左氏作寧衣裳之㑹也曹伯班卒班必顔反公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳丗子𣢾盟于洮洮曹地王人之先諸侯何也貴王命也朝服雖敝必加於上辨冕雖舊必加於首周室雖衰必先諸侯兵車之㑹也鄭伯乞盟以向之逃歸乞之也向謂五年逃首戴之盟齊桓為兵車之㑹于此乃震服懼不得盟故乞得與之不録使者使若鄭伯自來所以抑一人之惡申衆人之善之先悉薦反下同朝服直遙反辨皮彥反以向香亮反本又作鄉注同得與音豫使者所吏反乞者重辭也人道貴讓故以乞為重重是盟也悔前逃歸故以重言乞者處其所而請與也言乞知不自來蓋汋之也汋血而與之汋由若反一音酌夏狄伐晉秋七月禘于大廟禘三年大祭之名大廟周公廟禮記明堂位曰季夏六月以禘禮祀周公于大廟雜記下曰孟獻子曰七月日至可以有事子祖七月而禘獻子為之案宣九年仲孫蔑如京帥於是獻子始見經襄十九年卒然則失禮非獻子所始明矣雜記之云寧所未詳大廟音泰見賢遍反下文而見同用致夫人劉向曰夫人成風也致之于大廟立之以為夫人夫人成風也左氏以為哀姜用者不冝用者也致者不冝致者也言夫人必以其氏姓言夫人而不以氏姓非夫人也立妾之辭也非正也夫人者正嫡之稱謂非崇妾之嘉號以妾體君則上下無别雖尊其母是卑其父故曰非正也禮有君之母非夫人者又庶子為後為其母緦是妾不為夫人明矣適丁歷反本亦作嫡稱尺證反别彼列反為其于僞反緦音思夫人之我可以不夫人之乎夫人卒葬之我可以不卒葬之乎鄭嗣曰君以為夫人君以夫人之禮卒葬之主書者不得不以為夫人也成風以文四年薨五年葬傳終說其事一則以宗廟臨之而後貶焉臣無貶君之義故于大廟去夫人氏姓以明君之非正去起吕反一則以外之弗夫人而見正焉秦人來歸僖公成風之禭不言夫人禭音遂冬十有二月丁未天王崩惠王也九年春王三月丁丑宋公禦說卒禦魚吕反本亦作御說音恱夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘宰官周采地天子三公不字宋子襄公葵丘地名采音菜天子之宰通于四海宰天官冡宰兼為三公者三公論道之官無事于㑹盟冡宰掌建邦之六典以佐王治邦國故曰通于四海宋其稱子何也未葬之辭也禮柩在堂上孤無外事今背殯而音章又之亮反母訖糴訖止也謂貯粟糴音狄貯張吕反母易樹子樹子嫡子嫡丁歷反母以妾為妻母使婦人與國事女正位於內與音豫甲子晉侯詭諸卒獻公也枉殺丗子申生失德不葬詭諸九委反左氏作佹諸枉紆往反冬晉里克殺其君之子奚齊其君之子云者國人不子也國人不子何也不正其殺丗子申生而立之也諸侯在喪稱子言國人不君之故繫干其君十年春王正月公如齊狄滅溫溫子奔衛晉里克弒其君卓及其大夫荀息以尊及卑也荀息間也卓勑角反夏齊侯許男伐北戎晉殺其大夫里克稱國以殺罪纍上也里克弒二君與一大夫二君奚齊卓子一大夫荀息其以纍上之辭言之何也據有罪其殺之不以其罪也其殺之不以其罪奈何里克所為弒者為重耳也殺奚齊卓子者欲以重耳為君重耳夷吾兄文么所為于僞反下文皆同重直龍反殺奚齊申志反又如字夷吾曰是又將殺我乎故殺之不以其罪也其為重耳弒奈何晉獻公伐虢得麗姬獻公私之有二子長曰奚齊稚曰卓子麗姬欲為亂亂謂殺申生而立其子麗姐力池反伐虢所得左氏伐麗戎所得長丁丈反稚直吏反故謂君曰吾夜者夢夫人趨而來曰吾苦畏夫人申生母苦如字又祜路反下同胡不使大夫將衛士而衛冡乎公曰孰可使曰臣莫尊於丗子則丗子可故君謂丗子曰麗姬夢夫人趨而來曰吾苦畏女其將衛士而往衛冡乎丗子曰敬諾築宫宫成麗姬又曰吾夜者夢夫人趨而來日吾苦飢丗子之宫巳成則何為不使祠也故獻公謂丗子曰其祠丗豫柌巳祠致福於君君田而不在麗姬以鴆為酒藥脯以毒獻公田來麗姬曰丗子巳祠故致福於君君將食麗姬跪曰食自外來者不可不試也覆酒於地而地賁賁沸起也女音汝下皆同祠自絲反鴆直䕃反以鳩烏毛畫酒跪求委反覆芳服反賁扶粉反注同以脯與犬犬死麗姬下堂而啼呼曰天乎天乎國子之國也子何遲於為君君喟然歎曰吾與女未有過切吾與女未有過差切急呼火故反喟去塊反又去怪反差初賣反又如字是何與我之深也使人謂丗子曰爾其圖之丗子之傅里克謂丗子曰入自明入自明則可以生不入自明則不可以生丗豫日吾君巳老矣巳昏矣吾若此而入自明則麗姬必死麗姬死則吾君不安所以使吾君不安者吾不若自死吾寧自殺以安吾君以重耳為寄矣慮麗姬又譛重耳故以託里克使保全之刎脰而死刎亡粉反脰音豆頸也故里克所為弒者為重耳也夷吾曰是又將殺我也秋七月冬大雨雪雨于付反十有一年春晉殺其大夫㔻鄭父㔻浦悲反稱國以殺罪纍上也夏公及夫人姜氏㑹齊侯于陽榖秋八月大雩雩月正也雩得雨曰雩不得雨曰旱禮龍見而雩常祀不書書者皆以旱也故得雨則喜以月為正也不得雨則書旱明旱災成何休曰公羊書雩者善人君應變求索不雩則言旱旱而不害物言不雨也就如榖梁設本不雩何以明之如以不雨明之設旱而不害物何以别乎鄭君釋之曰雩者夏祈榖實之禮也旱亦用焉得雨書雩明雩有益不得雨書旱明旱災成後得雨無及也國君而遭旱雖有不憂民事者何乃廢禮本不雩禱哉顧不能致精誠也旱而不害物固以久不雨别之文二年十三年自十有二月自正月不雨至于秋七月是也榖梁傳曰歷時而言不雨文不閔雨也以文不憂雨故不如僖時書不雨文所以不閔雨者素無志於民性退弱而不明又見時久不雨而無災耳雩音于龍見賢遍反下同應變應對之應索所白反别彼列反下同禱丁老反又丁報反冬楚人伐黃十有二年春王三月庚午日有食之夏楚人滅黃貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣宗諸侯謂諸侯宗之貫古亂反逺于萬反近附近之近為于僞反桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之也閔其貪慕伯者以致滅秋七月冬十有二月丁丑陳侯杵臼卒杵昌吕反十有三年春狄侵衛夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹鹹衛地鹹音咸兵車之㑹也秋九月大雩冬公子友如齊十有四年春諸侯城緣陵緣陵𣏌邑其曰諸侯散辭也直曰諸侯無小大之序是各自欲城無總一之者非伯者所制故曰散辭聚而曰散何也據言諸侯城則是聚諸侯城有散辭也桓德衰矣言諸侯城則非伯者之為可知也齊桓德衰所以散也何休曰案先是盟亦言諸侯非散也又榖梁美九年諸侯盟于葵丘即散何以美之邪鄭君釋之曰九年公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘九月戊辰盟于葵丘時諸侯𥘉在㑹未有歸者故可以不序今此十三年夏公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹而冬公子友如齊此聘也書聘則㑹固前巳歸矣今云諸侯城緣陵而不序其人明其散桓德衰矣葵丘之事安得以難此難乃旦反夏六月季姬及繒子遇于防使繒子來朝遇例時此非所冝遇故謹而月之繒在陵反朝直遙反下文及注同遇者同謀也魯女無故逺㑹諸侯遂得淫通此亦事之不然左傳曰繒季姬來寧公怒之以繒子不朝遇于防而使來朝此近合人情近如字又附近之近來朝者來請己也使來朝請己為妻朝不言使言使非正也以病繒子也秋八月辛卯沙鹿崩沙鹿晉山林屬於山為鹿鹿山足屬之玉反沙山名也無崩道而崩故志之也其日重其變也劉向曰鹿在山下平地臣象隂位也崩者散落背叛不事上之象背音佩狄侵鄭冬蔡侯肸卒肸許乞反諸侯時卒惡之也惡烏路反十有五年春王正月公如齊楚人伐徐三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘牡丘地名兵車之㑹也遂次于匡救徐也時楚人伐徐匡衛地遂繼事也次止也有畏也畏楚公孫敖帥師及諸侯之大夫救徐諸侯既盟次匡皆遣大夫將兵救徐故不復具列諸國復扶又反善救徐也夏五月日有食之夜食秋七月齊師曹師伐厲徐邈曰案齊桓末年用師及㑹皆危之而月也于時霸業巳衰勤王之誠替于內震矜之容見於外禍釁既兆動接危理故月衆國之君雖有失道未足為一丗興衰齊桓威攝羣后政行天下其得失皆治亂所繫故春秋重而詳之録所善而著所危云爾見賢遍反釁許靳反衰本作喪息浪反治直吏反八月螽螽音終螽蟲災也甚則月不甚則時九月公至自㑹莊二十七年傳曰桓㑹不致安之也而此致者齊桓德衰故危而致之季姬歸于繒己卯晦震夷伯之廟夷諡伯字晦冥也震雷也夷伯魯大夫也因此以見天子至于士皆有廟明夷伯之廟過制故因此以言禮冥亡定反見賢遍反天子七廟祭法曰王立七廟曰考廟王考廟皇考廟顯考廟祖考廟有二祧遠廟稱祧桃它堯反諸侯五曰考廟王考廟皇考廟顯考廟祖考廟大夫三曰考廟王考廟皇考廟士二曰考廟王考廟故德厚者流光德薄者流卑雍曰德厚者位尊道隆者爵重故天子逺及七丗士祭祖而巳是以貴始德之本也始封必為祖若契為殷祖棄為周祖契息列反冬宋人伐曹楚人敗徐于婁林婁林徐地敗必邁反下相敗同夷狄相敗志也十有一月壬戍晉侯及秦伯戰于韓韓晉地獲晉侯獲者不與之辭諸侯非可相獲韓之戰晉侯失民矣以其民未敗而君獲也十有六年春王正月戊申朔隕石于宋五劉向曰石隂類也五陽數也象隂而陽行將致隊落隕云敏反行下孟反下隂行同隊直類反先隕而後石何也據莊七年星隕如雨先言星後言隕隕而後石也既隕後乃知是石于宋四竟之內曰宋後數散辭也耳治也隕石記聞也聞其磌然視之則石察之則五竟音境治直吏反下目治同磌之人反又大年反聲響也是月六鶂退飛過宋都是月隕石之月劉向曰鶂陽也六隂數也象陽而隂行必衰退鶂五歷反是月者决不日而月也欲著石日鶂月故言是月若不言是月則嫌與戊申同六鶂退飛過宋都先數聚辭也目治也六鶂退飛記見也視之則六察之則鶂徐而察之則退飛子曰石無知之物鶂微有知之物石無知故日之石無知而隕必天使之然故詳而日之鶂微有知之物故月之鶂或時自欲退飛耳是以略而月之君子之於物無所苟而巳石鶂且猶盡其辭而况於人乎故五石六鶂之辭不設則王道不亢矣不遺微細故王道可舉亢苦浪反民所聚曰都三月壬申公子季友卒大夫日卒正也季友桓公之子稱公弟叔仲賢也大夫不言公子公孫疏之也夏四月丙申繒季姬卒秋七月甲子公孫兹卒大夫日卒正也冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮兵車之㑹也淮音懷十有七年春齊人徐人伐英氏英於京反夏滅項孰滅之桓公也何以不言桓公也據莊十年齊師滅談稱齊師項户講反國名也齊滅之左氏以為魯滅為賢者諱也項國也不可滅而滅之乎桓公知項之可滅也知政昏亂易可滅為于僞反下為之諱同而不知已之不可以滅也霸者存恤鄰國抑彊輔弱義不可滅人之國既滅人之國矣何賢乎君子惡惡疾其始絶其始則得不終於惡邵曰謂疾其𥘉為惡之事不終身疾之惡惡並如字又烏路反善善樂其終樂賢者終其行也邵曰謂始有善事則終身善之行下孟反桓公嘗有存亡繼絶之功故君子為之諱也邵曰存亡謂存邢衛繼絶謂立僖公所以終其善秋夫人姜氏㑹齊侯于卞卞魯地卞皮彥反九月公至自㑹相㑹不致而今致㑹桓公德衰威信不著陳列兵車又以滅項往㑹既非踰年乃反故往還皆月以危之冬十有二月乙亥齊侯小白卒此不正其日之何也據二十四年晉侯夷吾卒不書日其不正前見矣其不正之前見何也以不正入虛國故稱嫌焉爾莊九年齊小白入于齊貶不稱公子虛國謂齊無君傳例曰以國氏者嫌也見賢遍反下同十有八年春王正月宋公曹伯衛人邾人伐齊非伐喪也伐喪無道故謹而月之夏師救齊魯師善救齊也五月戊寅宋師及齊師戰于甗甗齊地甗魚輦反又音言齊師敗績戰不言伐客不言及言及惡宋也何休曰戰言及者所以别客主直不直也故文十二年晉人秦人戰于何曲兩不直故不云及今宋言及明直在宋非所以惡宋也即言及為惡是河曲之戰為兩善乎又榖梁以河曲不言及略之也則自相反矣鄭君釋之曰及者別異客主耳不施於直與不直也直不直自在事而巳義兵則客直宣十二年夏晉荀林父帥師及楚子戰于邲晉師敗績是也兵不義則主人直莊二十八年春衛人及齊人戰衛人敗績是也今齊桓卒未葬宋襄欲興霸事而伐喪於禮尤反故反其文以宋及齊即實以宋及齊明直在宋邲之戰直在楚不以楚及晉何邪秦晉戰于河曲不言及疾其亟戰爭舉兵故略其先後惡烏路反下同別彼列反下同邲蒲必反一音弼亟欺兾反狄救齊善救齊也秋八月丁亥葬齊桓公竪刀易牙爭權五公子爭立故危之刀音雕冬邢人狄人伐衛狄其稱人何也善纍而後進之纍積伐衛所以救齊也何休曰即伐衛救齊當兩舉如伐楚救江矣又傳以為江遠楚近故伐楚救江今狄亦近衛而逺齊其事一也義異何也鄭君釋之曰文三年冬晉陽處父帥師伐楚救江兩舉之者以晉未有救江文故明言之今此春宋公曹伯衛人邾人伐齊夏狄救齊冬邢人狄人伐衛為其救齊可知故省文耳事同義又何異近衛如字又附近之近逺齊如字又于萬反為其于僞反省所景反功近而德逺矣伐衛功近耳夷狄而憂中國其德逺也十有九年春王三月宋人執滕子嬰齊夏六月宋公曹人邾人盟于曹南曹南曹之南鄙繒子㑹盟于邾已酉邾人執繒子用之微國之君因邾以求與之盟與厠豫也與音豫注及下文同人因已以求與之盟已迎而執之惡之故謹而日之也用之者叩其鼻以衈社也衈者釁也取鼻血以釁祭社器惡烏路反下惡其長同叩音口衈音二秋宋人圍曹衛人伐邢冬㑹陳人蔡人楚人鄭人盟于齊㑹無主名內卑者也四國稱人外卑者也杜預曰地於齊齊亦與盟梁亡自亡也湎於酒淫於色心昏耳目塞上無正長之治大臣背叛民為寇盜梁亡自亡也如加力役焉湎不足道也如使伐之而滅亡則淫湎不足記也使其自亡然後其惡明湎面善反長丁丈反下及注同皆音佩梁亡鄭棄其師我無加損焉正名而巳矣梁亡出惡正也正謂政教鄭棄其師惡其長也長謂髙克二十年春新作南門作為也有加其度也更加使大言新有故也非作也責其改舊制南門者法門也法門謂天子諸侯皆南面而治法令之所出入故謂之法門夏郜子來朝郜古報反五月乙巳西宫災謂之新宫則近為襧宫言閔公非僖公之父故不言新宫也近附近之近禰乃禮反父廟也以諡言之則如疏之然故不言閔宫而云西宫以是為閔宫也鄭人入滑秋齊人狄人盟于邢邢為主焉爾邢小其為主何也其為主乎救齊十八年邢人狄人伐衛以救齊是也冬楚人伐隨隨國也二十有一年春狄侵衛宋人齊人楚人盟于鹿上宋為盟主故序齊上鹿上宋地夏大旱傳例曰得雨曰雩不得雨曰旱旱時正也秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于雩雩宋地雩或為宇執宋公以伐宋以重辭也傳例曰以者不以者也此傳及定七年齊人執衛行人北宫結以侵衛傳皆曰以重辝也然則以有二義矣國之所重故曰重辭冬公伐邾楚人使冝申來獻捷楚稱人者為執宋公貶捷在接反為于僞反捷軍得也其不曰宋捷何也據莊三十一年齊侯求獻戎捷不與楚捷於宋也不與夷狄捷中國十有二月癸丑公㑹諸侯盟于薄㑹雩之諸侯㑹者外為主焉爾釋宋公外釋不志此其志何也以公之與之盟目之也不言楚不與楚專釋也何休曰春秋以執之為罪不以釋之為罪責楚子專釋非其理也公羊以為公㑹諸侯釋之故不復出楚耳鄭君釋之曰不與楚專釋者非以責之也傳云外釋不志此其志何也以公之與之盟目之也言公與諸侯盟而釋宋公公有功焉與公羊義無違錯復扶又反二十二年春公伐邾取須句句其俱反夏宋公衛侯許男滕子伐鄭秋八月丁未及邾人戰于升陘升陘魯地內諱敗舉其可道者也不言其人以吾敗也不言及之者為內諱也為于僞反冬十有一月己巳朔宋公及楚人戰于泓泓烏宏反宋師敗績日事遇朔曰朔春秋三十有四戰未有以尊敗乎卑以師敗乎人者也以尊敗乎卑以師敗乎人則驕其敵襄公以師敗乎人而不驕其敵何也責之也泓之戰以為復雩之恥也前年宋公為楚所執雩之恥宋襄公有以自取之伐齊之喪執滕子圍曹為雩之㑹不顧其力之不足而致楚成王成王怒而執之故曰禮人而不答則反其敬愛人而不親則反其仁治人而不治則反其知過而不改又之又復知音智又如字復扶又反是謂之過襄公之謂也古者𬒳甲嬰胄非以興國也則以征無道也豈曰以報其恥哉宋公與楚人戰于泓水之上司馬子反曰楚衆我少鼓險而擊之勝無幸焉若要而擊之必可破非僥幸也𬒳皮既反胄直救反司馬子反左傳作子魚要於遙反僥古堯反幸音幸襄公曰君子不推人危不攻人厄須其出須其出險推如字又它回反既出旌亂於上陳亂於下子反曰楚衆我少擊之勝無幸焉襄公曰不鼓不成列列陳陳直覲反須其成列而後擊之則衆敗而身傷焉七月而死何休曰即宋公身傷當言公不當言師成十六年楚子敗績是也又成十六年傳曰不言師君重于師也即成十六年是二十二年虛言也即二十二年是十六年非也鄭君釋之曰傳說楚子敗績曰四躰偏斷此則目也此言君之目與手足有破斷者乃為敗矣今宋襄公身傷耳當持鼓軍事無所害而師猶敗故不言宋公敗績也傳所以言敗衆敗身傷焉者疾其信而不道以取大辱倍則攻敵則戰少則守人之所以為人者言也人而不能言何以為人言之所以為言者信也言而不信何以為言信之所以為信者道也信而不道何以為道道之貴者時其行勢也凱曰道有時事有勢何貴於道貴合於時何貴於時貴順於勢宋公守匹夫之狷介徒蒙恥於夷狄焉識大通之方至道之術哉政如字又音貢守如字又手又反狷音絹介音界焉於䖍反二十有三年春齊侯伐宋圍閔伐國不言圍邑此其言圍何也不正其以惡報惡也前十八年宋伐齊之喪是惡也今齊乘勝而報是以惡報惡也閔左氏作緡二十五年楚圍亦同夏五月庚寅宋公茲父卒桓公之子襄公兹父之不葬何也失民也其失民何也以其不教民戰則是棄其師也為人君而棄其師其民孰以為君哉何休曰所謂教民戰者習之也春秋貴偏戰而惡詐戰宋襄公所以敗于泓者守禮偏戰也非不教其民也孔子曰君子去仁惡乎成名造次必於是顛沛必於是未有守正以敗而惡之也公羊以為不書葬為襄公諱背殯出㑹所以美其有承齊桓尊周室之美志鄭君釋之曰教民習戰而不用是亦不教也詐戰謂不期也既期矣當觀敵為䇿倍則攻敵則戰少則守今宋襄公于泓之戰違之又不用其臣之謀而敗故徒善不用賢良不足以興霸主之功徒言不知權譎之謀不足以交鄰國㑹逺疆故易譏鼎折足詩刺不用良此說善也而惡烏路反下而惡同惡乎音烏造七報反沛音貝為襄干僞反背音佩譎音決折之設反刺七賜反秋楚人伐陳冬十有一月𣏌子卒莊二十七年稱伯今稱子蓋為時王所黜二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭襄王也天子以天下為家故所在稱居天子無出出失天下也王者無外言出則有外之辭江熙曰大子必巡守然後行故河陽之守全天王之行也平王東遷其詩不能復雅而列為國風襄王奔鄭不得全天王之行則與諸侯不異故書出也夫子祖述堯舜憲章文武斯文是作不以道假人傳言失天下闕然如有未備巡守手又反下同之行如字或下孟反下同復雅扶又反居者居其所也雖失天下莫敢有也邵曰雖實出奔而王者無外王之所居則成王畿鄭不敢有之以為國晉侯夷吾卒傳曰諸侯時卒惡之也不葬篡文公而立失德惡烏路反篡𥘉患反二十有五年春王正月丙午衛侯燬滅邢燬之名何也據宣十二年楚子滅蕭不名燬况委反不正其伐本而滅同姓也絶先祖支體尤重故名以甚之夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦伯姬魯女為宋大夫蕩氏妻也自為其子來迎婦自為于僞反下為祖同婦人既嫁不踰竟宋蕩伯姬來逆婦非正也其曰婦何也緣姑言之之辭也宋殺其大夫其不稱名姓以其在祖之位尊之也何休曰曹殺其大夫亦不稱名姓豈可復以為祖乎鄭君釋之曰宋之大夫盡同姓禮公族有罪刑干甸師氏不與國人慮兄弟也所以尊異之孔子之祖孔父纍於宋殤公而死今骨肉在其位而見殺故尊之隱而不忍稱名氏若罪大者名之而巳使若異姓然此乃祖之疏也曹殺其大夫自以無大夫不稱名氏耳春秋辭同事異者甚多隱去即位以見讓莊去即位為繼弒是復可以比例非之乎復以扶又反下是復同甸徒遍反纍劣僞反去起吕反下同以見賢遍反為繼于為反又如字秋楚人圍陳納頓子于頓納者內弗受也圍一事也納一事也而遂言之怪其異事而辭相連有似遂事之辭蓋納頓子者陳也圍陳使納頓子葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮衛稱子在喪洮魯地莒無大夫其曰莒慶何也以公之㑹目之也小國無大夫以公與㑹故進之時有衛子則無敵公之嫌與㑹如字一音豫二十有六年春王正月已未公㑹莒子衛寧速盟于向向莒地向舒亮反公不㑹大夫其曰寧速何也以其隨莒子可以言㑹也齊人侵我西鄙公追齊師至巂弗及人微者也侵淺事也公之追之非正也至巂急辭也以急辭言之明不至巂巂音攜又似兖反弗及者弗與也弗與戰也可以及而不敢及也畏齊師其侵也曰人其追也曰師以公之弗及大之也大之謂變人言師弗及內辭也弗及者若曰我自不及耳非齊不可及夏齊人伐我北鄙衛人伐齊公子遂如楚乞師乞重辭也雍曰人道施而不有讓而不取故以乞為重施舒䜴反何重焉重人之死也非所乞也師出不必反戰不必勝故重之也秋楚人滅夔以䕫子歸䕫國也不日微國也以歸猶愈乎執也冬楚人伐宋圍閔伐國不言圍邑此其言圍何也以吾用其師目其事也非道用師也楚人出師為魯伐齊而中道以伐宋故伐圍兼書所以責楚為于僞反中如字又丁仲反公以楚師伐齊取榖以者不以者也民者君之本也使民以其死非其正也雍曰兵不祥之器不得巳而用之安有驅民于死地以共假借之役乎共音恭本又作供假借音嫁又古雅反下子夜反又子亦反公至自伐齊惡事不致此其致之何也危之也以蠻夷之師伐鄰近大國招禍深怨危亡之道二十有七年春𣏌子來朝朝直遙反夏六月庚寅齊侯昭卒昭或作照非秋八月乙未葬齊孝公乙已公子遂帥師入𣏌冬楚人陳侯蔡侯鄭伯許男圍宋楚人者楚子也其曰人何也人楚子所以人諸侯也其人諸侯何也不正其信夷狄而伐中國也何休曰哀元年楚子陳侯隨侯許男圍蔡不稱人明不以此故也鄭君釋之曰時晉文為賢伯故譏諸侯不從而信夷狄也哀元年時無賢伯又何據而當貶之邪寧謂定哀之丗楚彊盛故諸侯不得不從耳江熙曰夫屈信理對言信必有屈也宋楚戰于泓宋以信義而敗未有闕也楚復園之我三人行必有我師諸侯不能以義相帥反信楚之曲屈宋之直是義所不取信曲屈直猶不可况乃華夷乎楚以亡義見貶則諸侯之不從不待貶而見也然則四國信楚而屈宋春秋屈其信而信其屈貶楚子于兵首則彼碌碌者譏斯見矣故曰人楚子所以人諸侯信音申十有二月甲戍公㑹諸侯盟于宋地以宋者則宋得與盟宋圍解可知與音豫二十有八年春晉侯侵曹晉侯伐衛再稱晉侯忌也鄭嗣曰曹衛並有宿怨于晉君子不念舊惡故再稱晉侯以刺之刺七賜反下文及注同公子買戍衛不卒戍刺之刺殺也內諱殺大夫故謂之刺蓋取周禮三刺之法先名後刺殺有罪也公子啓曰不卒戍者可以卒也可以卒而不卒譏在公子也刺之可也公子啓魯大夫楚人救衛三月丙午晉侯入曹執曹伯卑宋人入者內弗受也日入惡入者也以晉侯而厈執曹伯惡晉侯也惡其忌怨深卑必利反與也下及注同惡烏路反下文及注同卑與也其曰人何也不以晉侯卑宋公也卑上與下之辭故不以侯卑公哀四年夏晉人執戎蠻子赤歸于楚使楚子治其罪今執曹伯不言歸于宋而言與宋人者是使宋公拘執之夏四月已已晉侯齊師宋師秦師及楚人戰于城濮楚師敗績楚殺其大夫得臣衛侯出奔楚五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土衛稱子者時衛侯出奔國更立君非王命所加未成君故曰子踐土鄭地諱㑹天王也實㑹天王而文不言天王若諸侯目共盟然是諱之也所謂譎而不正陳侯如㑹如㑹外乎㑹也於㑹受命也外乎㑹不及序也受命于㑹故書如㑹公朝于王所朝不言所言所者非其所也非京師朝六月衛侯鄭自楚復歸于衛自楚楚有奉焉爾復者復中國也中國猶國中也歸者歸其所也鄭之名失國也衛元咺出奔晉陳侯𣢾卒秋𣏌伯姬來莊公女來歸寧公子遂如齊聘也冬公㑹晉侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫陳稱子在喪也諱㑹天王也復致天子復扶又反天王守于河陽河陽晉地守音狩下同全天王之行也時實晉文公召王以臣召君不可以訓因天子有巡守之禮故以自行為文行如字或下孟反為若將守而遇諸侯之朝也為天王諱也水北為陽山南為陽溫河陽也日之所昭曰陽為天王于僞反壬申公朝於王所朝於廟禮也於外非禮也諸侯朝王王必於宗廟受之者蓋欲尊祖禰共其榮獨公朝與諸侯盡朝也其日以其再致天子故謹而日之主善以內目惡以外主善以內謂公朝于王所目惡以外言再致天子朝與音餘言曰公朝逆辭也而尊天子鄭嗣曰若公朝于廟則當言公如京師而令言公朝是逆常之辭雖逆常而曰公朝王所是尊天子㑹于溫言小諸侯溫河北地以河陽言之大天子也溫河陽同耳小諸侯故以一邑言之尊天子故以廣大言之日繫於月月繫於時壬申公朝于王所其不月失其所繫也以為晉文公之行事為巳傎矣以臣召君傎倒上下日不繫干月猶諸侯不宗于天子傎都田反倒丁老反晉人執衛侯歸之于京師此入而執其不言入何也不外王命於衛也入者自外來伯者以王命討衛衛王之士故曰不外王命歸之于京師緩辭也斷在京師也辭間容之故言緩斷丁亂反衛元咺自晉復歸于衛自晉晉有奉焉爾復者復中國也歸者歸其所也諸侯遂圍許㑹溫諸侯許比再㑹不至故共圍之遂繼事也繼事㑹于溫而圍許曹伯襄復歸于曹三月為晉侯所執今方歸復者復中國也天子免之因與之㑹其曰復通王命也免之于宋身未反國因㑹于許即從反國之辭通王命遂㑹諸侯圍許遂繼事也二十有九年春介葛盧來介國也葛盧微國之君未爵者也其曰來卑也介音界國名公至自圍許夏六月公㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉翟泉某地秋大雨雹雹者隂脅陽臣侵君之象陽氣之在水雨則溫熱隂氣薄而脅之不相入轉而成雹雨于付反雹蒲學反冬介葛盧來三十年春王正月夏狄侵齊秋衛殺其大夫元咺稱國以殺罪纍上也以是為訟君也元咺訟君之罪于伯者君忌之使人殺之而後入案宣九年陳殺其大夫泄治傳曰稱國以殺其大夫弒無罪也此傳曰稱國以殺罪纍上也凡稱國以殺大夫或殺無罪或罪纍上參玄不同略當近半然則稱國以殺有二義泄冶忠賢而君殺之是君無道也衛侯雖有不德臣無訟君之道元咺之罪亦巳重矣然君子之道譬之于射失諸正鵠反求諸身衛侯不思致訟之愆躬自厚之義過而不改而又怨忌上下皆失故曰罪纍上纍劣僞反泄息列反冶音也近半附近之近正音征鵠古毒反愆起䖍反衛侯在外其以纍上之辭言之何也待其殺而後入也及公子瑕公子瑕纍也以尊及卑也衛侯鄭歸于衛徐邈曰凡出奔歸月執歸不月者齊則國更立主若故君還入必有戰爭禍害所以謹其文執者罪名未定其國猶追奉之歸無犯害故例不月戰爭爭鬬之爭晉人秦人圍鄭介人侵蕭冬天王使宰周公來聘天子之宰通于四海公子遂如京師遂如晉以尊遂乎卑此言不敢叛京師也何休曰大夫無遂事案襄十二年季孫宿救台遂入鄆惡季孫不受命而入也如公子遂受命如晉不當言遂鄭君釋之曰遂固受命如京師如晉不專受命如周經近上言天王使宰周公來聘故公子遂報焉因聘于晉尊周不敢使並命使若公子遂自往然即云公子遂如京師如晉是同周于諸侯叛而不尊天子也公羊傳有美惡不嫌同辭何獨不廣之於此乎寧謂經同而傳異者甚衆此吾徒所以不及古人也台士來反又音臺鄆音運惡季孫烏路反美惡烏路反又如字三十有一年春取濟西田曹田公子遂如晉夏四月四卜郊謂之郊者天人相與交接之意也不言郊天者不敢斥尊也昔武王既崩成王幼少周公居攝行天子事制禮作樂終致大平周公薨成王以王禮葬之命魯使郊以彰周公之德祭蒼帝靈威仰昊天上帝魯不祭少詩照反大音泰不從乃免牲猶三望鄭君曰望者祭山州之名也謂海也岱也淮也非其疆界則不祭禹貢曰海岱及淮惟徐州徐州魯地夏四月不時也郊春事也四卜非禮也郊春事四卜則入夏免牲者為之緇衣熏裳有司玄端奉送至于南郊免牛亦然玄端黑衣接神之道玄熏者天地之色也南郊天位歸之于陽也全曰牲傷曰牛牛有變而不郊故卜免牛熏許云反乃者亡乎人之辭也亡乎人若曰無賢人也凱曰其猶易稱窺其戶閴其無人詩云巷無居人譏僖公不共致天變閴苦鵙反共音恭本亦作恭猶者可以巳之辭也望郊之細也不郊無望可也巳止也秋七月冬𣏌伯姬來求婦婦人既嫁不踰竟𣏌伯姬來求婦非正也狄圍衛十有二月衛遷於帝丘帝丘衛地三十有二年春王正月夏四月已丑鄭伯捷卒捷在接反衛人侵狄秋衛人及狄盟冬十有二月已卯晉侯重耳卒晉自莊公巳前不書于春秋又不言文公之入及鄭忽之殺何乎徐邈通之曰案詩序及紀年史記晉昭公之後大亂五丗又鄭忽之後有子亹子儀且事出記傳而經所無殊多誠當有不告故不書者諸侯有朝聘之禮赴告之命所以敦其交好通其憂虞若鄰國相望而情志否隔存亡禍福不以相關則它國之史無由得書故告命之事絶則記注之文闕此蓋內外相與之常也魯政雖陵遲而典刑猶存史䇿所録不失常法其文憲之實足徴故孔子因而修之事仍本史而辭有損益所以成詳略之例起褒貶之意若夫可以寄微旨而通王道者存乎精義窮理不在記事少多此蓋修春秋之本旨師資辨說日用之常義故榖梁子可不復發文而體例自舉矣重直龍反亹亡匪反朝聘直遙反好呼報反否備矣反注張住反不復扶又反三十有三年春王二月秦人入滑滑國也齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師于殽不言戰而言敗何也狄秦也其狄之何也秦越千里之險入虛國滑無備故言虛國殽户交反進不能守退敗其師徒亂人子女之教無男女之别秦之為狄自殽之戰始也明秦本非夷狄别彼列反秦伯將襲鄭百里子與蹇叔子諌曰千里而襲人未有不亡者也秦伯曰子之冡木巳拱矣何知子之輩皆巳老死矣拱合抱也言其老無知百里子如字或作伯誤也蹇紀輦反拱九勇反合手曰拱師行百里子與蹇叔子送其子而戒之曰女死必於殽之巖吟之下其處險隘一人可以要百人女音汝下及注同吟本作崟音吟一音欽處昌慮反隘於懈反要百於遙反下文要而擊之同我將尸女於是尸女者收女尸師行百里子與蹇叔子隨其子而哭之秦伯怒曰何為哭吾師也二子曰非敢哭師也哭吾子也我老矣彼不死則我死矣畏秦伯怒故云彼我要有死者晉人與姜戎要而擊之殽匹馬倚輪無反者倚輪一隻之輪倚居冝反或於綺反晉人者晉子也其曰人何也微之也何為微之不正其釋殯而主乎戰也癸巳葬晉文公日葬危不得葬也狄侵齊公伐邾取訾樓訾子斯反秋公子遂帥師伐邾晉人敗狄于箕箕晉地冬十月公如齊十有二月公至自齊乙巳公薨于小寢小寢內寢小寢非正也非路寢隕霜不殺草京房易傳曰君假與臣權隕霜不殺草隕云敏反未可殺而殺舉重也可殺而不殺舉輕也重謂菽也輕謂草也輕者不死則重者不死可知李梅實京房易傳曰縱叛者兹謂不明厥妖木冬實實之為言猶實也實子晉人陳人鄭人伐許春秋榖梁傳卷第五經傳陸阡㭍伯㭍拾捌字注㭍阡零捌拾叄字音義一阡捌伯一拾字余仁仲刋于家孰
