front:
  text: 春秋榖梁傳文公第六襄王二十六年即位名興
  hash: sha256:dbe39a4cb490436d5f14c3ace0a330c6e7e92644bf65483069d03e37a59bbb8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0009_SBCK_006-1a}
body:
  text: 范寧集解元年春王正月公即位繼正即位正也繼正謂繼正卒也隱去即位以見讓桓書即位示安忍莊閔僖不言即位皆繼弒去起吕反見賢遍反弒申志反二月癸亥日有食之天王使叔服來會葬諸侯喪天子使大夫會葬禮也傳例曰天子大夫稱字蓋未受采邑故不稱氏字者貴稱故可獨逹也貴稱尺證反葬曰會言會明非一人之辭其志重天子之禮也夏四月丁巳葬我君僖公薨稱公舉上也葬我君接上下也僖公葬而後舉諡諡所以成德也於卒事乎加之矣天王使毛伯來錫公命毛采邑伯字也天子上大夫也錫星歷反采地音菜地本又作邑禮有受命無來錫命錫命非正也晉侯伐衛叔孫得臣如京師衛人伐晉秋公孫敖會晉侯于戚禮卿不得會公侯春秋尊魯內卿夫夫可以會外諸侯戚衛地戚倉寂反冬十月丁未楚丗子商臣弒其君髠鄭嗣曰啇臣繆王也髠文王之子成王也不言其父而言其君者君之於丗子有父之親有君之尊言丗子所以明其親也言其君所以明其尊也商臣於尊親盡矣弒其申志反傳同髠苦門反日髠之卒所以謹商臣之弒也夷狄不言正不正徐乾曰中國君卒正者例日篡立不正者不日夷狄君卒皆略而不日所以殊夷夏也今書曰謹識商臣之大逆爾不以明髠正與不正篡𥘉患反夏戶雅反識如字又申志反公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙彭衙秦地衙音牙秦師敗績丁丑作僖公主作為也為僖公主也為僖公廟作主也主蓋神之所馮依其狀正方穿中央逹四方天子長尺二寸諸侯長一尺為僖公廟于偽反馮皮氷反長尺直亮反又如字下同立主喪主於虞禮平旦而葬日中反而祭謂之曰虞其主用桑吉主於練期而小祥其主用栗作僖公主譏其後也僖公薨至此巳十五月作主壞廟有時日於練焉壞廟壞廟之道昜簷可也改塗可也禮親過髙祖則毀其廟以次而遷將納新神故示有所加壞音怪下同簷以占反三月乙已及晉處父盟晉大夫陽處父不言公處父伉也為公諱也諱公與大夫盟去處父氏公親如晉使若與其君盟如經言邾儀父矣不書地者公在晉也莊二十二年秋七月丙申及齊髙傒盟于防不去髙傒氏者公不親如齊不與其君盟於耻差降伉苦浪反為公于偽反去處父起吕反下同傒音兮差𥘉賣反又𥘉佳反何以知其與公盟以其日也何以不言公之如晉所恥也出不書反不致也夏六月公孫敖會宋公陳侯鄭伯晉士榖盟于垂斂垂斂鄭地榖戶木反本又作縠九年同斂如字左氏作垂隴內大夫可以會外諸侯自十有二月不雨至于秋七月建午之月猶未為災歷時而言不雨文不憂雨也僖公憂民歷一時輒書不雨今文公歷四時乃書是不勤雨也不憂雨者無志乎民也無恤民志八月丁卯大事于大廟躋僖公大事祫也時三年之喪未終而吉祭於大廟則其譏自明大廟音泰注及傳大祖同躋子兮反升也祫户夾反下及注皆同大事者何大是事也著祫嘗祫合也嘗秋祭祫祭者毀廟之主陳于大祖未毀廟之主皆升合祭于大祖祫祭著皆合祭諸廟巳毀未毀者之主於大祖廟中以昭繆為次序父為昭子為繆昭南鄉繆北鄉孫從王父坐也祭畢則復還其廟昭繆音韶穆下及傳同鄉音向下同躋升也先親而後祖也逆祀也舊説僖公閔公庶兄故文公升僖公之主於閔么之上耳僖公雖長巳為臣矣閔公雖小巳為君矣臣不可以先君猶子不可以先父故以昭穆父祖為喻寧曰即之於傳則無以知其然若引左氏以釋此傳則義雖有似而於文不辨髙宗殷之賢主猶祭豐于禰以致雉雊之變然後率修常禮文公傎倒祖考固不足多怪矣親謂僖祖謂莊長丁丈反先悉薦反下同禰乃禮反雊古豆反雉鳴也傎倒丁田反下丁老反逆祀則是無昭穆也無昭穆則是無祖也無祖則無天也故曰文無天無天者是無天而行也祖人之始也人之所仰天也君子不以親親害尊尊此春秋之義也尊卑有序不可亂也冬晉人宋人陳人鄭人伐秦公子遂如齊納幣喪制未畢而納幣書非禮三年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰沈國也潰之為言上下不相得沈音審潰户內反夏五月王子虎卒叔服也此不卒者也外大夫不書卒何以卒之以其來會葬我卒之也會葬在元年或曰以其嘗執重以守也僖二十四年天王出居于鄭叔服執重任以守國守手又反秦人伐晉秋楚人圍江雨螽于宋外災不志此何以志也曰災甚也其甚奈何茅茨盡矣茅茨猶盡則嘉榖可知茨蒺藜雨螽于付反下司下音終茨在思反茅草也著於上見於下謂之雨見賢遍反冬公如晉十有二月己巳公及晉侯盟晉陽處父帥師伐楚救江此伐楚其言救江何也江逺楚近伐楚所以救江也時楚人圍江晉師伐楚楚國有難則江圍自解難乃旦反解音蟹又古買反四年春公至自晉夏逆婦薑于齊其曰婦薑為其禮成乎齊也婦禮成于齊故在齊使稱婦為于偽反其逆者誰也親逆而稱婦或者公與何其速婦之也鄭嗣曰皆問者之辭問者以使大夫逆例稱女而今稱婦為是公親逆與怪稱婦速故反覆推之公與音餘注同反覆芳服反曰公也其不言公何也據莊二十四年公如齊逆女言公非成禮於齊也非責曰婦有姑之辭也其不言氏何也貶之也何為貶之也夫人與有貶也邵曰夫人能以禮自防則夫婦之禮不成於齊故譏公而夫人與焉與音豫注同貶彼撿反狄侵齊秋楚人滅江晉侯伐秦衛侯使寧俞來聘俞羊朱反冬十有一月壬寅夫人風氏薨僖公母風姓五年春王正月王使榮叔歸含且賵含口實也禮記曰飯用米貝弗忍虛也諸侯含用玉榮叔天子之上大夫也榮采地叔字含户暗反釋舊作唅賵芳鳯反飯扶晚反含一事也賵一事也兼歸之非正也禮含賵禭各異人禭音遂其曰且志兼也其不言來不周事之用也何休曰四年夫人風氏薨九年秦人來歸僖公成風之襚最晚矣何以言來鄭君釋之曰秦自敗于殽之後與晉為仇兵無休時乃加免繆公之喪而來君子原情不責晚用或作辭殽户交反賵以早乘馬曰賵乘馬所以助葬成風未葬故書早乘繩證反下同而含以晚巳殯故言晚國有逺近皆令及事理不通也禮雜記曰含者執璧蔣命曰寡君使某含相者入告出曰孤某須矣含者入升堂致命子拜稽顙含者坐委於殯東南有葦席既葬蒲席降出反位明君之於臣有含賵之義所以助喪盡恩含不必用示有其禮令力呈反相息亮反稽顙音啓下息黨反葦于鬼反三月辛亥葬我小君成風王使毛伯來會葬會葬之禮於鄙上從竟至墓主為送葬來竟音境為于偽反夏公孫敖如晉秦人入鄀鄀音若秋楚人滅六冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳行父季友孫秋季孫行父如晉八月乙亥晉侯歡卒歡好官反冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父稱國以殺罪纍上也襄公巳葬其以纍上之辭言之何也君漏言也上泄則下暗下暗則上聾且暗且聾無以相通臣暗不言君無所聞上下否塞纍劣偽反下同或如字泄息列反又以制反聾魯公反夜姑殺者也殺處父左氏作射姑夜姑之殺奈何曰晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者君之使臣也使仁者佐賢者不使賢者佐仁者今趙盾賢夜姑仁其不可乎邵曰賢者多才也戰主于攻伐仁者有惻隱之恩不如多才者有權略盾徒本反攻如字又音貢惻𥘉力反襄公曰諾謂夜姑曰吾始使盾佐女今女佐盾矣稱處父語以語之故傳曰漏言也女音汝語魚慮反夜姑曰敬諾襄公死處父主竟上之事待諸侯會葬在鄙上竟音境夜姑使人殺之君漏言也親殺者夜姑而歸罪於君明由君言而殺之罪在君也故稱君以殺故士造辟而言詭辭而出辟君也詭辭而出不以實告人造七報反辟必亦反君也注同詭九委反曰用我則可不用我則無亂其德此士對君言之辭晉狐夜姑出奔狄閏月不告月猶朝于廟禮天子以十二月朔政班告于諸侯諸侯受於禰廟孝子尊事先君不敢自專也言朝者緣生以事死親存朝朝莫夕不敢泄鬼神故事畢感月始而朝之猶朝直遙反注及下同朝朝上如字下直遙反莫音慕泄息列反不告月者何也不告朔也不告朔則何為不言朔也閏月者附月之餘日也積分而成於月者也一歲三百六十日餘六日又有小月六積五歲得六十日而再閏積衆月之餘分以成此月天子不以告朔而喪事不數也閏是叢殘之數非月之正故吉凶大事皆不用也不數所古反叢徂洪反猶之為言可以巳也郊然後三望告朔然後朝廟俱言猶義相類也既廢其大而行其細故譏之七年春公伐邾三月甲戌取須句取邑不日此其日何也據僖二十六年公伐齊取榖不日須句其俱反不正其再取故謹而日之也僖二十二年公巳伐邾取須句過而不改於此為甚故録日以志之遂城郚遂繼事也因伐邾之師郚音吾夏四月宋公壬臣卒壬本或作王臣宋人殺其大夫稱人以殺誅有罪也戊子晉人及秦人戰于令狐令狐秦地令力丁反晉先蔑奔秦不言出在外也輟戰而奔秦以是為逃軍也輟止也為將而獨奔故曰逃軍輟丁劣反將子匠反狄侵我西鄙秋八月公會諸侯晉大夫盟于扈扈鄭地扈音戶其曰諸侯略之也晉侯新立公始往會晉侯不盟大夫受盟既以喪娶又取二邑為諸侯所賤不得序于會諱使若扈之􅉀都不可知故略之喪取七住反本亦作娶冬徐伐莒公孫敖如莒蒞盟蒞位也其曰位何也前定也其不日前定之盟不日也八年春王正月夏四月秋八月戊申天王崩襄王冬十月壬午公子遂會晉趙盾盟于衡雍衡雍鄭地雍於用反乙酉公子遂會雒戎盟于暴鄭地雒戎音洛本或作伊雒之戎誤公孫敖如京師弔周喪不至而復丙戍奔莒不言所至未如也若其巳行當如公子遂至黃乃復今不言所至而直言復知其實未如也未如則未復也未如而曰如不廢君命也雍曰受命而出義無私留書如京師以顯命行于下不書所至以表不去之罪未復而曰復不專君命也復者事畢之辭未如故知其未復加畢事之文者言君命無輒專之道其如非如也其復非復也唯奔莒之為信故謹而日之也螽宋人殺其大夫司馬司馬官也其以官稱無君之辭也何休曰近上七年宋公壬臣卒宋人殺其大夫不言官今此在三年中言官義相違鄭君釋之曰七年殺其大夫此實無君也今殺其司馬無人君之德耳司馬司城君之爪牙守國之臣乃殺其司馬奔其司城無道之甚故稱官以見輕慢也傳例稱人以殺殺有罪也此上下俱失之見賢遍反宋司城來奔司城官也其以官稱無君之辭也來奔者不言出舉其接我也九年春毛伯來求金求車猶可求金甚矣凱曰求俱不可在喪尢甚不稱使者天子當喪未君也夫人薑氏如齊歸寧二月叔孫得臣如京師京大也師衆也言周必以衆與大言之也辛丑葬襄王天子志崩不志葬舉天下而葬一人其道不疑也志葬危不得葬也不得備禮葬日之甚矣其不葬之辭也王室微弱諸侯無復往魯葬復扶又反晉人殺其大夫先都三月夫人薑氏至自齊卑以尊致病文公也夫人行例不致乃以君禮致刺公寵之過刺七賜反晉人殺其大夫士縠及箕鄭父稱人以殺誅有罪也鄭父纍也箕居其反楚人伐鄭公子遂會晉人宋人衛人許人救鄭夏狄侵齊秋八月曹伯襄卒九月癸酉地震震動也地不震者也震故謹而日之也穀梁説曰大臣盛將動有所變冬楚子使萩來聘楚無大夫無命卿萩子遙反又子小反或作菽左氏作椒其曰萩何也以其來我褒之也秦人來歸僖公成風之禭秦人弗夫人也言秦人弗以成風為夫人故不言夫人即外之弗夫人而見正焉見不以妾為妻之正而見賢遍反葬曹共公共音恭十年春王三月辛卯臧孫辰卒夏秦伐晉楚殺其大夫冝申僖四年傳曰楚無大夫而今云殺其大夫者楚本祝融之後季連之胄也而國近南蠻遂漸其俗故棄而夷之今知內附中國亦轉強大故進之胄直又反國近附近之近自正月不雨至于秋七月歷時而言不雨文不閔雨也不閔雨者無志乎民也及蘇子盟于女栗女栗某地蘇子周卿士女音汝冬狄侵宋楚子蔡侯次于厥貉厥貉某地也貉亡白反十有一年春楚子伐麇麇九倫反夏叔彭生會晉郤缺于承匡承匡宋地缺苦悅反秋曹伯來朝朝直遙反公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹不言帥師而言敗何也據僖元年公子反帥師敗莒師于麗獲莒拿稱帥師敗必邁反鹹音咸麗力知反拏女居反直敗一人之辭也一人而曰敗何也以衆焉言之也言其力足以敵衆傳曰長狄也弟兄三人佚宕中國佚猶更也佚宕大結反更也害本又作宕更音庚瓦石不能害肌膚堅強瓦石打擲不能虧損強其丈反擲直隻反叔孫得臣最善射者也射其目身橫九畒廣一步長百步為一畒九畒五丈四尺射其食亦反下注同廣古曠反長直亮反斷其首而載之眉見於軾兵車之軾髙三尺二寸斷丁管反見賢遍反軾音式然則何為不言獲也據莒拿言獲曰古者不重創不禽二毛故不言獲為內諱也不重創恤病也不禽二毛敬老也仁者造次必於是顚沛必於是故為內諱也既射其目又斷其首為重創鬢髮白為二毛重直用反注同創𥘉羊反為內于偽反造七報反沛音貝其之齊者王子成父殺之則未知其之晉者也十有二年春王正月郕伯來奔郕音成𣏌伯來朝僖二十七年稱子今稱伯蓋時王所進朝直遙反二月庚子子叔姬卒其曰子叔姬貴也公之母姊妹也同母姊妹其一傳曰許嫁以卒之也男子二十而冠冠而列丈夫三十而娶女子十五而許嫁二十而嫁禮二十而冠冠而在丈夫之列譙周曰國不可久無儲二故天子諸侯十五而冠十五而娶娶必先冠以夫婦之道王教之本不可以童子之道治之禮十五為成童以次成人欲人君之早有繼體故因以為節書稱成王十五而冠著在金縢周禮媒氏曰令男三十而娶女二十而嫁內則云女子十五而笄説曰許嫁也是故男自二十以及三十女自十五以及二十皆得以嫁娶先是則速後是則晚凡人嫁娶或以賢淑或以方類豈但年數而巳若必差十年乃為夫婦是廢賢淑方類苟比年數而巳禮何為然哉則三十而娶二十而嫁説嫁娶之限蓋不得復過此爾故舜年三十無室書稱曰鰥周禮云女子年二十未有嫁者仲春之月奔者不禁奔者不待禮聘因媒請嫁而巳矣寧謂禮為夫之姊妹服長殤年十九至十六如此男不必三十而娶女不必二十而嫁明矣此又士大夫之禮冠江喚反娶七住反譙在遙反笄古兮反先是蘇遍反後是户豆反比毗至反或如字得復扶又反鰥古頑反禮為于偽反服長丁丈反夏楚人圍巢秋滕子來朝秦伯使術來聘術秦大夫術音述冬十有二月戊午晉人秦人戰于河曲河曲晉地不言及秦晉之戰已亟故略之也亟數也夫戰必有曲直以一人主之二國戰鬪數曲真不可得詳故略之不言晉人及秦人戰亟去兾反數也注同季孫行父帥師城諸及鄆稱帥師言有難也難乃旦反十有三年春王正月夏五月壬午陳侯朔卒邾子籧篨卒籧其居反篨直居反自正月不雨至于秋七月大室屋壞屋者主於覆蓋明廟不都壞大音泰傳皆同大室屋壞者有壞道也譏不修也大室猶丗室也丗丗有是室故言丗室周公曰大廟爾雅曰室有東西廂曰廟伯禽曰大室羣公曰宫爾雅曰宫謂之室室謂之宮然則其實一也蓋尊伯禽而異其名禮宗廟之事君親割割牲夫人親春舂粢盛敬之至也為社稷之主而先君之廟壞極稱之志不敬也極稱言屋壞不復依違其文復扶又反冬公如晉衛侯會公于沓沓地也沓徒答反狄侵衛十有二月已丑公及晉侯盟還自晉還者事未畢也自晉事畢也鄭伯會公于棐棐鄭地棐芳匪反十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒潘浦干反六月公會宋公陳侯衛侯鄭伯許伯曹伯晉趙盾癸酉同盟于新城新城宋地同者有同也同外楚也秋七月有星孛入于北斗孛之為言猶茀也其曰入北斗斗有環域也據孛于大辰及東方皆不言入此言入者明斗有規郭入其魁中也劉向曰北斗貴星人君之象也茀星亂臣之類言邪亂之臣將並弒其君孛步內反茀李軌扶憒反徐邈扶勿反一音步勿反又音弗邪俄嗟反弒音試公至自會晉人納捷災于邾弗克納是郤克也其曰人何也微之也何為微之也長轂五百乘綿地千里長轂兵車四馬曰乘一乘甲士三人步卒七十二人五百乘合三萬七千五百人綿猶彌漫捷災在接反下側其反轂古木反乘繩證反卒子忽反過宋鄭滕薛敻入千乘之國欲變人之主敻猶逺也變人之主謂時邾巳立貜且邾小國而言千乘者大郤克之事敻况盛反至城下然後知何知之晚也征不廟算正其得失勞師逺涉乃至城下邾以義拒然後方悟貶之曰人不亦冝乎悟五故反弗克納未伐而曰弗克何也弗克其義也非力不足義不可勝捷災晉出也貜且齊出也娕妹之子曰出貜且正也捷災不正也正適適丁歷反九月甲申公孫敖卒于齊奔大夫不言卒而言卒何也據閔二年公子慶父出奔莒後不言卒為受其喪不可不卒也其地於外也成十七年公孫嬰齊卒于貍蜃傳曰其地未踰竟宣八年仲遂卒于垂垂齊地然則地或踰竟或未踰竟凡大夫卒在常所則不地地者皆非其常所隨其所在而書其地耳不係於踰竟與不踰竟為于偽反貍力之反蜃市軫反竟音境並同齊公子商人弒其君舍舍未踰年其曰君何也成舍之為君所以重商人之弒也舍不成君則殺者非弒也殺其音試本又作弒啇人其不以國氏何也據隱四年衛祝吁弒其君完不言公子不以嫌代嫌也春秋以正治不正不以亂平亂舍不冝立有不正之嫌啇人專權有當國之嫌故不書國氏明不以嫌相代舍之不日何也未成為君也宋子哀來奔其曰子哀失之也言失其氏族不知何人冬單伯如齊單伯魯大夫單音善齊人執單伯私罪也單伯淫于齊齊人執之齊人執子叔姬叔姬同罪也十有五年春季孫行父如晉三月宋司馬華孫來盟泰曰擅權專國不君其君緣其不臣因曰無君上司馬司城皆不名而此獨名者以華孫奉使出盟為好於我故書官以見專録名以存善華户化反使所吏反好呼報反見賢遍反司馬官也其以官稱無君之辭也來盟者何前定也不言及者以國與之也稱尺證反年末注同夏曹伯來朝朝直遙反齊人歸公孫敖之喪六月辛丑朔日有食之鼓用牲于社單伯至自齊大夫執則致致則名此其不名何也據昭十四年意如至自晉稱名天子之命大夫也晉郤缺帥師伐蔡戊申入蔡秋齊人侵我西鄙其曰鄙逺之也其逺之何也不以難介我國也介猶近也難乃旦反介音界注同季孫行父如晉冬十有一月諸侯盟于扈諸侯皆會而公獨不與故耻而略之十有二月齊人來歸子叔姬其曰子叔姬貴之也其言來歸何也父母之於子雖有罪猶欲其免也凱曰書來歸是見出之辭有罪之人猶與貴稱書之曰子者蓋父母之恩欲免罪也齊侯侵我西鄙遂伐曹入其郛郛郭郛芳浮反十有六年春季孫行父會齊侯于陽榖齊侯弗及盟弗及者內辭也行父失命矣齊得內辭也行父出會失辭義無可納故齊侯以正道拒而弗受不盟由齊故得內辭夏五月公四不視朔天子告朔于諸侯諸侯受乎禰廟禮也每月天子以朔政班于諸侯諸侯受而納之桶廟告廟以羊今公自二月不視朔至于五月是後視朔之禮遂廢故子貢欲去其羊去起吕反公四不視朔公不臣也以公為厭政以甚矣天子班朔而公不視是不臣厭於艷反六月戊辰公子遂及齊侯盟于師亡師丘齊地師丘左氏作郪丘公羊作犀丘復行父之盟也春齊侯不與行父盟故復使遂修之復行扶又反又音服注復使及下注而復皆同秋八月辛未夫人薑氏薨僖公夫人毀泉臺喪不二事二事緩喪也喪事土哀而復毁泉臺是以喪為緩以文為多失道矣緩作主躋僖公四不視朔毀泉臺之類自古為之今毀之不如勿處而巳矣若以夫人居之而薨者但當莫處楚人秦人巴人滅庸冬十有一月宋人弒其君杵臼泰曰傳稱人者衆辭衆之所同則君過可知又曰稱國以弒其君君惡甚矣然則舉國重於書人也杵昌吕反臼其九反十有七年春晉人衛人陳人鄭人伐宋衛序陳上蓋主會者降之夏四月癸亥葬我小君聲薑齊侯伐我西鄙六月癸未公及齊侯盟于榖諸侯會于扈言諸侯者義與上十五年同范云言諸侯者義與上十五年同亦諸侯皆會公獨不與恥而略之秋公至自榖冬公子遂如齊十有八年春王二月丁丑公薨于臺下臺下非正也秦伯罃卒罃乙耕反夏五月戊戍齊人弒其君商人六月癸酉葬我君文公秋公子遂叔孫得臣如齊使舉上客而不稱介不正其同倫而相介故列而數之也上客聘主也禮大夫為卿介遂與得臣俱為卿是以同倫為副使故兩言之明無差降使舉所吏反注同介音界下同副使也數所主反冬十月子卒子赤也諸侯在喪既葬之稱子卒不日故也故殺也不稱殺諱也夫人薑氏歸于齊惡宣公也薑氏子赤之母其子𬒳殺故大歸也宣公亦文公之子其母敬嬴惡不奉薑氏惡烏路反注同嬴音盈依左傳應作項熊有不待貶絶而罪惡見者泰曰直書薑氏之歸則宣公罪惡不貶而自見有待貶絶而惡從之者齊小白以國氏之類是也姪娣者不孤子之意也言其一人有子則共飬姪大結反娣音弟共養並如子一讀上九用反下餘亮反一人有子三人緩帶共望其祿一曰就賢也若並有子則就其賢謂年同也宣公不奉哀薑非此之謂故惡之季孫行父如齊莒弒其君庶其傳例曰稱國以弒其君君惡甚矣春秋榖梁卷第六經傳叄阡二伯字注叄阡一伯玖拾伍字音義一阡單伍字余仁仲刋于家孰
